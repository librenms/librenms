description:
  en:
    localisedName: LibreNMS
    shortDescription: A fully featured network monitoring system that provides a
      wealth of features and device support.
    longDescription: LibreNMS is an auto-discovering PHP/MySQL/SNMP based network
      monitoring which includes support for a wide range of network hardware and
      operating systems including Cisco, Linux, FreeBSD, Juniper, Brocade,
      Foundry, HP and many more.
    documentation: https://docs.librenms.org
    apiDocumentation: https://docs.librenms.org/API/
    features:
      - Alert management and notifications
      - SNMP based data collection
      - Application support
      - Network maps
      - Device Dependancy and Grouping
      - API
      - Scalable architecture
      - Bandwidth Billing
      - Auto discovery
      - Automatic Updates
    screenshots:
