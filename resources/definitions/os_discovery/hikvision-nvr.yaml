modules:
    mempools:
        data:
            -
                total: HIKVISION-MIB::hikMemoryCapability
                percent_used: HIKVISION-MIB::hikMemoryUsage
                precision: 1048576
    os:
        hardware: HIKVISION-MIB::hikEntityType.0
        serial: HIKVISION-MIB::hikEntityIndex.0
    sensors:
        state:
            data:
                -
                    oid: HIKVISION-MIB::hikDiskTable
                    value: HIKVISION-MIB::hikDiskStatus
                    num_oid: '.1.3.6.1.4.1.50001.1.241.1.3.{{ $index }}'
                    descr: HIKVISION-MIB::hikDiskVolume
                    index: 'hikDiskStatus.{{ $index }}'
                    group: 'Disk Status'
                    state_name: hikDiskStatus
                    states:
                        - { value: 0, generic: 0, descr: Normal }
                        - { value: 1, generic: 1, descr: Unformatted }
                        - { value: 2, generic: 2, descr: Abnormal }
                        - { value: 3, generic: 2, descr: 'SMART Failed' }
                        - { value: 4, generic: 1, descr: Mismatch }
                        - { value: 5, generic: 0, descr: Idle }
                        - { value: 6, generic: 2, descr: 'Not Online' }
                        - { value: 10, generic: 1, descr: Repairing }
                        - { value: 11, generic: 1, descr: Formatting }
    storage:
        data:
            -
                oid: HIKVISION-MIB::hikDiskTable
                type: hikvision-disk
                descr: HIKVISION-MIB::hikDiskVolume
                size: HIKVISION-MIB::hikDiskCapability
                free: HIKVISION-MIB::hikDiskFreeSpace
                free_num_oid: '.1.3.6.1.4.1.50001.1.241.1.4.{{ $index }}'
                units: 1048576
