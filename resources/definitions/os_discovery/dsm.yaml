modules:
    os:
        hardware: SYNOLOGY-SYSTEM-MIB::modelName.0
        version: SYNOLOGY-SYSTEM-MIB::version.0
        version_regex: '/(DSM )?(?<version>\S+)/'
        serial: SYNOLOGY-SYSTEM-MIB::serialNumber.0
    sensors:
        temperature:
            data:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::temperature
                    num_oid: '.1.3.6.1.4.1.6574.1.2.{{ $index }}'
                    descr: 'System'
                    index: '99'
                    group: 'System'
                -
                    oid: SYNOLOGY-DISK-MIB::diskTable
                    value: SYNOLOGY-DISK-MIB::diskTemperature
                    num_oid: '.1.3.6.1.4.1.6574.2.1.1.6.{{ $index }}'
                    descr: '{{ SYNOLOGY-DISK-MIB::diskID }} {{ SYNOLOGY-DISK-MIB::diskModel }}'
                    index: '{{ $index }}'
                    group: 'Disks'
        count:
            data:
                -
                    oid: SYNOLOGY-DISK-MIB::diskTable
                    value: SYNOLOGY-DISK-MIB::diskBadSector
                    num_oid: '.1.3.6.1.4.1.6574.2.1.1.9.{{ $index }}'
                    descr: '{{ SYNOLOGY-DISK-MIB::diskID }} {{ SYNOLOGY-DISK-MIB::diskModel }}'
                    index: '{{ $index }}'
                    group: 'Bad sectors'
        state:
            data:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::systemStatus
                    value: SYNOLOGY-SYSTEM-MIB::systemStatus
                    num_oid: '.1.3.6.1.4.1.6574.1.1.{{ $index }}'
                    descr: 'System'
                    index: '{{ $index }}'
                    group: 'System'
                    state_name: systemStatusState
                    states:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::powerStatus
                    value: SYNOLOGY-SYSTEM-MIB::powerStatus
                    num_oid: '.1.3.6.1.4.1.6574.1.3.{{ $index }}'
                    descr: 'Power'
                    index: '{{ $index }}'
                    group: 'System'
                    state_name: powerStatusState
                    states:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::systemFanStatus
                    value: SYNOLOGY-SYSTEM-MIB::systemFanStatus
                    num_oid: '.1.3.6.1.4.1.6574.1.4.1.{{ $index }}'
                    descr: 'FAN - System'
                    index: '{{ $index }}'
                    group: 'System'
                    state_name: systemFanStatusState
                    states:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::cpuFanStatus
                    value: SYNOLOGY-SYSTEM-MIB::cpuFanStatus
                    num_oid: '.1.3.6.1.4.1.6574.1.4.2.{{ $index }}'
                    descr: 'FAN - CPU'
                    index: '{{ $index }}'
                    group: 'System'
                    state_name: cpuFanStatusState
                    states:
                -
                    oid: SYNOLOGY-SYSTEM-MIB::upgradeAvailable
                    value: SYNOLOGY-SYSTEM-MIB::upgradeAvailable
                    num_oid: '.1.3.6.1.4.1.6574.1.5.4.{{ $index }}'
                    descr: 'Upgrade Availability'
                    index: '{{ $index }}'
                    group: 'System'
                    state_name: upgradeAvailableState
                    states:
                -
                    oid: SYNOLOGY-RAID-MIB::raidTable
                    value: SYNOLOGY-RAID-MIB::raidStatus
                    num_oid: '.1.3.6.1.4.1.6574.3.1.1.3.{{ $index }}'
                    descr: '{{ SYNOLOGY-RAID-MIB::raidName }}'
                    index: '{{ $index }}'
                    group: 'RAIDs'
                    state_name: raidStatusState
                    states:
                -
                    oid: SYNOLOGY-DISK-MIB::diskTable
                    value: SYNOLOGY-DISK-MIB::diskStatus
                    num_oid: '.1.3.6.1.4.1.6574.2.1.1.5.{{ $index }}'
                    descr: '{{ SYNOLOGY-DISK-MIB::diskID }} {{ SYNOLOGY-DISK-MIB::diskModel }}'
                    index: '{{ $index }}'
                    group: 'Disks'
                    state_name: diskStatusState
                    states:
                -
                    oid: SYNOLOGY-DISK-MIB::diskTable
                    value: SYNOLOGY-DISK-MIB::diskHealthStatus
                    num_oid: '.1.3.6.1.4.1.6574.2.1.1.13.{{ $index }}'
                    descr: '{{ SYNOLOGY-DISK-MIB::diskID }} {{ SYNOLOGY-DISK-MIB::diskModel }}'
                    index: '{{ $index }}'
                    group: 'Disk Health'
                    state_name: diskHealthStatusState
                    states:
