mib: Printer-MIB

modules:
  os:
    # Extraherar "e-STUDIO338CS" från sysDescr
    hardware:
      sysDescr_regex:
        - '/TOSHIBA (?P<value>e-STUDIO\S+)/'
    # Extraherar "CXTZJ.230.307" från sysDescr
    version:
      sysDescr_regex:
        - '/version (?P<value>\S+)/'
    # Extraherar kernel-versionen som features
    features:
      sysDescr_regex:
        - '/kernel (?P<value>\S+)/'

  sensors:
    # -------------------------------------------------------
    # FÖRBRUKNINGSARTIKLAR (prtMarkerSuppliesTable)
    # OID: 1.3.6.1.2.1.43.11.1.1
    #   .6 = prtMarkerSuppliesDescription (namn)
    #   .8 = prtMarkerSuppliesMaxCapacity  (max)
    #   .9 = prtMarkerSuppliesLevel        (nuvarande nivå)
    # -------------------------------------------------------
    percent:
      data:
        - oid: prtMarkerSuppliesLevel
          num_oid: '.1.3.6.1.2.1.43.11.1.1.9.1.{{ $index }}'
          value: prtMarkerSuppliesLevel
          divisor_oid: '.1.3.6.1.2.1.43.11.1.1.8.1.{{ $index }}'
          multiplier: 100
          descr: '{{ $prtMarkerSuppliesDescription }}'
          index: 'supply.{{ $index }}'
          low_warn_limit: 20
          low_limit: 10
          skip_values:
            - -3   # unknownBeforeLifetime – artikeln har inte börjat användas
            - -2   # unknown – okänd nivå
            - -1   # no restriction / obegränsad
          precache:
            - prtMarkerSuppliesDescription

    # -------------------------------------------------------
    # TOTAL SIDRÄKNARE (prtMarkerLifeCount)
    # OID: 1.3.6.1.2.1.43.10.2.1.4.1.1  = 29648 sidor
    # -------------------------------------------------------
    count:
      data:
        - oid: prtMarkerLifeCount
          num_oid: '.1.3.6.1.2.1.43.10.2.1.4.1.{{ $index }}'
          descr: 'Total sidräknare'
          index: 'lifepages.{{ $index }}'

    # -------------------------------------------------------
    # AKTIVA LARM (prtAlertTable)
    # OID: 1.3.6.1.2.1.43.18.1.1
    #   .8 = prtAlertDescription (t.ex. "Yellow cartridge low")
    # Skrivaren rapporterade aktivt:
    #   index 71 = "Yellow cartridge low"
    #   index 77 = "Magenta cartridge low"
    # Dessa fångas indirekt via tonersensorerna ovan.
    # -------------------------------------------------------
