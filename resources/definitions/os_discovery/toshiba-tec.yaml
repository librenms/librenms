mib: Printer-MIB

modules:
  os:
    hardware:
      sysDescr_regex:
        - '/TOSHIBA (?P<value>e-STUDIO\S+)/'
    version:
      sysDescr_regex:
        - '/version (?P<value>\S+)/'
    features:
      sysDescr_regex:
        - '/kernel (?P<value>\S+)/'
    serial: Printer-MIB::prtGeneralSerialNumber.1
