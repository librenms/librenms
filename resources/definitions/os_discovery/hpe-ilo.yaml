modules:
    mempools:
        data:
            -
                total: CPQHOST-MIB::cpqHoPhysicalMemorySize
                free: CPQHOST-MIB::cpqHoPhysicalMemoryFree
                index: 0
                precision: 1048576
                descr: 'Physical Memory'
            -
                total: CPQHOST-MIB::cpqHoPagingMemorySize
                free: CPQHOST-MIB::cpqHoPagingMemoryFree
                index: 1
                precision: 1048576
                descr: 'Paging Memory'
    storage:
        data:
            -
                oid: CPQHOST-MIB::cpqHoFileSysTable
                descr: CPQHOST-MIB::cpqHoFileSysDesc
                size: CPQHOST-MIB::cpqHoFileSysSpaceTotal
                used: CPQHOST-MIB::cpqHoFileSysSpaceUsed
                units: 1048576

    os:
        sysDescr_regex: '/Integrated Lights-Out \d (?<version>[\d.]+)/'
        hardware: CPQSINFO-MIB::cpqSiProductName.0
        serial: CPQSINFO-MIB::cpqSiSysSerialNum.0
        version: CPQHOST-MIB::cpqHoFwVerVersion.0
        version_regex: '/(?<version>[\d.]+)/'
    sensors:
        power:
            data:
                -
                    oid: CPQHLTH-MIB::cpqHeFltTolPowerSupplyTable
                    value: CPQHLTH-MIB::cpqHeFltTolPowerSupplyCapacityUsed
                    num_oid: '.1.3.6.1.4.1.232.6.2.9.3.1.7.{{ $index }}'
                    index: 'cpqHeFltTolPowerSupplyBay.{{ $index }}'
                    descr: 'PowerSupply #{{ CPQHLTH-MIB::cpqHeFltTolPowerSupplyBay }}'
                    high_limit: CPQHLTH-MIB::cpqHeFltTolPowerSupplyCapacityMaximum
        temperature:
            data:
                -
                    oid: CPQHLTH-MIB::cpqHeTemperatureTable
                    value: CPQHLTH-MIB::cpqHeTemperatureCelsius
                    num_oid: '.1.3.6.1.4.1.232.6.2.6.8.1.4.{{ $index }}'
                    snmp_flags: '-OtQUSab'
                    index: 'cpqHeTemperatureCelsius.{{ $index }}'
                    descr: CPQHLTH-MIB::cpqHeTemperatureLocale
                    high_limit: '90' #cpqHeTemperatureThreshold
                -
                    oid: CPQIDA-MIB::cpqDaPhyDrvTable
                    value: CPQIDA-MIB::cpqDaPhyDrvCurrentTemperature
                    num_oid: '.1.3.6.1.4.1.232.3.2.5.1.1.70.{{ $index }}'
                    index: 'cpqDaPhyDrvCurrentTemperature.{{ $index }}'
                    descr: CPQIDA-MIB::cpqDaPhyDrvLocationString
        state:
            data:
                -
                    oid: CPQIDA-MIB::cpqDaPhyDrvTable
                    value: CPQIDA-MIB::cpqDaPhyDrvCondition
                    num_oid: '.1.3.6.1.4.1.232.3.2.5.1.1.37.{{ $index }}'
                    descr: 'Disk #{{ CPQIDA-MIB::cpqDaPhyDrvLocationString }}'
                    index: 'cpqDaPhyDrvCondition.{{ $index }}'
                    state_name: cpqDaPhyDrvCondition
                    states:
                -
                    oid: CPQHLTH-MIB::cpqHeFltTolPowerSupplyTable
                    value: CPQHLTH-MIB::cpqHeFltTolPowerSupplyCondition
                    num_oid: '.1.3.6.1.4.1.232.6.2.9.3.1.4.{{ $index }}'
                    descr: 'PowerSupply #{{ CPQHLTH-MIB::cpqHeFltTolPowerSupplyBay }}'
                    index: 'cpqHeFltTolPowerSupplyCondition.{{ $index }}'
                    state_name: cpqHeFltTolPowerSupplyCondition
                    states:
                -
                    oid: CPQHLTH-MIB::cpqHeFltTolFanTable
                    value: CPQHLTH-MIB::cpqHeFltTolFanCondition
                    num_oid: '.1.3.6.1.4.1.232.6.2.6.7.1.9.{{ $index }}'
                    descr: 'Fan #{{ CPQHLTH-MIB::cpqHeFltTolFanIndex }}'
                    index: 'cpqHeFltTolFanCondition.{{ $index }}'
                    state_name: cpqHeFltTolFanCondition
                    states:
                -
                    oid: CPQSTDEQ-MIB::cpqSeCpuTable
                    value: CPQSTDEQ-MIB::cpqSeCpuStatus
                    num_oid: '.1.3.6.1.4.1.232.1.2.2.1.1.6.{{ $index }}'
                    descr: 'Processor #{{ CPQSTDEQ-MIB::cpqSeCpuSocketNumber }}'
                    index: 'cpqSeCpuStatus.{{ $index }}'
                    state_name: cpqSeCpuStatus
                    states:
                -
                    oid: CPQHLTH-MIB::cpqHeResMem2ModuleTable
                    value: CPQHLTH-MIB::cpqHeResMem2ModuleCondition
                    num_oid:  '.1.3.6.1.4.1.232.6.2.14.13.1.20.{{ $index }}'
                    descr: CPQHLTH-MIB::cpqHeResMem2ModuleHwLocation
                    index: 'cpqHeResMem2ModuleCondition.{{ $index }}'
                    state_name: cpqHeResMem2ModuleCondition
                    states:
                -
                    oid: CPQHLTH-MIB::cpqHeSysBatteryTable
                    value: CPQHLTH-MIB::cpqHeSysBatteryCondition
                    num_oid: '.1.3.6.1.4.1.232.6.2.17.2.1.4.{{ $index }}'
                    descr: 'Battery Condition ({{ CPQHLTH-MIB::cpqHeSysBatteryCapacityMaximum }}W {{ CPQHLTH-MIB::cpqHeSysBatteryModel }})'
                    index: 'cpqHeSysBatteryCondition.{{ $index }}'
                    state_name: cpqHeSysBatteryCondition
                    states:
                -
                    oid: CPQHLTH-MIB::cpqHeSysBatteryTable
                    value: CPQHLTH-MIB::cpqHeSysBatteryStatus
                    num_oid: '.1.3.6.1.4.1.232.6.2.17.2.1.5.{{ $index }}'
                    descr: 'Battery Status ({{ CPQHLTH-MIB::cpqHeSysBatteryCapacityMaximum }}W {{ CPQHLTH-MIB::cpqHeSysBatteryModel }})'
                    index: 'cpqHeSysBatteryStatus.{{ $index }}'
                    state_name: cpqHeSysBatteryStatus
                    states:
                -
                    oid: CPQIDA-MIB::cpqDaCntlrTable
                    value: CPQIDA-MIB::cpqDaCntlrCondition
                    num_oid:  '.1.3.6.1.4.1.232.3.2.2.1.1.6.{{ $index }}'
                    descr: 'Array Controller Slot#{{ CPQIDA-MIB::cpqDaCntlrSlot }}'
                    index: 'cpqDaCntlrCondition.{{ $index }}'
                    state_name: cpqDaCntlrCondition
                    states:
                -
                    oid: CPQIDA-MIB::cpqDaAccelTable
                    value: CPQIDA-MIB::cpqDaAccelBattery
                    num_oid:  '.1.3.6.1.4.1.232.3.2.2.2.1.6.{{ $index }}'
                    descr: 'Cache Module Board {{ CPQIDA-MIB::cpqDaAccelCntlrIndex }} Battery'
                    index: 'cpqDaAccelBattery.{{ $index }}'
                    state_name: cpqDaAccelBattery
                    states:
                -
                    oid: CPQIDA-MIB::cpqDaLogDrvTable
                    value: CPQIDA-MIB::cpqDaLogDrvCondition
                    num_oid:  '.1.3.6.1.4.1.232.3.2.3.1.1.11.{{ $index }}'
                    descr: 'Logical Drive #{{ CPQIDA-MIB::cpqDaLogDrvIndex }}'
                    index: 'cpqDaLogDrvCondition.{{ $index }}'
                    state_name: cpqDaLogDrvCondition
                    states:
                -
                    oid: CPQIDA-MIB::cpqDaLogDrvTable
                    value: CPQIDA-MIB::cpqDaLogDrvStatus
                    num_oid:  '.1.3.6.1.4.1.232.3.2.3.1.1.4.{{ $index }}'
                    descr: 'Logical Drive Status #{{ CPQIDA-MIB::cpqDaLogDrvIndex }}'
                    index: 'cpqDaLogDrvIndex.{{ $index }}'
                    state_name: cpqDaLogDrvStatus
                    states:
