                        - { descr: 'asi-in-1', value: 0, generic: 0 }
                        - { descr: 'asi-in-2', value: 1, generic: 0 }
                        - { descr: 'demodulator-1', value: 2, generic: 0 }
                        - { descr: 'demodulator-2', value: 3, generic: 0 }
                        - { descr: 'tsoip-rx1', value: 4, generic: 0 }
                        - { descr: 'tsoip-rx2', value: 5, generic: 0 }
                        - { descr: 'satRecv', value: 6, generic: 0 }
