modules:
    os:
        hardware: PT3080-MIB::pt3080SystemInstrumentType.0
        serial: PT3080-MIB::pt3080SystemInstrumentKU.0
        version: PT3080-MIB::pt3080SystemInstrumentSWRev.0
    sensors:
        state:
            data:
                -
                    oid: PT3080-MIB::pt3080InputTSPrimaryStatus
                    num_oid: '.1.3.6.1.4.1.18086.3080.3.36.{{ $index }}'
                    descr: TS Primary Status
                    group: Input
                    state_name: pt3080InputTSPrimaryStatus
                    states:
                        - { descr: 'Available', value: 0, generic: 0 }
                        - { descr: 'Unavailable', value: 1, generic: 1 }
                        - { descr: 'No sync', value: 2, generic: 2 }
                -
                    oid: PT3080-MIB::pt3080InputTSSecondaryStatus
                    num_oid: '.1.3.6.1.4.1.18086.3080.3.37.{{ $index }}'
                    descr: TS Secondary Status
                    group: Input
                    state_name: pt3080InputTSSecondaryStatus
                    states:
                        - { descr: 'Available', value: 0, generic: 0 }
                        - { descr: 'Unavailable', value: 1, generic: 3 }
                        - { descr: 'No sync', value: 2, generic: 2 }
                -
                    oid: PT3080-MIB::pt3080InputTSHp
                    num_oid: '.1.3.6.1.4.1.18086.3080.3.38.{{ $index }}'
                    descr: Input source On Air
                    group: Input
                    state_name: pt3080InputTSHp
                    states:
                        - { descr: 'asi-in-1', value: 0, generic: 0 }
                        - { descr: 'asi-in-2', value: 1, generic: 0 }
                        - { descr: 'demodulator-1', value: 2, generic: 0 }
