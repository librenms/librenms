modules:
   os:
      version:
         - SFOS-FIREWALL-MIB::sfosDeviceFWVersion.0
      hardware:
         - SFOS-FIREWALL-MIB::sfosDeviceType.0
      serial:
         - SFOS-FIREWALL-MIB::sfosDeviceAppKey.0
   sensors:
      additional_oids:
         data:
            -
               oid:
                  - SFOS-FIREWALL-MIB::sfosIPSecVpnConnName
      state:
         data:
# HA
            -
               oid: SFOS-FIREWALL-MIB::sfosHAStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.4.1.{{ $index }}'
               index: 'sfosHAStatus.{{ $index }}'
               descr: 'HA status'
               group: HA
               value: SFOS-FIREWALL-MIB::sfosHAStatus
               state_name: sfosHAStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosDeviceCurrentHAState
               num_oid: '.1.3.6.1.4.1.2604.5.1.4.4.{{ $index }}'
               index: 'sfosDeviceCurrentHAState.{{ $index }}'
               descr: 'HA local appliance state'
               group: HA
               value: SFOS-FIREWALL-MIB::sfosDeviceCurrentHAState
               state_name: sfosDeviceCurrentHAState
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosDevicePeerHAState
               num_oid: '.1.3.6.1.4.1.2604.5.1.4.5.{{ $index }}'
               index: 'sfosDevicePeerHAState.{{ $index }}'
               descr: 'HA peer appliance state'
               group: HA
               value: SFOS-FIREWALL-MIB::sfosDevicePeerHAState
               state_name: sfosDevicePeerHAState
               states:
# Licensing
            -
               oid: SFOS-FIREWALL-MIB::sfosNetProtectionLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.2.1.{{ $index }}'
               index: 'sfosNetProtectionLicRegStatus.{{ $index }}'
               descr: 'Network Protection registration Lic status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosNetProtectionLicRegStatus
               state_name: sfosNetProtectionLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosWebProtectionLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.3.1.{{ $index }}'
               index: 'sfosWebProtectionLicRegStatus.{{ $index }}'
               descr: 'Web Protection registration Lic status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosWebProtectionLicRegStatus
               state_name: sfosWebProtectionLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosMailProtectionLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.4.1.{{ $index }}'
               index: 'sfosMailProtectionLicRegStatus.{{ $index }}'
               descr: 'EMail Protection Lic Status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosMailProtectionLicRegStatus
               state_name: sfosMailProtectionLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosWebServerProtectionLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.5.1.{{ $index }}'
               index: 'sfosWebServerProtectionLicRegStatus.{{ $index }}'
               descr: 'Web Server Protection Lic status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosWebServerProtectionLicRegStatus
               state_name: sfosWebServerProtectionLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosSandstromLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.6.1.{{ $index }}'
               index: 'sfosSandstromLicRegStatus.{{ $index }}'
               descr: 'Sandstorm Protection Lic status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosSandstromLicRegStatus
               state_name: sfosSandstromLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosEnhancedSupportLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.7.1.{{ $index }}'
               index: 'sfosEnhancedSupportLicRegStatus.{{ $index }}'
               descr: 'Enhanced Support Lic Status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosEnhancedSupportLicRegStatus
               state_name: sfosEnhancedSupportLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosEnhancedPlusLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.8.1.{{ $index }}'
               index: 'sfosEnhancedPlusLicRegStatus.{{ $index }}'
               descr: 'Enhanced Plus Support Lic Status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosEnhancedPlusLicRegStatus
               state_name: sfosEnhancedPlusLicRegStatus
               states:
            -
               oid: SFOS-FIREWALL-MIB::sfosCentralOrchestrationLicRegStatus
               num_oid: '.1.3.6.1.4.1.2604.5.1.5.9.1.{{ $index }}'
               index: 'sfosCentralOrchestrationLicRegStatus.{{ $index }}'
               descr: 'Central Orchestration registration Lic Status'
               group: Licensing
               value: SFOS-FIREWALL-MIB::sfosCentralOrchestrationLicRegStatus
               state_name: sfosCentralOrchestrationLicRegStatus
               states:
      count:
         data:
            -
               oid: SFOS-FIREWALL-MIB::sfosIPSecVpnActiveTunnel
               num_oid: '.1.3.6.1.4.1.2604.5.1.6.1.1.1.1.8.{{ $index }}'
               index: 'sfosIPSecVpnActiveTunnel.{{ $index }}'
               descr: '{{ SFOS-FIREWALL-MIB::sfosIPSecVpnConnName }} active tunnels'
               group: IPSec
