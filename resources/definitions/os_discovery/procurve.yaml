modules:
    mempools:
        data:
            -
                total: NETSWITCH-MIB::hpLocalMemTotalBytes
                free: NETSWITCH-MIB::hpLocalMemFreeBytes
                used: NETSWITCH-MIB::hpLocalMemAllocBytes
                descr: 'Local Memory {{ $index }}'
                type: hpLocal
            -
                total: NETSWITCH-MIB::hpGlobalMemTotalBytes
                free: NETSWITCH-MIB::hpGlobalMemFreeBytes
                used: NETSWITCH-MIB::hpGlobalMemAllocBytes
                descr: 'Global Memory {{ $index }}'
                type: hpGlobal
    os:
        sysDescr_regex:
            - '/^(Aruba|ProCurve|HP) (?<hardware>[^,]+), revision (?<version>[^ ,]+)/'
            - '/^(HPE OfficeConnect Switch|HP ProCurve|HP) (?<hardware>[^,]*), (?<version>P\S[0-9\.]+)/'
            - '/^(Aruba|HPE Networking) Instant On (?<hardware>[^,]+), InstantOn_\d+_(?<version>[0-9\.]+)/'
            - '/^PROCURVE (?<hardware>.*) - (?<version>.*)$/'
            - '/^(?<hardware>GbE2c)/'
        version:
            - NETSWITCH-MIB::hpSwitchOsVersion.0
            - HP-SN-AGENT-MIB::snAgImgVer.0
        serial: SEMI-MIB::hpHttpMgSerialNumber.0
        hardware_replace:
            - ['/  /', ' ']
            - '/ Switch/'
            - '/ Stack/'
    processors:
        data:
            -
                oid: STATISTICS-MIB::hpSwitchCpuStat
                num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.9.6.1.{{ $index }}'
                type: procurve-fixed
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - ENTITY-MIB::entPhysicalDescr
                        - ENTITY-MIB::entPhysicalName
                        - ENTITY-MIB::entPhysicalClass
        temperature:
            data:
                -
                    oid: POWERSUPPLY-MIB::hpicfPsTable
                    value: POWERSUPPLY-MIB::hpicfPsTemp
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.55.1.1.1.4.{{ $index }}'
                    index: 'hpicfPsTemp.{{ $index }}'
                    descr: 'Power Supply #{{ $index }}'
        power:
            data:
                -
                    oid: POWERSUPPLY-MIB::hpicfPsTable
                    value: POWERSUPPLY-MIB::hpicfPsWattageCur
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.55.1.1.1.6.{{ $index }}'
                    index: 'hpicfPsWattageCur.{{ $index }}'
                    high_limit: POWERSUPPLY-MIB::hpicfPsWattageMax
                    descr: 'Power Supply #{{ $index }}'
                -
                    oid: HP-ICF-POE-MIB::hpicfPseFeaturesTable
                    value: HP-ICF-POE-MIB::hpicfPseAvailablePower
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.1.9.1.6.1.4.{{ $index }}'
                    index: 'hpicfPseAvailablePower.{{ $index }}'
                    descr: 'PoE Power Total'
                -
                    oid: HP-ICF-POE-MIB::hpicfPseFeaturesTable
                    value: HP-ICF-POE-MIB::hpicfPseUsedPower
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.1.9.1.6.1.5.{{ $index }}'
                    index: 'hpicfPseUsedPower.{{ $index }}'
                    skip_values:
                        -
                          oid: HP-ICF-POE-MIB::hpicfPseAvailablePower
                          op: '=='
                          value: 0
                    high_limit: HP-ICF-POE-MIB::hpicfPseAvailablePower
                    descr: 'PoE Power Used'
        state:
            data:
                -
                    oid: FAN-MIB::hpicfFanTable
                    value: FAN-MIB::hpicfFanState
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.54.2.1.1.4.{{ $index }}'
                    descr: 'Fan #{{ $index }}'
                    index: 'hpicfFanState.{{ $index }}'
                    state_name: hpicfFanState
                    states:
                        - { descr: removed, value: 1, generic: 3 }
                        - { descr: off, value: 2, generic: 3 }
                        - { descr: underspeed, value: 3, generic: 1 }
                        - { descr: overspeed, value: 4, generic: 1 }
                        - { descr: ok, value: 5, generic: 0 }
                        - { descr: maxstate, value: 6, generic: 3 }
                -
                    oid: POWERSUPPLY-MIB::hpicfPsTable
                    value: POWERSUPPLY-MIB::hpicfPsState
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.55.1.1.1.2.{{ $index }}'
                    descr: 'Power Supply #{{ $index }}'
                    index: 'hpicfPsState.{{ $index }}'
                    state_name: hpicfPsState
                    states:
                        - { descr: psNotPresent, value: 1, generic: 3 }
                        - { descr: psNotPlugged, value: 2, generic: 2 }
                        - { descr: psPowered, value: 3, generic: 0 }
                        - { descr: psFailed, value: 4, generic: 2 }
                        - { descr: psPermFailure, value: 5, generic: 2 }
                        - { descr: psMax, value: 6, generic: 3 }
                -
                    oid:  HP-STACK-MIB::hpStackConfig
                    value: HP-STACK-MIB::hpStackOperStatus
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.69.1.1.2.{{ $index }}'
                    descr: 'Stack State'
                    state_name: hpStackOperStatus
                    states:
                        - { descr: disabled, value: 1, generic: 0 }
                        - { descr: active, value: 2, generic: 0 }
                        - { descr: fragmentInactive, value: 3, generic: 2 }
                        - { descr: unAvailable, value: 0, generic: 0 }
                        - { descr: fragmentActive, value: 4, generic: 2 }
                -
                    oid:  HP-STACK-MIB::hpStackConfig
                    value: HP-STACK-MIB::hpStackTopology
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.69.1.1.4.{{ $index }}'
                    descr: 'Stack Topology'
                    state_name: hpStackTopology
                    skip_values:
                        -
                          oid: HP-STACK-MIB::hpStackOperStatus
                          op: '=='
                          value: 1
                    states:
                        - { descr: unKnown, value: 0, generic: 0 }
                        - { descr: chain, value: 1, generic: 0 }
                        - { descr: ring, value: 2, generic: 0 }
                        - { descr: mesh, value: 3, generic: 0 }
                        - { descr: partialMesh, value: 4, generic: 1 }
                -
                    oid: HP-STACK-MIB::hpStackMemberTable
                    value: HP-STACK-MIB::hpStackMemberState
                    num_oid: '.1.3.6.1.4.1.11.2.14.11.5.1.69.1.3.1.9.{{ $index }}'
                    descr: 'Stack Member State {{ $index }}'
                    index: 'hpStackMemberState.{{ $index }}'
                    state_name: hpStackMemberState
                    states:
                        - { descr: unusedID, value: 0, generic: 0 }
                        - { descr: missing, value: 1, generic: 3 }
                        - { descr: provision, value: 2, generic: 0 }
                        - { descr: commander, value: 3, generic: 0 }
                        - { descr: standby, value: 4, generic: 0 }
                        - { descr: member, value: 5, generic: 0 }
                        - { descr: shutdown, value: 6, generic: 3 }
                        - { descr: booting, value: 7, generic: 3 }
                        - { descr: communicationFailure, value: 8, generic: 3 }
                        - { descr: incompatibleOs , value: 9, generic: 3 }
                        - { descr: unknownState , value: 10, generic: 3 }
                        - { descr: standbyBooting , value: 11, generic: 3 }
                -
                    oid: ENTITY-STATE-MIB::entStateOper
                    value: ENTITY-STATE-MIB::entStateOper
                    num_oid: '.1.3.6.1.2.1.131.1.1.1.3.{{ $index }}'
                    descr: '{{ ENTITY-MIB::entPhysicalName }} [{{ ENTITY-MIB::entPhysicalDescr }}]'
                    index: 'entStateOper.{{ $index }}'
                    state_name: entStateOper
                    states:
                        - { descr: notPresent, value: 1, generic: 3 }
                        - { descr: unknown, value: 2, generic: 1 }
                        - { descr: ok, value: 3, generic: 0 }
                        - { descr: failed, value: 4, generic: 2 }
                    skip_values:
                        -
                            oid: ENTITY-MIB::entPhysicalClass
                            op: 'in_array'
                            value: ['', 5, 6, 7, 8, 10]
