modules:
    os:
        hardware: EATON-ATS2-MIB::ats2IdentPartNumber.0
        serial: EATON-ATS2-MIB::ats2IdentSerialNumber.0
        version: EATON-ATS2-MIB::ats2IdentFWVersion.0
    sensors:
        voltage:
            data:
                -
                    oid: EATON-ATS2-MIB::ats2OutputVoltage
                    value: EATON-ATS2-MIB::ats2OutputVoltage
                    num_oid: '.1.3.6.1.4.1.534.10.2.2.3.1.{{ $index }}'
                    divisor: 10
                    descr: 'Output'
                    index: 'ats2OutputVoltage.{{ $index }}'
        state:
            data:
                -
                    oid: EATON-ATS2-MIB::ats2OperationMode
                    value: EATON-ATS2-MIB::ats2OperationMode
                    num_oid: '.1.3.6.1.4.1.534.10.2.2.4.{{ $index }}'
                    descr: 'EATON-ATS2-MIB::ats2OperationMode'
                    index: 'ats2OperationMode.{{ $index }}'
                    state_name: ats2OperationMode
                    states:
                        - { descr: initialization, value: 1, generic: 1 }
                        - { descr: diagnosis, value: 2, generic: 1 }
                        - { descr: off, value: 3, generic: 2 }
                        - { descr: source1, value: 4, generic: 0 }
                        - { descr: source2, value: 5, generic: 0 }
                        - { descr: safe, value: 6, generic: 1 }
                        - { descr: fault, value: 7, generic: 2 }
                -
                    oid: EATON-ATS2-MIB::ats2InputStatusDephasing
                    value: EATON-ATS2-MIB::ats2InputStatusDephasing
                    num_oid: '.1.3.6.1.4.1.534.10.2.3.1.1.{{ $index }}'
                    descr: 'EATON-ATS2-MIB::ats2InputStatusDephasing'
                    index: 'ats2InputStatusDephasing.{{ $index }}'
                    state_name: ats2InputStatusDephasing
                    states:
                        - { descr: normal, value: 1, generic: 0 }
                        - { descr: outOfRange, value: 2, generic: 1 }

