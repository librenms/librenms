modules:
    sensors:
        state:
            data:
                -
                    oid: KMIB::kDevTable
                    value: KMIB::kStatus
                    num_oid:  '.1.3.6.1.4.1.9193.3.1.7.{{ $index }}'
                    index: 'kKey.{{ $index }}'
                    descr: '{{ KMIB::kKey }}, {{ KMIB::kName }}, {{ KMIB::kDesc }}'
                    state_name: Status
                    states:
                        - { value: 0, generic: 3, descr: 'unknown' }
                        - { value: 1, generic: 3, descr: 'starting' }
                        - { value: 2, generic: 0, descr: 'ok' }
                        - { value: 3, generic: 3, descr: 'aborting' }
                        - { value: 4, generic: 1, descr: 'misbehav' }
                        - { value: 5, generic: 2, descr: 'down' }
                        - { value: 6, generic: 3, descr: 'nopoll' }
                        - { value: 7, generic: 3, descr: 'testing' }
