modules:
  os:
    sysDescr_regex: '/(?<hardware>.*)/'
    version: UPS-MIB::upsIdentUPSSoftwareVersion.0
  sensors:
    temperature:
      data:
          -
            oid: RIELLOUPS-MIB::rupsBatteryExternalTemperature
            value: RIELLOUPS-MIB::rupsBatteryExternalTemperature
            num_oid: '.1.3.6.1.4.1.5491.10.1.10.8.{{ $index }}'
            index: 'rupsBatteryExternalTemperature.{{ $index }}'
            descr: Battery External Temperature
          -
            oid: RIELLOUPS-MIB::rupsChargerTemperature
            value: RIELLOUPS-MIB::rupsChargerTemperature
            num_oid: '.1.3.6.1.4.1.5491.10.1.10.5.{{ $index }}'
            index: 'rupsChargerTemperature.{{ $index }}'
            descr: Charger Temperature
