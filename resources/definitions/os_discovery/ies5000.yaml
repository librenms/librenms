modules:
    mempools:
        data:
            -
                oid: ZYXEL-IES5000-MIB::memoryUsageTable
                percent_used: ZYXEL-IES5000-MIB::memoryCurValue
                descr: ZYXEL-IES5000-MIB::memoryDescr
                warn_percent: ZYXEL-IES5000-MIB::memoryHighThresh
    os:
        serial: .1.3.6.1.4.1.890.1.5.13.5.6.2.1.3.0
        version:
            - .1.3.6.1.4.1.890.1.5.13.5.6.3.1.4.0.1
            - .1.3.6.1.4.1.890.1.5.13.5.6.3.1.4.0.6

    processors:
        data:
            -
                oid: ZYXEL-IES5000-MIB::cpuUtilizationTable
                value: ZYXEL-IES5000-MIB::cpuCurValue
                num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.3.4.1.2.{{ $index }}'
                descr: '{{ $index }} {{ ZYXEL-IES5000-MIB::cpuDescr }}'
                #high_limit: cpuHighThresh
    sensors:
        fanspeed:
            data:
                -
                    oid: ZYXEL-IES5000-MIB::fanRpmTable
                    value: ZYXEL-IES5000-MIB::fanRpmCurValue
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.3.1.1.2.{{ $index }}'
                    descr: '{{ ZYXEL-IES5000-MIB::fanRpmDescr }} Speed'
                    low_limit: ZYXEL-IES5000-MIB::fanRpmLowThresh
                    high_limit: ZYXEL-IES5000-MIB::fanRpmHighThresh
        voltage:
            data:
                -
                    oid: ZYXEL-IES5000-MIB::voltageTable
                    value: ZYXEL-IES5000-MIB::voltageCurValue
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.3.2.1.2.{{ $index }}'
                    descr: '{{ ZYXEL-IES5000-MIB::voltageDescr }} {{ ZYXEL-IES5000-MIB::voltageNominalValue }}mA'
                    divisor: 1000
                    low_limit: ZYXEL-IES5000-MIB::voltageLowThresh
                    high_limit: ZYXEL-IES5000-MIB::voltageHighThresh
        temperature:
            data:
                -
                    oid: ZYXEL-IES5000-MIB::temperatureTable
                    value: ZYXEL-IES5000-MIB::temperatureCurValue
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.3.3.1.2.{{ $index }}'
                    descr: '{{ ZYXEL-IES5000-MIB::temperatureDescr }}'
                    low_limit: ZYXEL-IES5000-MIB::temperatureLowThresh
                    high_limit: ZYXEL-IES5000-MIB::temperatureHighThresh
        state:
            data:
                -
                    oid: ZYXEL-IES5000-MIB::chassisTable
                    value: ZYXEL-IES5000-MIB::chassisStatus
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.6.2.1.5.{{ $index }}'
                    descr: 'Chassis {{ ZYXEL-IES5000-MIB::chassisNumber }} Status'
                    state_name: chassisStatus
                    states:
                -
                    oid: ZYXEL-IES5000-MIB::slotTable
                    value: ZYXEL-IES5000-MIB::slotModuleStatus
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.6.3.1.7.{{ $index }}'
                    descr: '{{ $index }} {{ ZYXEL-IES5000-MIB::slotModuleDescr }} {{ ZYXEL-IES5000-MIB::slotModuleFWVersion }} Status'
                    state_name: slotModuleStatus
                    skip_values: 1
                    states:
                -
                    oid: ZYXEL-IES5000-MIB::systemStatus
                    value: ZYXEL-IES5000-MIB::systemStatus
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.1.1.{{ $index }}'
                    descr: 'System Status'
                    state_name: systemStatus
                    states:
                -
                    oid: ZYXEL-IES5000-MIB::ledAlarmStatus
                    value: ZYXEL-IES5000-MIB::ledAlarmStatus
                    num_oid: '.1.3.6.1.4.1.890.1.5.13.5.11.1.2.1.{{ $index }}'
                    descr: 'Alarm LED Status'
                    state_name: alarmLedStatus
                    states:
