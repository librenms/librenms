modules:
    os:
        features: RAY3-MIB::unitType.0
        hardware: RAY3-MIB::productName.0
        serial: RAY3-MIB::serialNumber.0
        version: RAY3-MIB::swVer.0

    mempools:
        data:
            -
                percent_used: RAY3-MIB::useMemory

    processors:
        data:
            -
                oid: RAY3-MIB::useCpu
                num_oid: '.1.3.6.1.4.1.33555.4.1.5.1.{{ $index }}'

    sensors:
        voltage:
            data:
                -
                    oid: RAY3-MIB::voltageUnit
                    num_oid: '.1.3.6.1.4.1.33555.4.1.4.3.{{ $index }}'
                    descr: Voltage
                    divisor: 10

        temperature:
            data:
                -
                    oid: RAY3-MIB::temperatureRadio
                    num_oid: '.1.3.6.1.4.1.33555.4.1.4.2.{{ $index }}'
                    descr: Temperature
                    divisor: 100

        ber:
            data:
                -
                    oid: RAY3-MIB::ber
                    num_oid: '.1.3.6.1.4.1.33555.4.3.2.11.{{ $index }}'
                    descr: BER
                    low_warn_limit: 0
                    warn_limit: 0

        state:
            data:
                -
                    oid: RAY3-MIB::systemStatus
                    value: RAY3-MIB::systemStatus
                    num_oid: '.1.3.6.1.4.1.33555.4.1.3.1.{{ $index }}'
                    descr: System Status
                    state_name: systemStatus
                    states:

                -
                    oid: RAY3-MIB::txModulationIndex
                    num_oid: '.1.3.6.1.4.1.33555.4.2.1.7.{{ $index }}'
                    descr: Tx Modulation Rate
                    state_name: txModulationIndex-ray3
                    states:

                -
                    oid: RAY3-MIB::rxModulationIndex
                    num_oid: '.1.3.6.1.4.1.33555.4.2.1.8.{{ $index }}'
                    descr: Rx Modulation Rate
                    state_name: rxModulationIndex-ray3
                    states:
