modules:
    os:
        serial: ECRESO-FM-TRANS-MIB::syGeSerial.0
        location: ECRESO-FM-TRANS-MIB::syGeLocation.0
        hardware: ECRESO-FM-TRANS-MIB::syGeType.0
        hardware_replace:
            - ['/E01/', '100W']
            - ['/E03/', '300W']
            - ['/G10/', '1000W']
            - ['/G20/', '2000W']
        version: ECRESO-FM-TRANS-MIB::syGeSoftRel.0
        features: ECRESO-FM-TRANS-MIB::syGeOptList.0
    sensors:
        frequency:
            data:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnRfFrequency
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.4.1.{{ $index }}'
                    descr: 'Frequency'
                    multiplier: 10000
                    index: 1
        power:
            data:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnRfPower
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.3.1.{{ $index }}'
                    descr: 'Power setting'
                    index: 1
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnMsForwardPower
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.3.1.{{ $index }}'
                    descr: 'Foreward Power'
                    index: 2
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnMsReflectedPower
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.3.2.{{ $index }}'
                    descr: 'Reflected Power'
                    divisor: 10
                    index: 3
        count:
            data:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnMsVswrTrip
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.3.4.{{ $index }}'
                    descr: VSWR Trip Counter
                    index: 1
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnMsVSWR
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.3.3.{{ $index }}'
                    descr: VSWR
                    index: 2
                    divisor: 10
                    warn_limit: 1.4
                    high_limit: 1.5
        temperature:
            data:
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoMeAmb
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.1.1.{{ $index }}'
                    descr: Ambient Temperature
                    index: 1
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoMeIntTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.1.10.{{ $index }}'
                    descr: Internal Temperature
                    index: 2
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoMeExcTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.1.11.{{ $index }}'
                    descr: Exciter Temperature
                    index: 3
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoMePsuTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.1.9.{{ $index }}'
                    descr: PSU Temperature
                    index: 4
        state:
            data:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnRfOpmode
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.4.5.{{ $index }}'
                    descr: Operation Mode (TX)
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnGlLocalMode
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.1.4.{{ $index }}'
                    descr: LocalMode
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnGlStandby
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.1.3.{{ $index }}'
                    descr: Standby
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnAl1dB
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.2.9.{{ $index }}'
                    descr: '1 dB Alarm'
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnAl3dB
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.2.1.{{ $index }}'
                    descr: '3 dB Alarm'
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnAlFault
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.2.2.{{ $index }}'
                    descr: 'Fault Alarm'
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::txGnAlWarning
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.7.1.2.3.{{ $index }}'
                    descr: 'Warning'
                    group: 'Device Status'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoAlPsuTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.2.9.{{ $index }}'
                    descr: 'PSU Temperature Alarm'
                    group: 'Temperature Alarms'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoAlIntTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.2.10.{{ $index }}'
                    descr: 'Internal Temperature Alarm'
                    group: 'Temperature Alarms'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::maMoCoAlExcTemp
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.11.1.3.2.11.{{ $index }}'
                    descr: 'Ambient Temperature Alarm'
                    group: 'Temperature Alarms'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::inSeSelectAudio
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.4.2.1.7.{{ $index }}'
                    descr: 'Selected Audio Input'
                    group: 'Audio Input'
                    states:
                -
                    oid: ECRESO-FM-TRANS-MIB::inSeCurrentAudio
                    num_oid: '.1.3.6.1.4.1.6404.3.1.2.4.2.1.8.{{ $index }}'
                    descr: 'Current Audio Input'
                    group: 'Audio Input'
                    states:
