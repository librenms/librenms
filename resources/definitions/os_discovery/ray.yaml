modules:
    os:
        features: RAY-MIB::unitType.0
        hardware: RAY-MIB::productName.0
        serial: RAY-MIB::serialNumber.0
        version: RAY-MIB::swVer.0

    mempools:
        data:
            -
                percent_used: RAY-MIB::useMemory

    processors:
        data:
            -
                oid: RAY-MIB::useCpu
                num_oid: '.1.3.6.1.4.1.33555.1.1.5.1.{{ $index }}'

    sensors:
        voltage:
            data:
                -
                    oid: RAY-MIB::voltageUnit
                    num_oid: '.1.3.6.1.4.1.33555.1.1.4.3.{{ $index }}'
                    descr: Voltage
                    divisor: 10

        temperature:
            data:
                -
                    oid: RAY-MIB::temperatureRadio
                    num_oid: '.1.3.6.1.4.1.33555.1.1.4.2.{{ $index }}'
                    descr: Temperature
                    divisor: 100
        ber:
            data:
                -
                    oid: RAY-MIB::ber
                    num_oid: '.1.3.6.1.4.1.33555.1.3.2.11.{{ $index }}'
                    descr: BER
                    low_warn_limit: 0
                    warn_limit: 0

        state:
            data:
                -
                    oid: RAY-MIB::systemStatus
                    value: RAY-MIB::systemStatus
                    num_oid: '.1.3.6.1.4.1.33555.1.1.3.1.{{ $index }}'
                    descr: System Status
                    state_name: systemStatus
                    states:

                -
                    oid: RAY-MIB::rfPowerStatus
                    value: RAY-MIB::rfPowerStatus
                    num_oid: '.1.3.6.1.4.1.33555.1.1.3.4.{{ $index }}'
                    descr: RF Power Status
                    state_name: rfPowerStatus
                    states:

                -
                    oid: RAY-MIB::lineStatus
                    value: RAY-MIB::lineStatus
                    num_oid: '.1.3.6.1.4.1.33555.1.1.3.2.{{ $index }}'
                    descr: Radio Link Status
                    state_name: lineStatus
                    states:

                -
                    oid: RAY-MIB::ethPeer
                    value: RAY-MIB::ethPeer
                    num_oid: '.1.3.6.1.4.1.33555.1.1.3.6.{{ $index }}'
                    descr: Peer Station Ethernet Status
                    state_name: ethPeer
                    states:

                -
                    oid: RAY-MIB::txModulationIndex
                    num_oid: '.1.3.6.1.4.1.33555.1.2.1.7.{{ $index }}'
                    descr: Tx Modulation Rate
                    state_name: txModulationIndex-ray
                    states:

                -
                    oid: RAY-MIB::rxModulationIndex
                    num_oid: '.1.3.6.1.4.1.33555.1.2.1.8.{{ $index }}'
                    descr: Rx Modulation Rate
                    state_name: rxModulationIndex-ray
                    states:

