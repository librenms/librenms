                        - { descr: 'Power Module Fail', graph: 1, value: 2, generic: 2 }
                        - { descr: 'Control Card Fail', graph: 1, value: 4, generic: 2 }
                        - { descr: 'One Source has failed or are not phase locked', graph: 1, value: 8, generic: 2 }
                        - { descr: 'LvAlarm', graph: 1, value: 16, generic: 2 }
                        - { descr: 'Control Card Overtemp', graph: 1, value: 32, generic: 2 }
                        - { descr: 'SCRs are Warm', graph: 1, value: 64, generic: 1 }
                        - { descr: 'Low DCV', graph: 1, value: 128, generic: 1 }
                        - { descr: 'Popk alarm - System not redunant', graph: 1, value: 512, generic: 1 }
                        - { descr: 'Both sources are dead', graph: 1, value: 1024, generic: 2 }
                        - { descr: 'Fan Failed or Hot Temperature', graph: 1, value: 2048, generic: 2 }
                -
                    oid: EXELTECH-XFERSW::source3Alarms
                    value: EXELTECH-XFERSW::source3Alarms
                    state_name: source3Alarms
                    num_oid: '.1.3.6.1.4.1.30320.1.0.4.3.{{ $index }}'
                    descr: "Source 3 Alarms"
                    index: source3Alarms.{{ $index }}
                    states:
                        - { descr: 'OK', graph: 0, value: 0, generic: 0 }
                        - { descr: 'Power Module Overtemp', graph: 1, value: 1, generic: 2 }
                        - { descr: 'Power Module Fail', graph: 1, value: 2, generic: 2 }
                        - { descr: 'Control Card Fail', graph: 1, value: 4, generic: 2 }
                        - { descr: 'One Source has failed or are not phase locked', graph: 1, value: 8, generic: 2 }
                        - { descr: 'LvAlarm', graph: 1, value: 16, generic: 2 }
                        - { descr: 'Control Card Overtemp', graph: 1, value: 32, generic: 2 }
                        - { descr: 'SCRs are Warm', graph: 1, value: 64, generic: 1 }
                        - { descr: 'Low DCV', graph: 1, value: 128, generic: 1 }
                        - { descr: 'Popk alarm - System not redunant', graph: 1, value: 512, generic: 1 }
                        - { descr: 'Both sources are dead', graph: 1, value: 1024, generic: 2 }
                        - { descr: 'Fan Failed or Hot Temperature', graph: 1, value: 2048, generic: 2 }
                -
                    oid: EXELTECH-XFERSW::MinorAlarm
                    value: EXELTECH-XFERSW::MinorAlarm
                    state_name: MinorAlarm
                    num_oid: '.1.3.6.1.4.1.30320.1.0.4.4.{{ $index }}'
                    descr: "Minor Alarm"
                    index: MinorAlarm.{{ $index }}
                    states:
                        - { descr: 'OK', graph: 0, value: 0, generic: 0 }
                        - { descr: 'Alarm', graph: 1, value: 1, generic: 1 }
                -
                    oid: EXELTECH-XFERSW::MajorAlarm
                    value: EXELTECH-XFERSW::MajorAlarm
                    state_name: MajorAlarm
                    num_oid: '.1.3.6.1.4.1.30320.1.0.4.5.{{ $index }}'
                    descr: "Major Alarm"
                    index: MajorAlarm.{{ $index }}
                    states:
                        - { descr: 'OK', graph: 0, value: 0, generic: 0 }
                        - { descr: 'Alarm', graph: 1, value: 1, generic: 2 }
