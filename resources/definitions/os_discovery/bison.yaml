modules:
    sensors:
        state:
            data:
                -
                    oid: BISON-ROUTER-MIB::licStatus
                    value: BISON-ROUTER-MIB::licStatus
                    num_oid: '.1.3.6.1.4.1.2238.240.1.9.1.{{ $index }}'
                    state_name: licStatus
                    descr: License Status
                    index: '{{ $index }}'
                    states:
                        - { descr: Starting, value: 0, generic: 1 }
                        - { descr: DMI_OK, value: 1, generic: 1 }
                        - { descr: OK, value: 2, generic: 0 }
                        - { descr: Failed, value: 3, generic: 2 }

