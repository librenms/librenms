modules:
  sensors:
    temperature:
      data:
        - oid: LM-SENSORS-MIB::lmTempSensorsTable
          value: LM-SENSORS-MIB::lmTempSensorsValue
          divisor: 1000
          num_oid: '.1.3.6.1.4.1.2021.13.16.2.1.3.{{ $index }}'
          descr: '{{ LM-SENSORS-MIB::lmTempSensorsDevice }}'
          group: LM-SENSORS
    count:
      data:
        - oid: NET-SNMP-EXTEND-MIB::nsExtendOutput1Line
          value: NET-SNMP-EXTEND-MIB::nsExtendOutput1Line
          num_oid: '.1.3.6.1.4.1.8072.1.3.2.4.1.2.{{ $index }}'
          descr: 'Wireless Clients {{ $index }}'
          index: 'clients-.*'
    signal:
      data:
        - oid: NET-SNMP-EXTEND-MIB::nsExtendOutput1Line
          value: NET-SNMP-EXTEND-MIB::nsExtendOutput1Line
          num_oid: '.1.3.6.1.4.1.8072.1.3.2.4.1.2.{{ $index }}'
          descr: 'SNR {{ $index }}'
          index: 'snr-.*'
