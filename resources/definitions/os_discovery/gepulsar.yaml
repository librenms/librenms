modules:
    sensors:
       state:
            data:
                -
                    oid: NE843-MIB::ne843Dc1Rss
                    num_oid: '.1.3.6.1.4.1.10520.2.1.3.1.13.{{ $index }}'
                    state_name: ne843Dc1Rss
                    descr: 'System Status'
                    states:
                        - { descr: normal, value: 0, generic: 0 }
                        - { descr: critical, value: 1, generic: 0 }
                -
                    oid: NE843-MIB::ne843RecTable
                    value: NE843-MIB::ne843RecEntryRfa1
                    state_name: ne843RecTable
                    num_oid: '.1.3.6.1.4.1.10520.2.1.3.7.1.44.{{ $index }}'
                    index: 'ne843RecEntryRfa1.{{ $index }}'
                    descr: '{{ NE843-MIB::ne843RecEntryDes }}'
                    states:
                        - { descr: normal, value: 0, generic: 0 }
                        - { descr: critical, value: 1, generic: 0 }
                -
                    oid: NE843-MIB::ne843AlarmTable
                    value: NE843-MIB::ne843AlarmEntryAst
                    num_oid: '.1.3.6.1.4.1.10520.2.1.3.34.1.3.{{ $index }}'
                    index: 'ne843AlarmEntryAst.{{ $index }}'
                    state_name: ne843AlarmEntryAst
                    descr: '{{ NE843-MIB::ne843AlarmEntryDes }}'
                    skip_values:
                        -
                            oid: NE843-MIB::ne843AlarmEntryDes
                            op: 'not_in_array'
                            value:
                                - 'Auxiliary Major'
                                - 'Rectifier Fail'
                                - 'AC Fail'
                                - 'Multiple Rectifier Fail'
                                - 'Multiple AC Fail'
                                - 'Battery On Discharge'
                                - 'Fan Fail'
                                - 'External Fuse Minor 24V'
                                - 'External Fuse Minor 48V'
                                - 'External Fuse Major 24V'
                                - 'External Fuse Major 48V'
                                - 'Generator Running'
                                - 'Generator Requires Maintenance'
                                - 'Generator Fail'
                                - 'Door Open'
                                - 'Distribution Fuse A'
                                - 'Distribution Fuse B'
                                - 'Very Low Voltage'
                                - 'High Voltage'
                                - 'Very High Voltage'
                                - 'Emergency Power Off'
                                - 'Imminent Low V Shutdown'
                                - 'High Battery Temperature'
                                - 'LVBD1 Open'
                                - 'LVBD1 Failed'
                    states:
                        - { descr: inactive, value: 0, generic: 0 }
                        - { descr: active, value: 1, generic: 2 }

       voltage:
            data:
                - 
                   oid: NE843-MIB::ne843Dc1Vdc
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.1.4.{{ $index }}'
                   descr: 'System DC Voltage'
                   divisor: 1000
                -
                   oid: NE843-MIB::ne843RecTable
                   value: NE843-MIB::ne843RecEntryVac
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.7.1.10.{{ $index }}'
                   index: 'ne843RecEntryVac.{{ $index }}'
                   descr: 'AC Voltage - {{ NE843-MIB::ne843RecEntryDes }}'
       current:
            data:
                -
                   oid: NE843-MIB::ne843Dc1Adc
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.1.5.{{ $index }}'
                   descr: 'System Current'
                -
                   oid: NE843-MIB::ne843RecTable
                   value: NE843-MIB::ne843RecEntryAdc
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.7.1.6.{{ $index }}'
                   descr: 'DC Current - {{ NE843-MIB::ne843RecEntryDes }}'
                   index: 'ne843RecEntryAdc.{{ $index }}'
                -
                   oid: NE843-MIB::ne843RecTable
                   value: NE843-MIB::ne843RecEntryAac
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.7.1.11.{{ $index }}'
                   index: 'ne843RecEntryAac.{{ $index }}'
                   descr: 'AC Current - {{ NE843-MIB::ne843RecEntryDes }}'
                   divisor: 1000
       temperature:
            data:
                -
                   oid: NE843-MIB::ne843RecTable
                   num_oid: '.1.3.6.1.4.1.10520.2.1.3.7.1.12.{{ $index }}'
                   value: NE843-MIB::ne843RecEntryTmp
                   index: 'ne843RecEntryTmp.{{ $index }}'
                   descr: '{{ NE843-MIB::ne843RecEntryDes }}'
