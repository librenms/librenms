modules:
    os:
        version: TERRA-sti440-MIB::infVersion.0
        serial: TERRA-sti440-MIB::infSerNum.0

    processors:
        data:
            -
                oid: TERRA-sti440-MIB::sti440status
                value: TERRA-sti440-MIB::cpuLoad
                num_oid: '.1.3.6.1.4.1.30631.1.18.1.326.3.{{ $index }}'
                descr: 'Chassis CPU load'
                index: 0

    sensors:
        bitrate:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inTotbr
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.326.1.{{ $index }}'
                    descr: 'Input'
                    index: 0
                    group: Total
                    multiplier: 100000
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::outTotbr
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.326.2.{{ $index }}'
                    descr: 'Output'
                    index: 1
                    group: Total
                    multiplier: 100000
        temperature:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::intTemp
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.326.4.{{ $index }}'
                    descr: 'Chassis Temp (C)'
                    index: 0
        voltage:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::volt
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.326.5.{{ $index }}'
                    descr: 'Supply Voltage'
                    index: 0
                    divisor: 10
        state:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inLock1
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.1.1.{{ $index }}'
                    descr: 'Input 1 / {{ TERRA-sti440-MIB::instd1 }} / {{ TERRA-sti440-MIB::inmod1 }}'
                    index: '1.1.{{ $index }}'
                    group: Tuner Lock
                    state_name: TERRA-sti440-MIB::inLock1
                    states:
                        - { value: 1, generic: 0, descr: OK }
                        - { value: 0, generic: 3, descr: Error }
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inLock2
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.2.1.{{ $index }}'
                    descr: 'Input 2 / {{ TERRA-sti440-MIB::instd2 }} / {{ TERRA-sti440-MIB::inmod2 }}'
                    index: '2.1.{{ $index }}'
                    group: Tuner Lock
                    state_name: TERRA-sti440-MIB::inLock2
                    states:
                        - { value: 1, generic: 0, descr: OK }
                        - { value: 0, generic: 3, descr: Error }
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inLock3
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.3.1.{{ $index }}'
                    descr: 'Input 3 / {{ TERRA-sti440-MIB::instd3 }} / {{ TERRA-sti440-MIB::inmod3 }}'
                    index: '3.1.{{ $index }}'
                    group: Tuner Lock
                    state_name: TERRA-sti440-MIB::inLock3
                    states:
                        - { value: 1, generic: 0, descr: OK }
                        - { value: 0, generic: 3, descr: Error }
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inLock4
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.4.1.{{ $index }}'
                    descr: 'Input 4 / {{ TERRA-sti440-MIB::instd4 }} / {{ TERRA-sti440-MIB::inmod4 }}'
                    index: '4.1.{{ $index }}'
                    group: Tuner Lock
                    state_name: TERRA-sti440-MIB::inLock4
                    states:
                        - { value: 1, generic: 0, descr: OK }
                        - { value: 0, generic: 3, descr: Error }
        snr:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::insnr1
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.1.5.{{ $index }}'
                    descr: 'Input 1 / {{ TERRA-sti440-MIB::instd1 }} / {{ TERRA-sti440-MIB::inmod1 }}'
                    index: '1.5.{{ $index }}'
                    divisor: 10
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::insnr2
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.2.5.{{ $index }}'
                    descr: 'Input 2 / {{ TERRA-sti440-MIB::instd2 }} / {{ TERRA-sti440-MIB::inmod2 }}'
                    index: '2.5.{{ $index }}'
                    divisor: 10
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::insnr3
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.3.5.{{ $index }}'
                    descr: 'Input 3 / {{ TERRA-sti440-MIB::instd3 }} / {{ TERRA-sti440-MIB::inmod3 }}'
                    index: '3.5.{{ $index }}'
                    divisor: 10
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::insnr4
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.4.5.{{ $index }}'
                    descr: 'Input 4 / {{ TERRA-sti440-MIB::instd4 }} / {{ TERRA-sti440-MIB::inmod4 }}'
                    index: '4.5.{{ $index }}'
                    divisor: 10
        ber:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inber1
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.1.6.{{ $index }}'
                    descr: 'Input 1 / {{ TERRA-sti440-MIB::instd1 }} / {{ TERRA-sti440-MIB::inmod1 }}'
                    index: '1.6.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inber2
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.2.6.{{ $index }}'
                    descr: 'Input 2 / {{ TERRA-sti440-MIB::instd2 }} / {{ TERRA-sti440-MIB::inmod2 }}'
                    index: '2.6.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inber3
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.3.6.{{ $index }}'
                    descr: 'Input 3 / {{ TERRA-sti440-MIB::instd3 }} / {{ TERRA-sti440-MIB::inmod3 }}'
                    index: '3.6.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inber4
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.4.6.{{ $index }}'
                    descr: 'Input 4 / {{ TERRA-sti440-MIB::instd4 }} / {{ TERRA-sti440-MIB::inmod4 }}'
                    index: '4.6.{{ $index }}'
        count:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inccerr1
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.1.10.{{ $index }}'
                    descr: 'Input 1 / {{ TERRA-sti440-MIB::instd1 }} / {{ TERRA-sti440-MIB::inmod1 }}'
                    index: '1.10.{{ $index }}'
                    group: CCERR
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inccerr2
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.2.10.{{ $index }}'
                    descr: 'Input 2 / {{ TERRA-sti440-MIB::instd2 }} / {{ TERRA-sti440-MIB::inmod2 }}'
                    index: '2.10.{{ $index }}'
                    group: CCERR
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inccerr3
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.3.10.{{ $index }}'
                    descr: 'Input 3 / {{ TERRA-sti440-MIB::instd3 }} / {{ TERRA-sti440-MIB::inmod3 }}'
                    index: '3.10.{{ $index }}'
                    group: CCERR
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inccerr4
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.4.10.{{ $index }}'
                    descr: 'Input 4 / {{ TERRA-sti440-MIB::instd4 }} / {{ TERRA-sti440-MIB::inmod4 }}'
                    index: '4.10.{{ $index }}'
                    group: CCERR
        tv_signal:
            data:
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inlevel1
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.1.3.{{ $index }}'
                    descr: 'Input 1 / {{ TERRA-sti440-MIB::instd1 }} / {{ TERRA-sti440-MIB::inmod1 }}'
                    index: '1.3.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inlevel2
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.2.3.{{ $index }}'
                    descr: 'Input 2 / {{ TERRA-sti440-MIB::instd2 }} / {{ TERRA-sti440-MIB::inmod2 }}'
                    index: '2.3.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inlevel3
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.3.3.{{ $index }}'
                    descr: 'Input 3 / {{ TERRA-sti440-MIB::instd3 }} / {{ TERRA-sti440-MIB::inmod3 }}'
                    index: '3.3.{{ $index }}'
                -
                    oid: TERRA-sti440-MIB::sti440status
                    value: TERRA-sti440-MIB::inlevel4
                    num_oid: '.1.3.6.1.4.1.30631.1.18.1.4.3.{{ $index }}'
                    descr: 'Input 4 / {{ TERRA-sti440-MIB::instd4 }} / {{ TERRA-sti440-MIB::inmod4 }}'
                    index: '4.3.{{ $index }}'
