                    num_oid: '.1.3.6.1.4.1.2011.6.157.2.1.1.4.{{ $index }}'
                    descr: '{{ ENTITY-MIB::entPhysicalName }}'
                    index: '{{ $index }}'
                    divisor: 1000
                    skip_values:
                        -
                            oid: HUAWEI-ENERGYMNGT-MIB::hwBoardCurrentPower
                            op: '='
                            value: '-1'
                        -
                            oid: ENTITY-MIB::entPhysicalName
                            op: '='
                            value: ''
                -
                    oid: HUAWEI-ENERGYMNGT-MIB::hwBoardPowerMngtTable
