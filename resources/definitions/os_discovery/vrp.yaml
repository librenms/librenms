                    num_oid: '.1.3.6.1.4.1.2011.5.25.31.1.1.18.1.7.{{ $index }}'
                    descr: 'PWR{{ HUAWEI-ENTITY-EXTENT-MIB::hwEntityPwrSlot }}'
