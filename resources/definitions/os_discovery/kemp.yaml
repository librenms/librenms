modules:
    sensors:
        state:
           data:
                -
                    oid: B100-MIB::b100VSTable
                    value: B100-MIB::vSState
                    num_oid: '.1.3.6.1.4.1.12196.13.1.1.14.{{ $index }}'
                    descr: '{{ B100-MIB::vSName }}'
                    index: '{{ $index }}'
                    state_name: B100-MIB::vSState
                    states:
                        - { value: 1, generic: 0, descr: In Service }
                        - { value: 2, generic: 2, descr: Out of Service }
                        - { value: 4, generic: 1, descr: Disabled }
                        - { value: 5, generic: 1, descr: Sorry }
                        - { value: 6, generic: 0, descr: Redirect }
                        - { value: 7, generic: 2, descr: Error Message }
                        - { value: 8, generic: 2, descr: Security Down }
