modules:
    sensors:
        temperature:
            data:
                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrPerfBaseTable
                    value: MNI-PROTEUS-AMT-MIB::mnPrPerfBaseRFUTemp
                    num_oid: '.1.3.6.1.4.1.3323.13.1.4.1.1.20.{{ $index }}'
                    descr: 'RFU Temp {{ $index }}'
                    index: '{{ $index }}'
                    high_limit: '50'
                    low_limit: '-20'
        state:
            data:
                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrLinkStatLinkUp
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.1.1.{{ $index }}'
                    descr: 'Link Up {{ $index }}'
                    index: '0'
                    state_name: mnPrLinkStatLinkUp
                    states:
                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrRadStatControlOn
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.2.1.5.{{ $index }}'
                    descr: 'Link Control {{ $index }}'
                    index: 'StatControlOn{{ $index }}'
                    state_name: mnPrRadStatControlOn
                    states:

                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrRadStatCurSeverity
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.2.1.2.{{ $index }}'
                    descr: 'Current Alarm Severity {{ $index }}'
                    index: 'CurSeverity{{ $index }}'
                    state_name: mnPrRadStatCurSeverity
                    states:

                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrRadStatLatchSeverity
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.2.1.3.{{ $index }}'
                    descr: 'Current Latched Alarm Severity {{ $index }}'
                    index: 'LatchSeverity{{ $index }}'
                    state_name: mnPrRadStatLatchSeverity
                    states:

                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrRadStatProtManualMode
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.2.1.26.{{ $index }}'
                    descr: 'Manual Protection Mode{{ $index }} '
                    index: 'ManualMode{{ $index }}'
                    state_name: mnPrRadStatProtManualMode
                    states:

                -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrRadStatModulation
                    num_oid: '.1.3.6.1.4.1.3323.13.1.1.2.1.36.{{ $index }}'
                    descr: 'Current Modulation {{ $index }}'
                    index: 'Modulation{{ $index }}'
                    state_name: mnPrRadStatModulation
                    states:

        signal:
             data:
                 -
                    oid: MNI-PROTEUS-AMT-MIB::mnPrPerfBaseFadeMargin
                    num_oid: '.1.3.6.1.4.1.3323.13.1.4.1.1.4.{{ $index }}'
                    descr: 'Fade Margin {{ $index }}'
                    index: 'FadeMargin{{ $index }}'
                    low_limit: '6'
                    low_warn_limit: '12'
                    high_limit: '50'
