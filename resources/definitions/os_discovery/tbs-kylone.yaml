modules:
    os:
        sysDescr_regex: '/\b(?<features>\d+\.\d+\.\d+(?:-[^\s]+)?)\b/'
        hardware: SKYLONE-MIB::productName
        version:
            - SKYLONE-MIB::productVersion
            - SKYLONE-MIB::productBuild
        version_template: '{{ SKYLONE-MIB::productVersion }} - {{ SKYLONE-MIB::productBuild }}'
