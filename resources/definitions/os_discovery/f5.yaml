modules:
    os:
        hardware: F5-BIGIP-SYSTEM-MIB::sysPlatformInfoMarketingName.0
        serial: F5-BIGIP-SYSTEM-MIB::sysGeneralChassisSerialNum.0
        version: F5-BIGIP-SYSTEM-MIB::sysProductVersion.0
    mempools:
        data:
            -
                used: F5-BIGIP-SYSTEM-MIB::sysStatMemoryUsed
                total: F5-BIGIP-SYSTEM-MIB::sysStatMemoryTotal
                descr: 'TMM Memory'
                index: 0
            -
                used: F5-BIGIP-SYSTEM-MIB::sysGlobalHostOtherMemoryUsed
                total: F5-BIGIP-SYSTEM-MIB::sysGlobalHostOtherMemoryTotal
                descr: 'Other Memory'
                index: 1
            -
                used: F5-BIGIP-SYSTEM-MIB::sysGlobalHostSwapUsed
                total: F5-BIGIP-SYSTEM-MIB::sysGlobalHostSwapTotal
                descr: 'Swap Memory'
                index: 2
    sensors:
        state:
            data:
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysCmFailoverStatusId
                    num_oid: '.1.3.6.1.4.1.3375.2.1.14.3.1.{{ $index }}'
                    state_name: sysCmFailoverStatusId
                    index: 'sysCmFailoverStatusId.{{ $index }}'
                    descr: Failover State
                    group: HA
                    states:
                        - { value: 0, descr: 'Unknown', generic: 3 }
                        - { value: 1, descr: 'OffLine', generic: 2 }
                        - { value: 2, descr: 'ForcedOffline', generic: 2 }
                        - { value: 3, descr: 'Standby', generic: 0 }
                        - { value: 4, descr: 'Active', generic: 0 }
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysCmSyncStatusId
                    state_name: sysCmSyncStatusId
                    num_oid: '.1.3.6.1.4.1.3375.2.1.14.1.1.{{ $index }}'
                    index: 'sysCmSyncStatusId.{{ $index }}'
                    descr: Sync State
                    group: HA
                    states:
                        - { value: 0, descr: 'unknown', generic: 3 }
                        - { value: 1, descr: 'syncing', generic: 1 }
                        - { value: 2, descr: 'needManualSync', generic: 2 }
                        - { value: 3, descr: 'inSync', generic: 0 }
                        - { value: 4, descr: 'syncFailed', generic: 1 }
                        - { value: 5, descr: 'syncDisconnected', generic: 2 }
                        - { value: 6, descr: 'standalone', generic: 0 }
                        - { value: 7, descr: 'awaitingInitialSync', generic: 1 }
                        - { value: 8, descr: 'incompatibleVersion', generic: 2 }
                        - { value: 9, descr: 'partialSync', generic: 2 }
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysCmFailoverStatusColor
                    state_name: sysCmFailoverStatusColor
                    num_oid: '.1.3.6.1.4.1.3375.2.1.14.3.3.{{ $index }}'
                    index: 'sysCmFailoverStatusColor.{{ $index }}'
                    descr: Failover State Color
                    group: HA
                    states:
                        - { value: 0, descr: 'Green: functioning correctly', generic: 0 }
                        - { value: 1, descr: 'Yellow: functioning suboptimally', generic: 1 }
                        - { value: 2, descr: 'Red: requires attention to function correctly', generic: 2 }
                        - { value: 3, descr: 'Blue: status is unknown', generic: 3 }
                        - { value: 4, descr: 'Gray: intentionally not functioning', generic: 0 }
                        - { value: 5, descr: 'Black: not connected to any peers', generic: 2 }
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysChassisPowerSupplyStatus
                    state_name: sysChassisPowerSupplyStatus
                    num_oid: '.1.3.6.1.4.1.3375.2.1.3.2.2.2.1.2.{{ $index }}'
                    index: 'sysChassisPowerSupplyStatus.{{ $index }}'
                    descr: "Power Supply Status {{ $index }}"
                    group: Hardware
                    states:
                        - { value: 0, descr: 'Bad', generic: 2 }
                        - { value: 1, descr: 'Good', generic: 0 }
                        - { value: 2, descr: 'NotPresent', generic: 3 }
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysChassisFanStatus
                    state_name: sysChassisFanStatus
                    num_oid: '.1.3.6.1.4.1.3375.2.1.3.2.1.2.1.2.{{ $index }}'
                    index: 'sysChassisFanStatus.{{ $index }}'
                    descr: "Fan Status {{ $index }}"
                    group: Hardware
                    states:
                        - { value: 0, descr: 'Bad', generic: 2 }
                        - { value: 1, descr: 'Good', generic: 0 }
                        - { value: 2, descr: 'NotPresent', generic: 3 }
        count:
            data:
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysStatClientCurConns
                    num_oid: '.1.3.6.1.4.1.3375.2.1.1.2.1.8.{{ $index }}'
                    index: 'sysStatClientCurConns.{{ $index }}'
                    descr: 'Current connections from client-side'
                    group: Connections
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysStatServerCurConns
                    num_oid: '.1.3.6.1.4.1.3375.2.1.1.2.1.15.{{ $index }}'
                    index: 'sysStatServerCurConns.{{ $index }}'
                    descr: 'Current connections from server-side'
                    group: Connections
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysStatClientCurConns1m
                    num_oid: '.1.3.6.1.4.1.3375.2.1.1.2.1.79.{{ $index }}'
                    index: 'sysStatClientCurConns1m.{{ $index }}'
                    descr: 'Average current connections from client-side'
                    group: Connections
                -
                    oid: F5-BIGIP-SYSTEM-MIB::sysStatServerCurConns1m
                    num_oid: '.1.3.6.1.4.1.3375.2.1.1.2.1.86.{{ $index }}'
                    index: 'sysStatServerCurConns1m.{{ $index }}'
                    descr: 'Average Current connections from server-side'
                    group: Connections
