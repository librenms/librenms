modules:
    os:
        hardware:
          - .1.3.6.1.2.1.47.1.1.1.1.7.1
          - .1.3.6.1.2.1.47.1.1.1.1.8.1
        hardware_template: '{{ .1.3.6.1.2.1.47.1.1.1.1.7.1 }} rev{{ .1.3.6.1.2.1.47.1.1.1.1.8.1 }}'
        serial: .1.3.6.1.2.1.47.1.1.1.1.11.1
        version: .1.3.6.1.2.1.16.19.2.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - IF-MIB::ifDescr
        ber:
            data:
                -
                    oid: AOS-CORE-FACILITY-MIB::aosCoreFacCurrFecBitErrorRate
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.3.2.4.1.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} FEC Bit Error Rate'
                    index: 'FEC-BER-{{ $index }}'
                    group: FEC
                    skip_values: 0
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
        chromatic_dispersion:
            data:
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmQualityCdc
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.5.1.1.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }}'
                    index: 'cdc-{{ $index }}'
                    group: Chromatic Dispersion
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
        dbm:
            data:
                -
                    oid: AOS-CORE-FACILITY-MIB::aosCoreFacCurrOpticalPowerRx
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.3.2.1.1.1.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Rx'
                    index: 'tpnd-rx-{{ $index }}'
                    group: Laser Rx
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
                -
                    oid: AOS-CORE-FACILITY-MIB::aosCoreFacCurrOpticalPowerTx
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.3.2.1.1.2.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Tx'
                    index: 'tpnd-tx-{{ $index }}'
                    group: Laser Tx
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmOscOptPowerRx
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.1.1.1.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Amp Rx'
                    index: 'otn-tx-{{ $index }}'
                    group: OTN Laser Rx
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmSpanLossRx
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.3.1.1.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Span Loss Rx'
                    index: 'otn-spanloss-rx-{{ $index }}'
                    group: OTN Span Loss
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmSpanLossTx
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.3.1.2.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Span Loss Tx'
                    index: 'otn-spanloss-tx-{{ $index }}'
                    group: OTN Span Loss
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
        temperature:
            data:
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmOscLaserTemp
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.2.1.2.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Laser Temperature'
                    index: 'temp-laser-{{ $index }}'
                    group: OTN Laser Temperature
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
        quality_factor:
            data:
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmAmpTotalGain
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.4.1.2.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} Gain (dB)'
                    index: 'gainamp-{{ $index }}'
                    group: OTN Gain
                    divisor: 10
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
        snr:
            data:
                -
                    oid: AOS-CORE-FACILITY-MIB::aosCoreFacCurrSnrValue
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.3.2.7.{{ $index }}'
                    descr: '{{ IF-MIB::ifDescr }} SNR'
                    index: 'SNR-{{ $index }}'
                    group: SNR
                    entPhysicalIndex: '{{ $index }}'
                    entPhysicalIndex_measured: ports
                -
                    oid: AOS-DOMAIN-OTN-PM-MIB::aosDomainOtnPmQualitySnr
                    num_oid: '.1.3.6.1.4.1.2544.1.20.1.5.2.5.1.3.{{ $index }}'
