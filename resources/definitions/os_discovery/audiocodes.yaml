modules:
    os:
        hardware: AC-SYSTEM-MIB::acSysIdName.0
        serial: AC-SYSTEM-MIB::acSysIdSerialNumber.0
        version: AC-SYSTEM-MIB::acSysVersionSoftware.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - AcGateway::callerDisplayCallerDisplay
                        - AcGateway::channelsStartingPhoneNum
                        - AC-ANALOG-MIB::acAnalogFxsFxoType
                        - AC-PSTN-MIB::acTrunkDialPlanName
                        - DS1-MIB::dsx1CircuitIdentifier
        count:
            data:
                -
                    oid: 'AC-KPI-MIB::acKpiSbcCallStatsCurrentSrdActiveCallsIn' # MIB not supplied by vendor
                    value: 'AC-KPI-MIB::acKpiSbcCallStatsCurrentSrdActiveCallsIn'
                    num_oid: '.1.3.6.1.4.1.5003.15.3.1.1.2.2.1.3.{{ $index }}'
                    index: 'acKpiSbcCallStatsCurrentSrdActiveCallsIn.{{ $index }}'
                    descr: 'Active Calls'
        state:
            data:
                -
                    oid: AcGateway::accountTable
                    value: AcGateway::accountRowStatus
                    num_oid: '.1.3.6.1.4.1.5003.9.10.3.1.1.22.21.1.2.{{ $index }}'
                    index: 'accountTable.{{ $index }}.2'
                    descr: 'System Account Status {{ $index }}'
                    state_name: accountRowStatus
                    states:
                -
                    oid: AC-SYSTEM-MIB::acSysStateOperational
                    value: AC-SYSTEM-MIB::acSysStateOperational
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.5.2.{{ $index }}'
                    descr: 'System operational'
                    state_name: acSysStateOperational
                    states:
                -
                    oid: AC-SYSTEM-MIB::acSysStateGWSeverity
                    value: AC-SYSTEM-MIB::acSysStateGWSeverity
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.5.4.{{ $index }}'
                    descr: 'System GW status'
                    state_name: acSysStateGWSeverity
                    states:
                -
                    oid: AC-SYSTEM-MIB::acSysHAStatusReady
                    value: AC-SYSTEM-MIB::acSysHAStatusReady
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.10.1.{{ $index }}'
                    descr: 'System HA status ready'
                    state_name: acSysHAStatusReady
                    states:
                -
                    oid: AcBoard::channelStatusTable
                    value: AcBoard::rTPActive
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.1.{{ $index }}'
                    descr: 'SBC SIP Channel {{ $index }} active'
                    index: 'hookStatus{{ $index }}'
                    state_name: channelHookState
                    states:
                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'FXO {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 0

                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'FXS {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 1
                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'E&M {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 2
                -
                    oid: AC-PSTN-MIB::acTrunkTable
                    value: AC-PSTN-MIB::acTrunkAdministrativeState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.1.1.1.1.1.2.{{ $index }}'
                    descr: 'Trunk {{ $index }} AdminStatus ({{ AC-PSTN-MIB::acTrunkDialPlanName }})'
                    index: 'trunkAdminStatus{{ $index }}'
                    state_name: acTrunkAdministrativeState
                    states:
                -
                    oid: AC-PSTN-MIB::acTrunkTable
                    value: AC-PSTN-MIB::acTrunkProtocolType
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.1.1.1.1.1.3.{{ $index }}'
                    descr: 'Trunk {{ $index }} Type ({{ AC-PSTN-MIB::acTrunkDialPlanName }})'
                    index: 'trunkProtocolType{{ $index }}'
                    state_name: acTrunkProtocolType
                    states:
                -
                    oid: AC-PSTN-MIB::acTrunkStatusTable
                    value: AC-PSTN-MIB::acTrunkStatusAlarm
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.2.1.1.1.7.{{ $index }}'
                    descr: 'Trunk Status {{ $index }})'
                    index: 'trunkStatus{{ $index }}'
                    high_limit: AC-PM-PSTN-MIB::acPMTrunkUtilizationAttributesHighThreshold
                    low_limit: -1
                    state_name: acTrunkUtilization
                    states:
                -
                    oid: DS1-MIB::dsx1ConfigTable
                    value: DS1-MIB::dsx1LoopbackConfig
                    num_oid: '.1.3.6.1.2.1.10.18.6.1.9.{{ $index }}'
                    descr: 'DS1 LoopbackConfig ({{ DS1-MIB::dsx1CircuitIdentifier }}){{ $index }}'
                    index: 'DS1loopback{{ $index }}'
                    state_name: dsx1LoopbackConfig
                    states:
