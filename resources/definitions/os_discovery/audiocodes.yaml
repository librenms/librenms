modules:
    os:
        hardware: AC-SYSTEM-MIB::acSysIdName.0
        serial: AC-SYSTEM-MIB::acSysIdSerialNumber.0
        version: AC-SYSTEM-MIB::acSysVersionSoftware.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - AcGateway::callerDisplayCallerDisplay
                        - AcGateway::channelsStartingPhoneNum
                        - AC-ANALOG-MIB::acAnalogFxsFxoType
                        - AC-PSTN-MIB::acTrunkDialPlanName
                        - DS1-MIB::dsx1CircuitIdentifier
        count:
            data:
                -
                    oid: 'AC-KPI-MIB::acKpiSbcCallStatsCurrentSrdActiveCallsIn' # MIB not supplied by vendor
                    value: 'AC-KPI-MIB::acKpiSbcCallStatsCurrentSrdActiveCallsIn'
                    num_oid: '.1.3.6.1.4.1.5003.15.3.1.1.2.2.1.3.{{ $index }}'
                    index: 'acKpiSbcCallStatsCurrentSrdActiveCallsIn.{{ $index }}'
                    descr: 'Active Calls'
        state:
            data:
                -
                    oid: AcGateway::accountTable
                    value: AcGateway::accountRowStatus
                    num_oid: '.1.3.6.1.4.1.5003.9.10.3.1.1.22.21.1.2.{{ $index }}'
                    index: 'accountTable.{{ $index }}.2'
                    descr: 'System Account Status {{ $index }}'
                    state_name: accountRowStatus
                    states:
                        - { descr: active, value: 1, generic: 0 }
                        - { descr: notInService, value: 2, generic: 2 }
                        - { descr: notReady, value: 3, generic: 2 }
                        - { descr: createAndGo, value: 4, generic: 1 }
                        - { descr: createAndWait, value: 5, generic: 1 }
                        - { descr: destroy, value: 6, generic: 2 }
                -
                    oid: AC-SYSTEM-MIB::acSysStateOperational
                    value: AC-SYSTEM-MIB::acSysStateOperational
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.5.2.{{ $index }}'
                    descr: 'System operational'
                    state_name: acSysStateOperational
                    states:
                        - { descr: disabled, value: 1, generic: 2 }
                        - { descr: enabled, value: 2, generic: 0 }
                -
                    oid: AC-SYSTEM-MIB::acSysStateGWSeverity
                    value: AC-SYSTEM-MIB::acSysStateGWSeverity
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.5.4.{{ $index }}'
                    descr: 'System GW status'
                    state_name: acSysStateGWSeverity
                    states:
                        - { descr: noAlarm, value: 0, generic: 0 }
                        - { descr: indeterminate, value: 1, generic: 0 }
                        - { descr: warning, value: 2, generic: 1 }
                        - { descr: minor, value: 3, generic: 1 }
                        - { descr: major, value: 4, generic: 2 }
                        - { descr: critical, value: 5, generic: 2 }
                -
                    oid: AC-SYSTEM-MIB::acSysHAStatusReady
                    value: AC-SYSTEM-MIB::acSysHAStatusReady
                    num_oid: '.1.3.6.1.4.1.5003.9.10.10.2.10.1.{{ $index }}'
                    descr: 'System HA status ready'
                    state_name: acSysHAStatusReady
                    states:
                        - { descr: no, value: 3, generic: 2 }
                        - { descr: yes, value: 2, generic: 0 }
                        - { descr: notApplicable, value: 1, generic: 3 }
                -
                    oid: AcBoard::channelStatusTable
                    value: AcBoard::rTPActive
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.1.{{ $index }}'
                    descr: 'SBC SIP Channel {{ $index }} active'
                    index: 'hookStatus{{ $index }}'
                    state_name: channelHookState
                    states:
                        - { descr: offHook, value: 0, generic: 0 }
                        - { descr: onHook, value: 1, generic: 0 }
                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'FXO {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                        - { descr: offHook, value: 0, generic: 0 }
                        - { descr: onHook, value: 1, generic: 0 }
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 0

                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'FXS {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                        - { descr: offHook, value: 0, generic: 0 }
                        - { descr: onHook, value: 1, generic: 0 }
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 1
                -
                    oid: AC-ANALOG-MIB::acAnalogFxsFxoTable
                    value: AC-ANALOG-MIB::acAnalogFxsFxoHookState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.1.4.1.1.18.{{ $index }}'
                    descr: 'E&M {{ $index }} ({{ AcGateway::callerDisplayCallerDisplay }}, {{ AcGateway::channelsStartingPhoneNum }})'
                    index: 'hookStatus{{ $index }}'
                    state_name: acAnalogFxsFxoHookState
                    states:
                        - { descr: offHook, value: 0, generic: 0 }
                        - { descr: onHook, value: 1, generic: 0 }
                    skip_values:
                        -
                            oid: AC-ANALOG-MIB::acAnalogFxsFxoType
                            op: '!='
                            value: 2
                -
                    oid: AC-PSTN-MIB::acTrunkTable
                    value: AC-PSTN-MIB::acTrunkAdministrativeState
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.1.1.1.1.1.2.{{ $index }}'
                    descr: 'Trunk {{ $index }} AdminStatus ({{ AC-PSTN-MIB::acTrunkDialPlanName }})'
                    index: 'trunkAdminStatus{{ $index }}'
                    state_name: acTrunkAdministrativeState
                    states:
                        - { descr: locked, value: 0, generic: 0 }
                        - { descr: unLocked, value: 1, generic: 0 }
                -
                    oid: AC-PSTN-MIB::acTrunkTable
                    value: AC-PSTN-MIB::acTrunkProtocolType
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.1.1.1.1.1.3.{{ $index }}'
                    descr: 'Trunk {{ $index }} Type ({{ AC-PSTN-MIB::acTrunkDialPlanName }})'
                    index: 'trunkProtocolType{{ $index }}'
                    state_name: acTrunkProtocolType
                    states:
                        - { descr: NONE , value: 0 , generic: 0 }
                        - { descr: E1_EURO_ISDN , value: 1 , generic: 0 }
                        - { descr: T1_CAS , value: 2 , generic: 0 }
                        - { descr: T1_RAW_CAS , value: 3 , generic: 0 }
                        - { descr: T1_TRANSPARENT , value: 4 , generic: 0 }
                        - { descr: E1_TRANSPARENT_31 , value: 5 , generic: 0 }
                        - { descr: E1_TRANSPARENT_30 , value: 6 , generic: 0 }
                        - { descr: E1_MFCR2 , value: 7 , generic: 0 }
                        - { descr: E1_CAS , value: 8 , generic: 0 }
                        - { descr: E1_RAW_CAS , value: 9 , generic: 0 }
                        - { descr: T1_NI2_ISDN , value: 10 , generic: 0 }
                        - { descr: T1_4ESS_ISDN , value: 11 , generic: 0 }
                        - { descr: T1_5ESS_9_ISDN , value: 12 , generic: 0 }
                        - { descr: T1_5ESS_10_ISDN , value: 13 , generic: 0 }
                        - { descr: T1_DMS100_ISDN , value: 14 , generic: 0 }
                        - { descr: J1_TRANSPARENT , value: 15 , generic: 0 }
                        - { descr: T1_NTT_ISDN , value: 16 , generic: 0 }
                        - { descr: E1_AUSTEL_ISDN , value: 17 , generic: 0 }
                        - { descr: E1_HKT_ISDN , value: 18 , generic: 0 }
                        - { descr: E1_KOR_ISDN , value: 19 , generic: 0 }
                        - { descr: T1_HKT_ISDN , value: 20 , generic: 0 }
                        - { descr: E1_QSIG , value: 21 , generic: 0 }
                        - { descr: E1_TNZ_ISDN , value: 22 , generic: 0 }
                        - { descr: T1_QSIG , value: 23 , generic: 0 }
                        - { descr: T1_IUA , value: 28 , generic: 0 }
                        - { descr: E1_IUA , value: 29 , generic: 0 }
                        - { descr: E1_FRENCH_VN6_ISDN , value: 30 , generic: 0 }
                        - { descr: E1_FRENCH_VN3_ISDN , value: 31 , generic: 0 }
                        - { descr: T1_EURO_ISDN , value: 34 , generic: 0 }
                        - { descr: T1_DMS100_MERIDIAN_ISDN , value: 35 , generic: 0 }
                        - { descr: T1_NI1_ISDN , value: 36 , generic: 0 }
                        - { descr: E1_DUA , value: 37 , generic: 0 }
                        - { descr: E1_Q931_PACKETS , value: 38 , generic: 0 }
                        - { descr: T1_Q931_PACKETS , value: 39 , generic: 0 }
                        - { descr: E1_NI2_ISDN , value: 40 , generic: 0 }
                        - { descr: E1-CAS-R15 , value: 41 , generic: 0 }
                        - { descr: V5 , value: 43 , generic: 0 }
                        - { descr: BRI-EURO-ISDN, value: 50 , generic: 0 }
                        - { descr: BRI-NI-2, value: 51 , generic: 0 }
                        - { descr: BRI-DMS100, value: 52 , generic: 0 }
                        - { descr: BRI-5ESS, value: 53 , generic: 0 }
                        - { descr: BRI-QSIG , value: 54 , generic: 0 }
                        - { descr: BRI-VNG, value: 55 , generic: 0 }
                        - { descr: BRI-NTT, value: 56 , generic: 0 }
                        - { descr: BRI-IUA, value: 57 , generic: 0 }
                -
                    oid: AC-PSTN-MIB::acTrunkStatusTable
                    value: AC-PSTN-MIB::acTrunkStatusAlarm
                    num_oid: '.1.3.6.1.4.1.5003.9.10.9.2.1.1.1.7.{{ $index }}'
                    descr: 'Trunk Status {{ $index }})'
                    index: 'trunkStatus{{ $index }}'
                    high_limit: AC-PM-PSTN-MIB::acPMTrunkUtilizationAttributesHighThreshold
                    low_limit: -1
                    state_name: acTrunkUtilization
                    states:
                        - { descr: Disabled , value: 0 , generic: 3 }
                        - { descr: Active , value: 1 , generic: 0 }
                        - { descr: LosLof , value: 2 , generic: 2 }
                        - { descr: Ais , value: 3 , generic: 2 }
                        - { descr: Rai , value: 4 , generic: 2 }
                        - { descr: DChannel , value: 5 , generic: 2 }
                        - { descr: LowerLayerDown , value: 6 , generic: 2 }
                -
                    oid: DS1-MIB::dsx1ConfigTable
                    value: DS1-MIB::dsx1LoopbackConfig
                    num_oid: '.1.3.6.1.2.1.10.18.6.1.9.{{ $index }}'
                    descr: 'DS1 LoopbackConfig ({{ DS1-MIB::dsx1CircuitIdentifier }}){{ $index }}'
                    index: 'DS1loopback{{ $index }}'
                    state_name: dsx1LoopbackConfig
                    states:
                        - { descr: No Loop , value: 1 , generic: 0 }
                        - { descr: Payload Loop , value: 2 , generic: 3 }
                        - { descr: Line Loop , value: 3 , generic: 3 }
                        - { descr: Other Loop , value: 4 , generic: 3 }
                        - { descr: Inward Loop , value: 5 , generic: 3 }
                        - { descr: Dual Loop , value: 6 , generic: 3 }
