modules:
    sensors:
        voltage:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementVoltsLL
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.4.{{ $index }}'
                    descr: 'Phase {{ $index }} Voltage LL'
                    index: 'lgpPwrLineMeasurementVoltsLL.{{ $index }}'
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementVoltsLN
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.5.{{ $index }}'
                    descr: 'Phase {{ $index }} Voltage LN'
                    index: 'lgpPwrLineMeasurementVoltsLN.{{ $index }}'
        power:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTruePower
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.8.{{ $index }}'
                    descr: 'True Power'
                    index: 'lgpPwrMeasurementPointTruePower.{{ $index }}'
                    multiplier: 1000
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointApparentPower
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.7.{{ $index }}'
                    descr: 'Apparent Power (in kVA)'
                    index: 'lgpPwrMeasurementPointApparentPower.{{ $index }}'
                    group: ApparentPower
                    multiplier: 1000
        current:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementCurrent
                    index: 'lgpPwrLineMeasurementCurrent.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.6.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} Current'
                    warn_limit: 750
                    high_limit: 780
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointNeutralCurrent
                    index: 'lgpPwrMeasurementPointNeutralCurrent.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.12.{{ $index }}'
                    descr: 'Neutral Current'
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointGroundCurrent
                    index: 'lgpPwrMeasurementPointGroundCurrent.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.13.{{ $index }}'
                    descr: 'Ground Current'
                    divisor: 10
        count:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementKFactorCurrent
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.12.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} K-Factor'
                    index: 'lgpPwrLineMeasurementKFactorCurrent.{{ $index }}'
                    divisor: 10
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementCrestFactorCurrent
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.13.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} Crest Factor'
                    index: 'lgpPwrLineMeasurementCrestFactorCurrent.{{ $index }}'
                    divisor: 10
        percent:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementCapacity
                    index: 'lgpPwrLineMeasurementCapacity.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.7.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} Load'
                    warn_limit: 90
                    high_limit: 95
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementVoltageTHD
                    index: 'lgpPwrLineMeasurementVoltageTHD.{{ $index }}'
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.10.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} THD Voltage'
                    warn_limit: 12
                    high_limit: 15
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrLineMeasurementCurrentTHD
                    index: 'lgpPwrLineMeasurementCurrentTHD.{{ $index }}'
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.3.1.11.{{ $index }}'
                    descr: 'Phase {{ $subindex1 }} THD Current'
                    warn_limit: 12
                    high_limit: 15
        power_consumed:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointWattHours
                    index: 'lgpPwrMeasurementPointWattHours.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.10.{{ $index }}'
                    descr: 'Total Power Consumed'
                    divisor: 1000
        frequency:
            data:
                -   
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointFrequency
                    index: 'lgpPwrMeasurementPointFrequency.{{ $index }}'
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.6.{{ $index }}'
                    descr: 'Frequency'
        power_factor:
            data:
                -
                    oid: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointTable
                    value: LIEBERT-GP-POWER-MIB::lgpPwrMeasurementPointPowerFactor
                    divisor: 100
                    num_oid: '.1.3.6.1.4.1.476.1.42.3.5.2.2.1.9.{{ $index }}'
                    descr: 'Power Factor'
                    index: 'lgpPwrMeasurementPointPowerFactor.{{ $index }}'
