modules:
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - ENTITY-MIB::entPhysicalName
                        - ENTITY-MIB::entPhysicalIndex
        power:
            data:
                -
                    oid: POWER-ETHERNET-MIB::pethMainPseTable
                    value: POWER-ETHERNET-MIB::pethMainPsePower
                    num_oid: '.1.3.6.1.2.1.105.1.3.1.1.2.{{ $index }}'
                    index: 'pethMainPsePower.{{ $index }}'
                    group: "PoE"
                    descr: "PoE Budget Total - ID {{ $index }}"
                -
                    oid: POWER-ETHERNET-MIB::pethMainPseTable
                    value: POWER-ETHERNET-MIB::pethMainPseConsumptionPower
                    num_oid: '.1.3.6.1.2.1.105.1.3.1.1.4.{{ $index }}'
                    index: 'pethMainPseConsumptionPower.{{ $index }}'
                    high_limit: POWER-ETHERNET-MIB::pethMainPsePower
                    group: "PoE"
                    descr: "PoE Budget Consumed - ID {{ $index }}"
        count:
            data:
                -
                    oid: CISCO-POWER-ETHERNET-EXT-MIB::cpeExtPdStatistics
                    value: CISCO-POWER-ETHERNET-EXT-MIB::cpeExtPdStatsTotalDevices
                    num_oid: '.1.3.6.1.4.1.9.9.402.1.4.1.{{ $index }}'
                    group: "PoE"
                    descr: "PoE Devices Connected"
        state:
            data:
                -
                    oid: CISCO-HSRP-MIB::cHsrpGrpTable
                    value: CISCO-HSRP-MIB::cHsrpGrpStandbyState
                    num_oid: '.1.3.6.1.4.1.9.9.106.1.2.1.1.15.{{ $index }}'
                    state_name: cHsrpGrpTable
                    descr: 'HSRP Status {{ CISCO-HSRP-MIB::cHsrpGrpVirtualIpAddr }}'
                    index: 'cHsrpGrpStandbyState.{{ $index }}'
                    group: 'HSRP'
                    states:
                -
                    oid: CISCO-ENTITY-FRU-CONTROL-MIB::cefcModuleOperStatus
                    value: CISCO-ENTITY-FRU-CONTROL-MIB::cefcModuleOperStatus
                    num_oid: '.1.3.6.1.4.1.9.9.117.1.2.1.1.2.{{ $index }}'
                    descr: 'Operating Status - {{ ENTITY-MIB::entPhysicalName }}'
                    group: Module Operating Status
                    index: 'cefcModuleOperStatus.{{ $index }}'
                    entPhysicalIndex: '{{ $index }}'
                    state_name: cefcModuleOperStatus
                    states:
