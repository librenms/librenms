modules:
    mempools:
        additional_oids:
            oids:
                - ASAM-EQUIP-MIB::eqptBoardTable
        data:
            -
                total: ASAM-SYSTEM-MIB::totalMemSize
                used: ASAM-SYSTEM-MIB::memAbsoluteUsage
                precision: 1048576
                descr: '{{ ASAM-EQUIP-MIB::eqptBoardInventoryTypeName }}: {{ ASAM-EQUIP-MIB::eqptBoardIfSlotId }} Memory ({{ $index }})'
                warn_percent: 98
    os:
        hardware: ASAM-EQUIP-MIB::eqptHolderActualType.17
        serial: ASAM-EQUIP-MIB::eqptHolderSerialNumber.17
        version: ASAM-SYSTEM-MIB::swEtsiVersion.0
    processors:
        data:
            -
                oid: ASAM-SYSTEM-MIB::cpuLoadTable
                value: cpuLoadAverage
                num_oid: '.1.3.6.1.4.1.637.61.1.9.29.1.1.4.{{ $index }}'
                descr: CPU {{ $index }}

    sensors:
        temperature:
            data:
                -
                    oid: ASAM-EQUIP-MIB::eqptBoardThermalSensorTable
                    value: ASAM-EQUIP-MIB::eqptBoardThermalSensorActualTemperature
                    num_oid: '.1.3.6.1.4.1.637.61.1.23.10.1.2.{{ $index }}'
                    index: '{{ nokiaIsamSlot:0 }}.{{ $subindex1 }}-temp'
                    descr: '{{ nokiaIsamSlot:0 }} Sensor {{ $subindex1 }}'
                    high_limit: ASAM-EQUIP-MIB::eqptBoardThermalSensorShutdownThresholdHigh
                    warn_limit: ASAM-EQUIP-MIB::eqptBoardThermalSensorTcaThresholdHigh
                    low_limit: ASAM-EQUIP-MIB::eqptBoardThermalSensorShutdownThresholdLow
                    low_warn_limit: ASAM-EQUIP-MIB::eqptBoardThermalSensorTcaThresholdLow
        state:
            data:
                -
                    oid: ASAM-EQUIP-MIB::eqptFanMode
                    num_oid: '.1.3.6.1.4.1.637.61.1.23.1.9.{{ $index }}'
                    descr: Fan Mode
                    group: 'Hardware'
                    state_name: fanMode
                    states:
                -
                    oid: ASAM-ALARM-MIB::asamNumberofAlarmEntries
                    num_oid: '.1.3.6.1.4.1.637.61.1.3.4.{{ $index }}'
                    descr: 'Alarm: Current Count'
                    group: 'Alarms'
                    state_name: alarmCount
                    states:
                -
                    oid: ASAM-ALARM-MIB::asamCurrentAlarmSeverityStatus
                    num_oid: '.1.3.6.1.4.1.637.61.1.3.5.{{ $index }}'
                    descr: 'Alarm: Current Status'
                    group: 'Alarms'
                    state_name: alarmCurrentSeverityStatus
                    states:
