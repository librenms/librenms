modules:
    os:
        # v6 (TELTONIKA-MIB) and v7 (TELTONIKA-RUT2-MIB) define different objects at the same
        # numeric OIDs under .1.3.6.1.4.1.48690.1.x: RouterName.0 and rut2DeviceUptime.0 both
        # resolve to .7.0, ModemSerial.0 and rut2HardwareRevision.0 both resolve to .5.0.
        # net-snmp returns responses under the v7 names, so we list both the v6 name (for the
        # RouterName/ModemSerial semantic on RutOS 6.x) and the v7 name (so the actual lookup
        # finds the value).
        hardware:
            - TELTONIKA-RUT2-MIB::rut2DeviceName.0
            - TELTONIKA-MIB::RouterName.0
            - TELTONIKA-RUT2-MIB::rut2DeviceUptime.0
        serial:
            - TELTONIKA-RUT2-MIB::rut2Serial.0
            - TELTONIKA-MIB::ModemSerial.0
            - TELTONIKA-RUT2-MIB::rut2HardwareRevision.0
        version:
            - TELTONIKA-RUT2-MIB::rut2FwVersion.0
            - TELTONIKA-MIB::FirmwareVersion.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - TELTONIKA-MIB::Operator
                        - TELTONIKA-RUT2-MIB::rut2MOperator
                        - TELTONIKA-RUT2-MIB::rut2IoSystemName
        temperature:
            data:
                -
                    oid: TELTONIKA-MIB::Temperature
                    num_oid: ".1.3.6.1.4.1.48690.2.9.{{ $index }}"
                    descr: Module Temp
                    group: Modem
                    index: "Temperature.{{ $index }}"
                    divisor: 10
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MTemperature
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.17.{{ $index }}"
                    descr: Modem Module Temp
                    group: Modem
                    index: "rut2MTemperature.{{ $index }}"
                    divisor: 10
        state:
            data:
                -
                    oid: TELTONIKA-MIB::SimState
                    num_oid: ".1.3.6.1.4.1.48690.2.1.{{ $index }}"
                    descr: SIM State
                    group: Mobile
                    state_name: simState
                    states:
                        - { descr: inserted, value: 0, generic: 0 }
                        - { descr: not inserted, value: 1, generic: 2 }
                        - { descr: unknown, value: 2, generic: 3 }
                -
                    oid: TELTONIKA-MIB::PinState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.{{ $index }}"
                    descr: Pin State
                    group: Mobile
                    state_name: rutos2xx_pinState
                    states:
                        - { descr: PIN REQUIRED, value: 0, generic: 2 }
                        - { descr: NOT READY, value: 1, generic: 1 }
                        - { descr: READY, value: 2, generic: 0 }
                        - { descr: unknown, value: 3, generic: 3 }
                -
                    oid: TELTONIKA-MIB::NetState
                    num_oid: ".1.3.6.1.4.1.48690.2.3.{{ $index }}"
                    descr: Mobile Net State
                    group: Mobile
                    state_name: NetState
                    states:
                        - { descr: searching, value: 0, generic: 1 }
                        - { descr: registered (home), value: 1, generic: 0 }
                        - { descr: registered (roaming), value: 2, generic: 1 }
                        - { descr: unknown, value: 3, generic: 3 }
                        - { descr: unregistered, value: 4, generic: 2 }
                -
                    oid: TELTONIKA-MIB::ConnectionState
                    num_oid: ".1.3.6.1.4.1.48690.2.7.{{ $index }}"
                    descr: "Connection State ({{ TELTONIKA-MIB::Operator }})"
                    group: Mobile
                    index: "ConnectionState.{{ $index }}"
                    state_name: ConnectionState
                    states:
                        - { descr: connected, value: 0, generic: 0 }
                        - { descr: not connected, value: 1, generic: 2 }
                        - { descr: disconnected, value: 2, generic: 2 }
                -
                    oid: TELTONIKA-MIB::ConnectionType
                    num_oid: ".1.3.6.1.4.1.48690.2.8.{{ $index }}"
                    descr: "Connection Type ({{ TELTONIKA-MIB::Operator }})"
                    group: Mobile
                    index: "ConnectionType.{{ $index }}"
                    state_name: ConnectionType
                    states:
                        - { descr: LTE, value: 0, generic: 0 }
                        - { descr: 4G, value: 1, generic: 0 }
                        - { descr: 3G, value: 2, generic: 1 }
                        - { descr: 2G, value: 3, generic: 1 }
                        - { descr: WCDMA, value: 4, generic: 0 }
                        - { descr: unknown, value: 5, generic: 3 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MSimState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.9.{{ $index }}"
                    descr: SIM State
                    group: Mobile
                    index: "rut2MSimState.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2MSimState
                    states:
                        - { descr: inserted, value: 0, generic: 0 }
                        - { descr: not inserted, value: 1, generic: 2 }
                        - { descr: unknown, value: 2, generic: 3 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MPinState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.10.{{ $index }}"
                    descr: SIM PIN State
                    group: Mobile
                    index: "rut2MPinState.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2MPinState
                    states:
                        - { descr: PIN REQUIRED, value: 0, generic: 2 }
                        - { descr: NOT READY, value: 1, generic: 1 }
                        - { descr: READY, value: 2, generic: 0 }
                        - { descr: unknown, value: 3, generic: 3 }
                        - { descr: SIM not inserted, value: 4, generic: 2 }
                        - { descr: OK, value: 5, generic: 0 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MNetState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.11.{{ $index }}"
                    descr: Mobile Net State
                    group: Mobile
                    index: "rut2MNetState.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2MNetState
                    states:
                        - { descr: searching, value: 0, generic: 1 }
                        - { descr: registered (home), value: 1, generic: 0 }
                        - { descr: registered (roaming), value: 2, generic: 1 }
                        - { descr: unknown, value: 3, generic: 3 }
                        - { descr: unregistered, value: 4, generic: 2 }
                        - { descr: 'Registered, home', value: 5, generic: 0 }
                        - { descr: Denied, value: 6, generic: 2 }
                        - { descr: 'Registered, roaming', value: 7, generic: 2 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MConnectionState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.15.{{ $index }}"
                    descr: "Connection State ({{ TELTONIKA-RUT2-MIB::rut2MOperator }})"
                    group: Mobile
                    index: "rut2MConnectionState.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2MConnectionState
                    states:
                        - { descr: Connected, value: 0, generic: 0 }
                        - { descr: Not connected, value: 1, generic: 2 }
                        - { descr: Disconnected, value: 2, generic: 2 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MNetworkType
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.16.{{ $index }}"
                    descr: "Connection Type"
                    group: Mobile
                    index: "rut2MNetworkType.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2MNetworkType
                    states:
                        - { descr: LTE, value: 0, generic: 0 }
                        - { descr: 4G, value: 1, generic: 0 }
                        - { descr: 3G, value: 2, generic: 1 }
                        - { descr: 2G, value: 3, generic: 1 }
                        - { descr: WCDMA, value: 4, generic: 0 }
                        - { descr: unknown, value: 5, generic: 3 }
                        - { descr: Auto, value: 6, generic: 0 }
                        - { descr: No service, value: 7, generic: 1 }
                        - { descr: GSM, value: 8, generic: 0 }
                        - { descr: GPRS, value: 9, generic: 0 }
                        - { descr: EDGE, value: 10, generic: 0 }
                        - { descr: TDSCDMA, value: 11, generic: 0 }
                        - { descr: CDMA, value: 12, generic: 0 }
                        - { descr: EVDO, value: 13, generic: 0 }
                        - { descr: CDMA-EVDO, value: 14, generic: 0 }
                        - { descr: HSDPA, value: 15, generic: 0 }
                        - { descr: HSUPA, value: 16, generic: 0 }
                        - { descr: HSPA+, value: 17, generic: 0 }
                        - { descr: EHRPD, value: 18, generic: 0 }
                        - { descr: HDR, value: 19, generic: 0 }
                        - { descr: UMTS, value: 20, generic: 0 }
                        - { descr: HSDPA+HSUPA, value: 21, generic: 0 }
                        - { descr: 5G, value: 22, generic: 0 }
                        - { descr: NR5G, value: 23, generic: 0 }
                        - { descr: 5G-NSA, value: 24, generic: 0 }
                        - { descr: 5G-SA, value: 25, generic: 0 }
                        - { descr: CAT-M1, value: 26, generic: 0 }
                        - { descr: CAT-NB, value: 27, generic: 0 }
                        - { descr: 2G_3G, value: 28, generic: 0 }
                        - { descr: GSM_WCDMA, value: 29, generic: 0 }
                        - { descr: 2G_4G, value: 30, generic: 0 }
                        - { descr: GSM_LTE, value: 31, generic: 0 }
                        - { descr: 3G_4G, value: 32, generic: 0 }
                        - { descr: WCDMA_LTE, value: 33, generic: 0 }
                        - { descr: 3G_5G, value: 34, generic: 0 }
                        - { descr: WCDMA_NR5G, value: 35, generic: 0 }
                        - { descr: 4G_5G, value: 36, generic: 0 }
                        - { descr: LTE_NR5G, value: 37, generic: 0 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2IoInput
                    num_oid: ".1.3.6.1.4.1.48690.6.2.1.7.{{ $index }}"
                    descr: "I/O {{ $index }} Type"
                    group: Inputs/Outputs
                    index: "rut2IoInput.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2IoInput
                    states:
                        - { descr: Digital Output, value: 0, generic: 0 }
                        - { descr: Digital Input, value: 1, generic: 0 }
                -
                    oid: TELTONIKA-RUT2-MIB::rut2IoStateNumeric
                    num_oid: ".1.3.6.1.4.1.48690.6.2.1.11.{{ $index }}"
                    descr: "I/O {{ $index }} State ({{ TELTONIKA-RUT2-MIB::rut2IoSystemName }})"
                    group: Inputs/Outputs
                    index: "rut2IoStateNumeric.{{ $index }}"
                    state_name: TELTONIKA-RUT2-MIB::rut2IoStateNumeric
                    states:
                        - { descr: N/A, value: -1, generic: 3 }
                        - { descr: Low, value: 0, generic: 0 }
                        - { descr: High, value: 1, generic: 2 }
        signal:
            data:
                -
                    oid: TELTONIKA-MIB::Signal
                    num_oid: ".1.3.6.1.4.1.48690.2.4.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level"
                    group: Mobile
                    index: "Signal.{{ $index }}"
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MSignal
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.12.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSSI"
                    group: Mobile
                    index: "rut2MSignal.{{ $index }}"
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MRSRP
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.20.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSRP"
                    group: Mobile
                    index: "rut2MRSRP.{{ $index }}"
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MRSRQ
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.21.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSRQ"
                    group: Mobile
                    index: "rut2MRSRQ.{{ $index }}"
        snr:
            data:
                -
                    oid: TELTONIKA-RUT2-MIB::rut2MSINR
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.19.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - SINR"
                    group: Mobile
                    index: "rut2MSINR.{{ $index }}"
        count:
            data:
                -
                    oid: TELTONIKA-MIB::SimSlot
                    num_oid: ".1.3.6.1.4.1.48690.2.15.{{ $index }}"
                    descr: "Number of SIM Slots"
                    group: Mobile
                    index: "simSlot.{{ $index }}"
        runtime:
            data:
                -
                    oid: TELTONIKA-MIB::ConnectionUptime
                    num_oid: ".1.3.6.1.4.1.48690.2.17.{{ $index }}"
                    descr: "Connection Uptime"
                    group: Mobile
                    index: "ConnectionUptime.{{ $index }}"
                    divisor: 60
