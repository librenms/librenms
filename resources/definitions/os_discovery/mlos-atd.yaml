modules:
    mempools:
        data:
            -
                percent_used: MCAFEE-ATD-MIB::atdMemoryUtilization
    processors:
        data:
            -
                oid: MCAFEE-ATD-MIB::atdCPUUtilizationAvg
                num_oid: '.1.3.6.1.4.1.8962.4.1.1.1.{{ $index }}'
    sensors:
        count:
            data:
                -
                    oid: MCAFEE-ATD-MIB::mcAfeeATDMIBObjects
                    value: MCAFEE-ATD-MIB::atdFileWaiting
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.6.{{ $index }}'
                    descr: 'ATD Files Queued'
                    group: 'File Processing'
                    index: 'atdFileWaiting'
                -
                    oid: MCAFEE-ATD-MIB::mcAfeeATDMIBObjects
                    value: MCAFEE-ATD-MIB::atdFileAnalyzing
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.7.{{ $index }}'
                    descr: 'ATD Files Processing'
                    group: 'File Processing'
                    index: 'atdFileAnalyzing'
        temperature:
            data:
                -
                    oid: MCAFEE-ATD-MIB::mcAfeeATDMIBObjects
                    value: MCAFEE-ATD-MIB::atdSystemTemperature
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.8.{{ $index }}'
                    descr: 'System Temperature'
        percent:
            data:
                -
                    oid: MCAFEE-ATD-MIB::mcAfeeATDMIBObjects
                    value: MCAFEE-ATD-MIB::atdHDDDataSpaceUtilization
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.4.{{ $index }}'
                    descr: 'ATD Data Disk Space Utilization'
                    index: 'atdDataDiskSpaceUsed'
                -
                    oid: MCAFEE-ATD-MIB::atdHDDSystemSpaceUtilization
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.3.{{ $index }}'
                    descr: 'ATD System Disk Space Utilization'
                    index: 'atdSystemDiskSpaceUsed'

                -
                    oid: MCAFEE-ATD-MIB::atdHDDVarSpaceUtilization
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.19.{{ $index }}'
                    descr: 'ATD Var Disk Space Utilization'
                    index: 'atdVarDiskSpaceUsed'
        state:
           data:
                -
                    oid: MCAFEE-ATD-MIB::atdSystemHealth
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.9.{{ $index }}'
                    descr: 'System Health'
                    state_name: atdSystemHealth
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdBackupSchedulerStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.10.{{ $index }}'
                    descr: 'Backup Scheduler Status'
                    state_name: atdBackupSchedulerStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdLoadBalancerStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.11.{{ $index }}'
                    descr: 'ATD Load Balancer Status'
                    state_name: atdLoadBalancerStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdEmailConnectorStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.12.{{ $index }}'
                    descr: 'ATD Email Connetor Status'
                    state_name: atdEmailConnectorStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdEmailGatewayWaitTime
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.13.{{ $index }}'
                    descr: 'Email Gateway Wait Time Threshold'
                    state_name: atdEmailGatewayWaitTime
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdMalwareInterfaceStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.14.{{ $index }}'
                    descr: 'ATD Malware Interface Status'
                    state_name: atdMalwareInterfaceStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdLicenseStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.15.{{ $index }}'
                    descr: 'ATD License Status'
                    state_name: atdLicenseStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdDXLChannelStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.16.{{ $index }}'
                    descr: 'ATD DXL Status'
                    state_name: atdDXLChannelStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdSensorStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.17.{{ $index }}'
                    descr: 'ATD Sensor Status'
                    state_name: atdSensorStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdTAXIIStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.18.{{ $index }}'
                    descr: 'ATD TAXII Status'
                    state_name: atdTAXIIStatus
                    states:
                -
                    oid: MCAFEE-ATD-MIB::atdMalwareDNSStatus
                    num_oid: '.1.3.6.1.4.1.8962.4.1.1.18.{{ $index }}'
                    descr: 'ATD Malware DNS Status'
                    state_name: atdMalwareDNSStatus
