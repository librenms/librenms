modules:
    os:
        version: UPS-MIB::upsIdentAgentSoftwareVersion.0
        hardware: UPS-MIB::upsIdentModel.0
    sensors:
        state:
            data:
                -
                    oid: XPPC-MIB::upsBaseBatteryStatus
                    num_oid: '.1.3.6.1.4.1.935.1.1.1.2.1.1.{{ $index }}'
                    descr: Battery Status
                    index: 'upsBaseBatteryStatus.{{ $index }}'
                    state_name: upsBaseBatteryStatus
                    states:
                        - { descr: unknown, value: 1, generic: 3 }
                        - { descr: BatteryNormal, value: 2, generic: 0 }
                        - { descr: BatteryLow, value: 3, generic: 1 }
                -
                    oid: XPPC-MIB::upsSmartBatteryReplaceIndicator
                    num_oid: '.1.3.6.1.4.1.935.1.1.1.2.2.5.{{ $index }}'
                    descr: Battery Replace Status
                    index: 'upsSmartBatteryReplaceIndicator.{{ $index }}'
                    state_name: upsSmartBatteryReplaceIndicator
                    states:
                        - { descr: noBatteryNeedsReplacing, value: 1, generic: 0 }
                        - { descr: batteryNeedsReplacing, value: 2, generic: 2 }
                -
                    oid: XPPC-MIB::upsEnvWater
                    num_oid: '.1.3.6.1.4.1.935.1.1.1.9.1.3.{{ $index }}'
                    descr: Water Status
                    index: 'upsEnvWater.{{ $index }}'
                    state_name: upsEnvWater
                    states:
                        - { descr: unknown, value: 0, generic: 3 }
                        - { descr: normal, value: 1, generic: 0 }
                        - { descr: abnormal, value: 2, generic: 2 }
                -
                    oid: XPPC-MIB::upsEnvSmoke
                    num_oid: '.1.3.6.1.4.1.935.1.1.1.9.1.4.{{ $index }}'
                    descr: Smoke Status
                    index: 'upsEnvSmoke.{{ $index }}'
                    state_name: upsEnvSmoke
                    states:
                        - { descr: unknown, value: 0, generic: 3 }
                        - { descr: normal, value: 1, generic: 0 }
                        - { descr: abnormal, value: 2, generic: 2 }
        runtime:
            data:
                -
                    oid: XPPC-MIB::upsSmartBatteryRunTimeRemaining
                    num_oid: '.1.3.6.1.4.1.935.1.1.1.2.2.4.{{ $index }}'
                    descr: 'Estimated Runtime'
                    index: 'upsSmartBatteryRunTimeRemaining.{{ $index }}'
                    divisor: 60
