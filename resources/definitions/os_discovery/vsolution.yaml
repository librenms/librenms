modules:
    os:
        hardware: V1600D::v1600dOltType.5.0
        serial: V1600D::systemInfo.11.0
        version: V1600D::sysFirmVersion.0
        features: V1600D::sysHardVersion.0

    mempools:
        data:
            -
                percent_used: V1600D::memoryLoad
                descr: 'Memory Load'
    processors:
        data:
            -
                oid: V1600D::cpuLoad
                num_oid: '.1.3.6.1.4.1.37950.1.1.5.10.12.3.{{ $index }}'
                descr: 'CPU Load'

    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - V1600D::ponPortDescr
                        - V1600D::onuAuthInfoDescription2
                        - V1600G::gOnuAuthInfoAuthInfo
        temperature:
            data:
                -
                    oid: V1600D::sysTemperature
                    num_oid: '.1.3.6.1.4.1.37950.1.1.5.10.12.5.9.{{ $index }}'
                    descr: "System Temperature"
                -
                    oid: V1600D::opmDiagInfoTable
                    value: V1600D::temperature
                    num_oid: '.1.3.6.1.4.1.37950.1.1.5.12.2.1.8.1.3.{{ $index }}'
                    descr: "{{ V1600D::onuAuthInfoDescription2 }}"
                    group: "ONU"
        dbm:
            data:
                -
                    oid: V1600D::opmDiagInfoTable
                    value: V1600D::rxPower
                    num_oid: '.1.3.6.1.4.1.37950.1.1.5.12.2.1.8.1.7.{{ $index }}'
                    descr: "{{ V1600D::onuAuthInfoDescription2 }}"
                    group: "ONU"
        state:
            data:
                -
                    oid: V1600G::gOnuStaInfoTable
                    value: V1600G::gOnuStaInfoPhaseSta
                    num_oid: '.1.3.6.1.4.1.37950.1.1.6.1.1.1.1.5.{{ $index }}'
                    descr: "ONU {{ V1600G::gOnuAuthInfoAuthInfo }}"
                    group: "ONU"
                    state_name: gOnuStaInfoPhaseSta
                    states:
                        - { value: 0, generic: 1, graph: 1, descr: 'Logging' }
                        - { value: 1, generic: 2, graph: 1, descr: 'LOS' }
                        - { value: 2, generic: 1, graph: 1, descr: 'Sync MIB' }
                        - { value: 3, generic: 0, graph: 1, descr: 'Working' }
                        - { value: 4, generic: 2, graph: 1, descr: 'Dying Gasp' }
                        - { value: 5, generic: 2, graph: 1, descr: 'Auth Fail' }
                        - { value: 6, generic: 2, graph: 1, descr: 'Offline' }
                        - { value: 7, generic: 1, graph: 1, descr: 'Deactivated' }
                        - { value: 8, generic: 2, graph: 1, descr: 'Config Fail' }
                -
                    oid: V1600GSwitch::sysPower1Status
                    num_oid: '.1.3.6.1.4.1.37950.1.1.5.10.12.5.16.{{ $index }}'
                    descr: "PSU 1"
                    state_name: vsolutionPsuStatus
                    states:
                        - { value: 0, generic: 2, graph: 1, descr: 'Off' }
                        - { value: 1, generic: 0, graph: 1, descr: 'On' }
                -
                    oid: V1600GSwitch::sysPower2Status
                    num_oid: '.1.3.6.1.4.1.37950.1.1.5.10.12.5.17.{{ $index }}'
                    descr: "PSU 2"
                    state_name: vsolutionPsuStatus
                    states:
                        - { value: 0, generic: 2, graph: 1, descr: 'Off' }
                        - { value: 1, generic: 0, graph: 1, descr: 'On' }
