modules:
    os:
        sysDescr_regex: '/Version (?<version>\S+)/'
        hardware:
            - CAMBIUM-PTP670-MIB::masterSlaveMode.0
            - CAMBIUM-PTP670-MIB::hardwareVersion.0
        hardware_template: 'PTP 670 {{ CAMBIUM-PTP670-MIB::masterSlaveMode.0 }} ({{ CAMBIUM-PTP670-MIB::hardwareVersion.0 }})'
    sensors:
        state:
            data:
                -
                    oid: CAMBIUM-PTP670-MIB::tDDSynchronizationStatus
                    num_oid: '.1.3.6.1.4.1.17713.7.13.11.{{ $index }}'
                    index: 0
                    descr: Sync Status
                    state_name: tDDSynchronizationStatus
                    states:
