modules:
    os:
        hardware: DEVICE::deviceModel.0
        serial: DEVICE::deviceSerialNumber.0
        version: DEVICE::deviceFirmwareVersion.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - PEPVPN-SPEEDFUSION::pepVpnStatusProfileName
        state:
            data:
                -
                    oid: PEPVPN-SPEEDFUSION::pepVpnStatusConnectionState
                    num_oid: ".1.3.6.1.4.1.23695.200.1.10.1.1.2.1.3.{{ $index }}"
                    descr: "{{ PEPVPN-SPEEDFUSION::pepVpnStatusProfileName }}"
                    group: "VPN"
                    index: "pepVpnStatusConnectionState.{{ $index }}"
                    state_name: pepVpnStatusConnectionState
                    states:
                        - { descr: start, value: 0, generic: 3 }
                        - { descr: authen, value: 1, generic: 3 }
                        - { descr: tunnel, value: 2, generic: 3 }
                        - { descr: route, value: 3, generic: 3 }
                        - { descr: connected, value: 4, generic: 0 }
