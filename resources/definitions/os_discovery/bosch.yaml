mib: BSS-RCP-MIB
modules:
    os:
        hardware: BSS-RCP-MIB::oem-device-name.0
        serial: BSS-RCP-MIB::serial-number.0
        version: BSS-RCP-MIB::software-version.0
    processors:
        data:
            -
                oid: cpu-loadTable
                value: cpu-load-idle
                num_oid: '.1.3.6.1.4.1.3967.1.1.9.1.1.{{ $index }}'
                index: '{{ $index }}'
                type: 'bosch'
                descr: "Processor {{ $index }}"
                precision: -1
    sensors:
        temperature:
            data:
                -
                    oid: temperatureTable
                    value: temp-sens
                    num_oid: '.1.3.6.1.4.1.3967.1.1.7.1.1.{{ $index }}'
                    high_limit: 67.5
                    descr: "Temp Sensor 1"
                    index: '{{ $index }}'
                    divisor: 10 
