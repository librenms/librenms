modules:
    os:
        hardware_mib: XKL-MIB
        version: XKL-MIB::xklSysOs.0
    sensors:
        chromatic_dispersion:
            data:
                -
                    oid: XKL-MIB::xklWaveMediaSidePMTable
                    value: XKL-MIB::xklWaveMediaSidePMRxCDCurrent
                    num_oid: '.1.3.6.1.4.1.21150.1.1.35.1.13.{{ $index }}'
                    descr: '{{ XKL-MIB::xklWaveMediaSidePMWaveDescr }} Chromatic Dispersion'
                    index: 'XKL-MIB::xklWaveMediaSidePMRxCDCurrent.{{ $index }}'
                    skip_values:
                    -
                        oid: XKL-MIB::xklWaveMediaSidePMWaveStatus
                        op: '='
                        value: '2' 
        temperature:
            data:
                -
                    oid: XKL-MIB::xklTransportTable
                    value: XKL-MIB::xklTransportTemp
                    num_oid: '.1.3.6.1.4.1.21150.1.1.3.1.10.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransportDescr }} Temperature'
                    index: 'xklTransportTemp.{{ $index }}'
                    group: 'transciever'
                    low_limit: XKL-MIB::xklTransportTempLoAlrmThreshold
                    low_warn_limit: XKL-MIB::xklTransportTempLoWarnThreshold
                    warn_limit: XKL-MIB::xklTransportTempHiWarnThreshold
                    high_limit: XKL-MIB::xklTransportTempHiAlrmThreshold
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklSensorTable
                    value: XKL-MIB::xklSensorTemp
                    num_oid: '.1.3.6.1.4.1.21150.1.1.13.1.3.{{ $index }}'
                    descr: '{{ XKL-MIB::xklSensorDescription }} Temperature'
                    index: 'xklSensorTemp.{{ $index }}'
                    group: 'System Temperature'
                    low_limit: XKL-MIB::xklSensorLowAlarm
                    low_warn_limit: XKL-MIB::xklSensorLowWarn
                    warn_limit: XKL-MIB::xklSensorHighWarn
                    high_limit: XKL-MIB::xklSensorHighAlarm
                    skip_values:
                    -
                        oid: XKL-MIB::xklSensorStatus
                        op: '='
                        value: '3'
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFACaseTemp
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.26.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Case Temperature'
                    index: 'xklEDFACaseTemp.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAPumpLaserTemp
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.28.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Pump Laser Temperature'
                    index: 'xklEDFAPumpLaserTemp.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10
        dbm:
            data:
                -
                    oid: XKL-MIB::xklTransportTable
                    value: XKL-MIB::xklTransportTransmitPower
                    num_oid: '.1.3.6.1.4.1.21150.1.1.3.1.11.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransportDescr }} TX Power'
                    index: 'xklTransportTransmitPower.{{ $index }}'
                    group: 'transciever'
                    low_limit: XKL-MIB::xklTransportTxPowerLoAlrmThresh
                    low_warn_limit: XKL-MIB::xklTransportTxPowerLoWarnThresh
                    warn_limit: XKL-MIB::xklTransportTxPowerHiWarnThresh
                    high_limit: XKL-MIB::xklTransportTxPowerHiAlrmThresh
                    divisor: 10
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklTransportTable
                    value: XKL-MIB::xklTransportReceivePower
                    num_oid: '.1.3.6.1.4.1.21150.1.1.3.1.12.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransportDescr }} RX Power'
                    index: 'xklTransportReceivePower.{{ $index }}'
                    group: 'transciever'
                    low_limit: XKL-MIB::xklTransportRxPowerLoAlrmThresh
                    low_warn_limit: XKL-MIB::xklTransportRxPowerLoWarnThresh
                    warn_limit: XKL-MIB::xklTransportRxPowerHiWarnThresh
                    high_limit: XKL-MIB::xklTransportRxPowerHiAlrmThresh
                    divisor: 10
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklTransceiverModuleTable
                    value: XKL-MIB::xklTransceiverModuleOSNR
                    num_oid: '.1.3.6.1.4.1.21150.1.1.23.1.7.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransceiverModuleDescr }} Optical RX SNR'
                    index: 'xklTransceiverModuleOSNR.{{ $index }}'
                    group: 'transciever'
                    divisor: 10
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransceiverModuleStatus
                        op: '='
                        value: '2'
                    -
                        oid: XKL-MIB::xklTransceiverModuleOSNR
                        op: '='
                        value: '0'
                -
                    oid: XKL-MIB::xklTransceiverModuleTable
                    value: XKL-MIB::xklTransceiverModuleESNR
                    num_oid: '.1.3.6.1.4.1.21150.1.1.23.1.28.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransceiverModuleDescr }} Electrical RX SNR'
                    index: 'xklTransceiverModuleESNR.{{ $index }}'
                    group: 'transciever'
                    divisor: 10
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransceiverModuleStatus
                        op: '='
                        value: '2'
                    -
                        oid: XKL-MIB::xklTransceiverModuleESNR
                        op: '='
                        value: '0'
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAPumpLaserPower
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.30.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Pump Power'
                    index: 'xklEDFAPumpLaserPower.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAInputOpticalPower
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.24.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Input Power'
                    index: 'xklEDFAInputOpticalPower.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAOutputOpticalPower
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.25.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Output Power'
                    index: 'xklEDFAOutputOpticalPower.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10
        fanspeed:
            data:
                -
                    oid: XKL-MIB::xklFanUnitTable
                    value: XKL-MIB::xklFanUnitSpeedActual
                    num_oid: '.1.3.6.1.4.1.21150.1.1.7.1.5.{{ $index }}'
                    descr: 'Fan {{ $index }} Speed'
                    index: 'xklFanUnitSpeedActual.{{ $index }}'
                    skip_values:
                    -
                        oid: XKL-MIB::xklFanUnitStatus
                        op: '='
                        value: '4'
        voltage:
            data:
                -
                    oid: XKL-MIB::xklTransportTable
                    value: XKL-MIB::xklTransportVoltage
                    num_oid: '.1.3.6.1.4.1.21150.1.1.3.1.43.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransportDescr }} voltage'
                    index: 'xklTransportVoltage.{{ $index }}'
                    group: 'transciever'
                    low_limit: XKL-MIB::xklTransportVoltageLoAlrmThresh
                    low_warn_limit: XKL-MIB::xklTransportVoltageLoWarnThresh
                    warn_limit: XKL-MIB::xklTransportVoltageHiWarnThresh
                    high_limit: XKL-MIB::xklTransportVoltageHiAlrmThresh
                    divisor: 10000
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklPowerTable
                    value: XKL-MIB::xklPowerVoltage
                    num_oid: '.1.3.6.1.4.1.21150.1.1.9.1.4.{{ $index }}'
                    descr: '{{ XKL-MIB::xklPowerDescr }} Voltage'
                    index: 'xklPowerVoltage.{{ $index }}'
                    group: 'Power Supplies'
                    divisor: 1000
        current:
            data:
                -
                    oid: XKL-MIB::xklPowerTable
                    value: XKL-MIB::xklPowerCurrent
                    num_oid: '.1.3.6.1.4.1.21150.1.1.9.1.5.{{ $index }}'
                    descr: '{{ XKL-MIB::xklPowerDescr }} Current'
                    index: 'xklPowerCurrent.{{ $index }}'
                    group: 'Power Supplies'
                    divisor: 1000
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklTransportTable
                    value: XKL-MIB::xklTransportLaserBias
                    num_oid: '.1.3.6.1.4.1.21150.1.1.3.1.15.{{ $index }}'
                    descr: '{{ XKL-MIB::xklTransportDescr }} BIAS'
                    index: 'xklTransportLaserBias.{{ $index }}'
                    group: 'transciever'
                    divisor: 1000000
                    skip_values:
                    -
                        oid: XKL-MIB::xklTransportStatus
                        op: '='
                        value: '2'
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAPumpLaserCurrent
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.29.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Pump Current'
                    index: 'xklEDFAPumpLaserCurrent.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    divisor: 10000
        state:
            data:
                -
                    oid: XKL-MIB::xklFanControllerTable
                    value: XKL-MIB::xklFanControllerStatus
                    num_oid: '.1.3.6.1.4.1.21150.1.1.5.1.2.{{ $index }}'
                    descr: 'Fan Controller {{ $index }} Status'
                    index: 'xklFanControllerStatus.{{ $index }}'
                    group: 'Fans'
                    state_name: XKL-MIB::xklFanControllerStatus
                    states:
                        - { value: 1, generic: 3, descr: other }
                        - { value: 2, generic: 0, descr: normal }
                        - { value: 3, generic: 1, descr: offline }
                        - { value: 4, generic: 1, descr: error }
                        - { value: 5, generic: 1, descr: cmdReady }
                        - { value: 6, generic: 2, descr: alarm }
                        - { value: 7, generic: 2, descr: timerOverflow }
                        - { value: 8, generic: 0, descr: absent }
                        - { value: 9, generic: 2, descr: communicationsError }
                    skip_values:
                    -
                        oid: XKL-MIB::xklFanControllerStatus
                        op: '='
                        value: '8'
                -
                    oid: XKL-MIB::xklFanControllerTable
                    value: XKL-MIB::xklFanUnitStatus
                    num_oid: '.1.3.6.1.4.1.21150.1.1.7.1.3.{{ $index }}'
                    descr: 'Fan {{ $index }} Status'
                    index: 'xklFanUnitStatus.{{ $index }}'
                    group: 'Fans'
                    state_name: XKL-MIB::xklFanUnitStatus
                    states:
                        - { value: 1, generic: 3, descr: other }
                        - { value: 2, generic: 0, descr: normal }
                        - { value: 3, generic: 1, descr: off }
                        - { value: 4, generic: 1, descr: notPresent }
                        - { value: 5, generic: 2, descr: alarm }
                        - { value: 6, generic: 1, descr: cmdReady }
                        - { value: 7, generic: 1, descr: override }
                        - { value: 8, generic: 3, descr: test }
                    skip_values:
                    -
                        oid: 'XKL-MIB::xklFanControllerStatus.{{  xklFanUnitController }}'
                        op: '='
                        value: '8'
                -
                    oid: XKL-MIB::xklPowerTable
                    value: XKL-MIB::xklPowerStatus
                    num_oid: '.1.3.6.1.4.1.21150.1.1.9.1.2.{{ $index }}'
                    descr: '{{ XKL-MIB::xklPowerDescr }} State'
                    index: 'xklPowerStatus.{{ $index }}'
                    group: 'Power Supplies'
                    state_name: XKL-MIB::xklPowerStatus
                    states:
                        - { value: 1, generic: 3, descr: other }
                        - { value: 2, generic: 0, descr: normal }
                        - { value: 3, generic: 2, descr: offline }
                        - { value: 4, generic: 2, descr: noPower }
                        - { value: 5, generic: 3, descr: absent }
                        - { value: 6, generic: 1, descr: overTemp }
                        - { value: 7, generic: 2, descr: dcFault }
                        - { value: 8, generic: 1, descr: fanSlow }
                        - { value: 9, generic: 2, descr: alert }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAMode
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.22.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Amplifier Mode'
                    index: 'xklEDFAMode.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    state_name: XKL-MIB::xklEDFAMode
                    states:
                        - { value: -1, generic: 3, descr: none }
                        - { value: 0, generic: 0, descr: booster }
                        - { value: 1, generic: 0, descr: preamp }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAPumpLaserStatus
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.27.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Laser Pump Status'
                    index: 'xklEDFAPumpLaserStatus.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    state_name: XKL-MIB::xklEDFAPumpLaserStatus
                    states:
                        - { value: 0, generic: 2, descr: disabled }
                        - { value: 1, generic: 0, descr: enabled }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFAAmplificationState
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.31.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Amplifier State '
                    index: 'xklEDFAAmplificationState.{{ $index }}'
                    group: 'EDFA Amplifiers'
                    state_name: XKL-MIB::xklEDFAAmplificationState
                    states:
                        - { value: 0, generic: 2, descr: down }
                        - { value: 1, generic: 0, descr: up }
                        - { value: 2, generic: 3, descr: unused }
                        - { value: 3, generic: 2, descr: los }
                        - { value: 4, generic: 1, descr: warning }
                        - { value: 5, generic: 2, descr: alarm }
                        - { value: 6, generic: 1, descr: reset }
                        - { value: 7, generic: 3, descr: unknown }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFACommonAlarm
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.8.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Common Alarm'
                    index: 'xklEDFACommonAlarm.{{ $index}}'
                    group: 'Amplifier Alarms'
                    state_name: XKL-MIB::xklEDFACommonAlarm
                    states:
                        - { value: 1, generic: 3, descr: unused }
                        - { value: 2, generic: 2, descr: yes }
                        - { value: 3, generic: 0, descr: no }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFALossOfInputAlarm
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.10.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Loss of Input Alarm'
                    index: 'xklEDFALossOfInputAlarm.{{ $index}}'
                    states:
                        - { value: 2, generic: 2, descr: yes }
                        - { value: 3, generic: 0, descr: no }
                -
                    oid: XKL-MIB::xklEDFATable
                    value: XKL-MIB::xklEDFALossOfOutputAlarm
                    num_oid: '.1.3.6.1.4.1.21150.1.1.17.1.11.{{ $index }}'
                    descr: '{{ XKL-MIB::xklEDFAName }} Loss of Output Alarm'
                    index: 'xklEDFALossOfOutputAlarm.{{ $index}}'
                    group: 'Amplifier Alarms'
                    state_name: XKL-MIB::xklEDFALossOfOutputAlarm
                    states:
                        - { value: 1, generic: 3, descr: unused }
                        - { value: 2, generic: 2, descr: yes }
                        - { value: 3, generic: 0, descr: no }
