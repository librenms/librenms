modules:
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - TELTONIKA-MIB::Operator
        temperature:
            data:
                -
                    oid: TELTONIKA-MIB::Temperature
                    value: TELTONIKA-MIB::Temperature
                    num_oid: '.1.3.6.1.4.1.48690.2.9.{{ $index }}'
                    descr: system
                    index: 'Temperature.{{ $index }}'
                    divisor: 10

        state:
            data:
                -
                    oid: TELTONIKA-MIB::PinState
                    value: TELTONIKA-MIB::PinState
                    num_oid: '.1.3.6.1.4.1.48690.2.2.{{ $index }}'
                    descr: Pinstate
                    index: 'PinState.{{ $index }}'
                    state_name: Pinstate
                    states:

                -
                    oid: TELTONIKA-MIB::ConnectionState
                    value: TELTONIKA-MIB::ConnectionState
                    num_oid: '.1.3.6.1.4.1.48690.2.7.{{ $index }}'
                    descr: "{{ TELTONIKA-MIB::Operator }}"
                    index: 'ConnectionState.{{ $index }}'
                    state_name: ConnectionState
                    states:

                -
                    oid: TELTONIKA-MIB::ConnectionType
                    value: TELTONIKA-MIB::ConnectionType
                    num_oid: '.1.3.6.1.4.1.48690.2.8.{{ $index }}'
                    descr: "{{ TELTONIKA-MIB::Operator }}"
                    index: 'ConnectionType.{{ $index }}'
                    state_name: ConnectionType
                    states:


        dbm:
            data:
                -
                    oid: TELTONIKA-MIB::Signal
                    value: TELTONIKA-MIB::Signal
                    num_oid: '.1.3.6.1.4.1.48690.2.4.{{ $index }}'
                    entPhysicalIndex: '{{ $index }}'
                    descr: 'signal'
                    index: 'Signal.{{ $index }}'


