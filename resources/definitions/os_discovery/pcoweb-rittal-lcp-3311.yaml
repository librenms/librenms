modules:
    sensors:
        temperature:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::lcpSetpoint
                    value: CAREL-RITTAL-LCP-3311-MIB::lcpSetpoint
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.48.{{ $index }}'
                    descr: LCP setpoint
                    index: 'lcpSetpoint.{{ $index }}'
                    low_limit: 150
                    high_limit: 280
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureAverage
                    value: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureAverage
                    divisor: 10
                    group: Input
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.21.{{ $index }}'
                    descr: Average input temperature
                    index: 'inputTemperatureAverage.{{ $index }}'
                    low_limit: -140
                    low_warn_limit: -100
                    warn_limit: 400
                    high_limit: 440
                -
                    # Temps according to ASHRAE standards
                    oid: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureAverage
                    value: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureAverage
                    divisor: 10
                    group: Output
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.22.{{ $index }}'
                    descr: Average output temperature
                    index: 'outputTemperatureAverage.{{ $index }}'
                    low_limit: 150
                    low_warn_limit: 160
                    warn_limit: 280
                    high_limit: 300
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureTopSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureTopSensor
                    divisor: 10
                    group: Input
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.6.{{ $index }}'
                    descr: Top sensor input temperature
                    index: 'inputTemperatureTopSensor.{{ $index }}'
                    low_limit: -140
                    low_warn_limit: -100
                    warn_limit: 400
                    high_limit: 440
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureMidSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureMidSensor
                    divisor: 10
                    group: Input
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.7.{{ $index }}'
                    descr: Mid sensor input temperature
                    index: 'inputTemperatureMidSensor.{{ $index }}'
                    low_limit: -140
                    low_warn_limit: -100
                    warn_limit: 400
                    high_limit: 440
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureBottomSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::inputTemperatureBottomSensor
                    divisor: 10
                    group: Input
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.8.{{ $index }}'
                    descr: Bottom sensor input temperature
                    index: 'inputTemperatureBottomSensor.{{ $index }}'
                    low_limit: -140
                    low_warn_limit: -100
                    warn_limit: 400
                    high_limit: 440
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureTopSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureTopSensor
                    divisor: 10
                    group: Output
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.2.{{ $index }}'
                    descr: Top sensor output temperature
                    index: 'outputTemperatureTopSensor.{{ $index }}'
                    low_limit: 150
                    low_warn_limit: 160
                    warn_limit: 280
                    high_limit: 300
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureMidSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureMidSensor
                    divisor: 10
                    group: Output
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.3.{{ $index }}'
                    descr: Mid sensor output temperature
                    index: 'outputTemperatureMidSensor.{{ $index }}'
                    low_limit: 150
                    low_warn_limit: 160
                    warn_limit: 280
                    high_limit: 300
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureBottomSensor
                    value: CAREL-RITTAL-LCP-3311-MIB::outputTemperatureBottomSensor
                    divisor: 10
                    group: Output
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.4.{{ $index }}'
                    descr: Bottom sensor output temperature
                    index: 'outputTemperatureBottomSensor.{{ $index }}'
                    low_limit: 150
                    low_warn_limit: 160
                    warn_limit: 280
                    high_limit: 300
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::driverTemperature
                    value: CAREL-RITTAL-LCP-3311-MIB::driverTemperature
                    divisor: 10
                    group: Unit
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.4.{{ $index }}'
                    descr: Power+ driver temperature
                    index: 'driverTemperature.{{ $index }}'
                    low_limit: 10
                    low_warn_limit: 20
                    warn_limit: 100
                    high_limit: 120
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorDischargeTemperature
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorDischargeTemperature
                    divisor: 10
                    group: Unit
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.9.{{ $index }}'
                    descr: Compressor discharge temperature
                    index: 'compressorDischargeTemperature.{{ $index }}'
                    low_limit: 30
                    low_warn_limit: 50
                    warn_limit: 880
                    high_limit: 900
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorSuctionTemperature
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorSuctionTemperature
                    divisor: 10
                    group: Unit
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.10.{{ $index }}'
                    descr: Compressor suction temperature
                    index: 'compressorSuctionTemperature.{{ $index }}'
                    low_limit: 30
                    low_warn_limit: 50
                    warn_limit: 880
                    high_limit: 900
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::evaporatorTemperature
                    value: CAREL-RITTAL-LCP-3311-MIB::evaporatorTemperature
                    divisor: 10
                    group: Unit
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.13.{{ $index }}'
                    descr: Evaporator temperature
                    index: 'evaporatorTemperature.{{ $index }}'
                    low_limit: -100
                    low_warn_limit: -80
                    warn_limit: 150
                    high_limit: 200
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::condensingTemperature
                    value: CAREL-RITTAL-LCP-3311-MIB::condensingTemperature
                    divisor: 10
                    group: Unit
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.14.{{ $index }}'
                    descr: Condensor temperature
                    index: 'condensingTemperature.{{ $index }}'
                    low_limit: 30
                    low_warn_limit: 50
                    warn_limit: 450
                    high_limit: 500

        pressure:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorDischargePressure
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorDischargePressure
                    multiplier: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.11.{{ $index }}'
                    descr: Compressor discharge pressure
                    index: 'compressorDischargePressure.{{ $index }}'
                    warn_limit: 2800
                    high_limit: 2900
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorSuctionPressure
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorSuctionPressure
                    multiplier: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.12.{{ $index }}'
                    descr: Compressor suction pressure
                    index: 'compressorSuctionPressure.{{ $index }}'
                    warn_limit: 2800
                    high_limit: 2900
        cooling:
        # LCP DX has a max cooling capacity of 12Kw. Measurement is done in %
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::coolingCapacity
                    value: CAREL-RITTAL-LCP-3311-MIB::coolingCapacity
                    multiplier: 120
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.16.{{ $index }}'
                    descr: Free cooling capacity
                    index: 'coolingCapacity.{{ $index }}'
                    low_limit: 1000
                    low_warn_limit: 1500
        fanspeed:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::fanSpeedRpm
                    value: CAREL-RITTAL-LCP-3311-MIB::fanSpeedRpm
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.29.{{ $index }}'
                    descr: Fan speed
                    index: 'fanSpeedRpm.{{ $index }}'
                    warn_limit: 3400
                    high_limit: 3600
                -
                    # See documentation pg 47
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorRotorSpeedHz
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorRotorSpeedHz
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.1.{{ $index }}'
                    descr: Compressor rotor speed
                    index: 'compressorRotorSpeed.{{ $index }}'
                    low_limit: 500
                    low_warn_limit: 1000
                    warn_limit: 6000
                    high_limit: 6500
        current:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::compressorMotorCurrent
                    value: CAREL-RITTAL-LCP-3311-MIB::compressorMotorCurrent
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.2.46.{{ $index }}'
                    descr: Compressor motor current
                    index: 'compressorMotorCurrent.{{ $index }}'
        voltage:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::dcBusVoltage
                    value: CAREL-RITTAL-LCP-3311-MIB::dcBusVoltage
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.5.{{ $index }}'
                    descr: Power+ DC voltage
                    index: 'dcBusVoltage.{{ $index }}'
                    low_limit: 500
                    low_warn_limit: 510
                    warn_limit: 565
                    high_limit: 570
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::motorVoltage
                    value: CAREL-RITTAL-LCP-3311-MIB::motorVoltage
                    divisor: 10
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.6.{{ $index }}'
                    descr: Motor voltage
                    index: 'motorVoltage.{{ $index }}'
                    low_limit: 20
                    low_warn_limit: 50
                    warn_limit: 265
                    high_limit: 270
        state:
            data:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::unitOnOff
                    group: Power
                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.3.13.{{ $index }}'
                    descr: Unit
                    index: 'unitOnOff.{{ $index }}'
                    state_name: unitOnOff
                    states:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::driverPowerStatus
