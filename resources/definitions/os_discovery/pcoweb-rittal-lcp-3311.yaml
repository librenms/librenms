                    num_oid: '.1.3.6.1.4.1.9839.2606.2.1.1.3.{{ $index }}'
                    descr: High pressure
                    index: 'highPressureAlarm.{{ $index }}'
                    state_name: highPressureAlarm
                    states:
                -
                    oid: CAREL-RITTAL-LCP-3311-MIB::inverterAlarm
