modules:
    sensors:
        state:
            data:
                -
                    oid: PEGASUS-MIB::dslCardTable
                    value: PEGASUS-MIB::dslCardOperState
                    num_oid: '.1.3.6.1.4.1.6368.2.1.1.1.6.{{ $index }}'
                    descr: LTU {{ $index }} Operational State
                    state_name: dslCardOperState
                    states:
                        - { descr: enabled, value: 1, generic: 0 }
                        - { descr: disabled, value: 2, generic: 2 }
                -
                    oid: PEGASUS-MIB::dslCardTable
                    value: PEGASUS-MIB::dslCardCommState
                    num_oid: '.1.3.6.1.4.1.6368.2.1.1.1.9.{{ $index }}'
                    descr: LTU {{ $index }} Mgmt Comm State
                    state_name: dslCardCommState
                    states:
                        - { descr: disconnected, value: 1, generic: 0 }
                        - { descr: init, value: 2, generic: 0 }
                        - { descr: identification, value: 3, generic: 0 }
                        - { descr: checkHw, value: 4, generic: 0 }
                        - { descr: hwAdaption, value: 5, generic: 0 }
                        - { descr: checkHwVers, value: 6, generic: 0 }
                        - { descr: wrongProgramm, value: 7, generic: 0 }
                        - { descr: checkConfig, value: 8, generic: 0 }
                        - { descr: downloadConfig, value: 9, generic: 0 }
                        - { descr: uploadConfig, value: 10, generic: 0 }
                        - { descr: statusSynch, value: 11, generic: 0 }
                        - { descr: resetting, value: 12, generic: 0 }
                        - { descr: inactive, value: 13, generic: 0 }
                        - { descr: active, value: 14, generic: 0 }
                -
                    oid: PEGASUS-MIB::v5CardTable
                    value: PEGASUS-MIB::v5CardOperState
                    num_oid: '.1.3.6.1.4.1.6368.2.2.1.1.7.{{ $index }}'
                    descr: V5 {{ $index }} Operational State
                    state_name: v5CardOperState
                    states:
                        - { descr: enabled, value: 1, generic: 0 }
                        - { descr: disabled, value: 2, generic: 2 }
                -
                    oid: PEGASUS-MIB::v5CardTable
                    value: PEGASUS-MIB::v5CardCommState
                    num_oid: '.1.3.6.1.4.1.6368.2.2.1.1.10.{{ $index }}'
                    descr: V5 {{ $index }} Mgmt Comm State
                    state_name: v5CardCommState
                    states:
                        - { descr: disconnected, value: 1, generic: 0 }
                        - { descr: init, value: 2, generic: 0 }
                        - { descr: identification, value: 3, generic: 0 }
                        - { descr: checkHw, value: 4, generic: 0 }
                        - { descr: hwAdaption, value: 5, generic: 0 }
                        - { descr: checkHwVers, value: 6, generic: 0 }
                        - { descr: wrongProgramm, value: 7, generic: 0 }
                        - { descr: checkConfig, value: 8, generic: 0 }
                        - { descr: downloadConfig, value: 9, generic: 0 }
                        - { descr: uploadConfig, value: 10, generic: 0 }
                        - { descr: statusSynch, value: 11, generic: 0 }
                        - { descr: resetting, value: 12, generic: 0 }
                        - { descr: inactive, value: 13, generic: 0 }
                        - { descr: active, value: 14, generic: 0 }
                -
                    oid: PEGASUS-MIB::dataCardTable
                    value: PEGASUS-MIB::dataCardOperState
                    num_oid: '.1.3.6.1.4.1.6368.2.3.1.1.6.{{ $index }}'
                    descr: Data {{ $index }} Operational State
                    state_name: dataCardOperState
                    states:
                        - { descr: enabled, value: 1, generic: 0 }
                        - { descr: disabled, value: 2, generic: 2 }
                -
                    oid: PEGASUS-MIB::dataCardTable
                    value: PEGASUS-MIB::dataCardCommState
                    num_oid: '.1.3.6.1.4.1.6368.2.3.1.1.9.{{ $index }}'
                    descr: Data {{ $index }} Mgmt Comm State
                    state_name: dataCardCommState
                    states:
                        - { descr: disconnected, value: 1, generic: 0 }
                        - { descr: init, value: 2, generic: 0 }
                        - { descr: identification, value: 3, generic: 0 }
                        - { descr: checkHw, value: 4, generic: 0 }
                        - { descr: hwAdaption, value: 5, generic: 0 }
                        - { descr: checkHwVers, value: 6, generic: 0 }
                        - { descr: wrongProgramm, value: 7, generic: 0 }
                        - { descr: checkConfig, value: 8, generic: 0 }
                        - { descr: downloadConfig, value: 9, generic: 0 }
                        - { descr: uploadConfig, value: 10, generic: 0 }
                        - { descr: statusSynch, value: 11, generic: 0 }
                        - { descr: resetting, value: 12, generic: 0 }
                        - { descr: inactive, value: 13, generic: 0 }
                        - { descr: active, value: 14, generic: 0 }
