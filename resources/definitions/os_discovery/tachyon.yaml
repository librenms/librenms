
modules:

    os:
        version: TACHYON-MIB::firmwareVersion.0
        serial: TACHYON-MIB::deviceSerialNo.0
        hardware: TACHYON-MIB::deviceModel.0

    mempools:
        data:
            -
                percent_used: TACHYON-MIB::memoryUsagePercent
    processors:
        data:
            -
                oid: TACHYON-MIB::cpuUsagePercent
                num_oid: '.1.3.6.1.4.1.57344.1.3.6.{{ $index }}'
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - TACHYON-MIB::wirelessPeerMac
                        - TACHYON-MIB::wirelessPeerName

        temperature:
            data:
                -
                    oid: TACHYON-MIB::cpuTemperature
                    num_oid: ".1.3.6.1.4.1.57344.1.3.3.{{ $index }}"
                    descr: CPU temperature
                    index: "cpuTemperature.{{ $index }}"
                    low_limit: -40
                    high_limit: 75
                -
                    oid: TACHYON-MIB::wirelessRadioTemperature
                    num_oid: ".1.3.6.1.4.1.57344.1.2.2.1.11.{{ $index }}"
                    descr: Radio temperature
                    index: "wirelessRadioTemperature.{{ $index }}"
                    low_limit: -40
                    high_limit: 75
                -
                    oid: TACHYON-MIB::wirelessRadioModemTemperature
                    num_oid: ".1.3.6.1.4.1.57344.1.2.2.1.10.{{ $index }}"
                    descr: Radio Modem temperature
                    index: "wirelessRadioModemTemperature.{{ $index }}"
                    low_limit: -40
                    high_limit: 75

        frequency:
            data:
                -
                    oid: TACHYON-MIB::wirelessRadioFrequency
                    num_oid: ".1.3.6.1.4.1.57344.1.2.2.1.5.{{ $index }}"
                    descr: Frequency
                    index: "wirelessRadioFrequency.{{ $index }}"
                    multiplier: 1000000

                -
                    oid: TACHYON-MIB::wirelessRadioChannelWidth
                    num_oid: ".1.3.6.1.4.1.57344.1.2.2.1.6.{{ $index }}"
                    descr: Channel widht
                    index: "wirelessRadioChannelWidth.{{ $index }}"
                    multiplier: 1000000


        count:
            data:
                -
                    oid: TACHYON-MIB::wirelessPeersCount
                    num_oid: ".1.3.6.1.4.1.57344.1.2.5.{{ $index }}"
                    descr: Station
                    index: "wirelessPeersCount.{{ $index }}"

        runtime:
            data:
                -
                    oid: TACHYON-MIB::wirelessPeerLinkUptime
                    num_oid: ".1.3.6.1.4.1.57344.1.2.6.1.12.{{ $index }}"
                    descr: 'Link up ({{ TACHYON-MIB::wirelessPeerMac }})'
                    index: "wirelessPeerLinkUptime.{{ $index }}"
                    divisor: 60

        state:
            data:
                -
                    oid: TACHYON-MIB::wirelessVapOperationMode
                    num_oid: '.1.3.6.1.4.1.57344.1.2.4.1.5.{{ $index }}'
                    descr: Mode
                    index: 'wirelessVapOperationMode.{{ $index }}'
                    group: Wireless
                    state_name: wirelessVapOperationMode
                    states:
                        - { descr: master, value: 0, generic: 0 }
                        - { descr: no-connection, value: 1, generic: 2 }
                        - { descr: stations, value: 2, generic: 0 }

                -
                    oid: TACHYON-MIB::wirelessVapSecurity
                    num_oid: '.1.3.6.1.4.1.57344.1.2.4.1.8.{{ $index }}'
                    descr: Security mode
                    index: 'wirelessVapSecurity.{{ $index }}'
                    group: Wireless
                    state_name: wirelessVapSecurity
                    states:
                        - { descr: Open, value: 0, generic: 0 }
                        - { descr: WPA2-PSK (GCMP), value: 1, generic: 0 }

                -
                    oid: TACHYON-MIB::wirelessPeerAntennaKit
                    num_oid: '.1.3.6.1.4.1.57344.1.2.2.1.8.{{ $index }}'
                    descr: '{{ TACHYON-MIB::wirelessPeerMac }}'
                    group: 'Antenna kit'
                    index: 'wirelessPeerAntennaKit.{{ $index }}'
                    state_name: wirelessPeerAntennaKit
                    states:
                        - { descr: none, value: 0, generic: 0 }
                        - { descr: ak-100, value: 1, generic: 0 }
                        - { descr: ak-150, value: 2, generic: 0 }
                        - { descr: ak-300, value: 3, generic: 0 }
                        - { descr: ak-s-45, value: 4, generic: 0 }
                        - { descr: ak-s-90, value: 4, generic: 0 }

                -
                    oid: TACHYON-MIB::wirelessPeerTxMcs
                    num_oid: '.1.3.6.1.4.1.57344.1.2.6.1.10.{{ $index }}'
                    descr: 'MCS TX ({{ TACHYON-MIB::wirelessPeerMac }})'
                    group: 'MCS {{ TACHYON-MIB::wirelessPeerMac }}'
                    index: wirelessPeerTxMcs.{{ $index }}
                    state_name: wirelessPeerTxMcs
                    states:
                        - { value: 0, descr: mcs0, generic: 1 }
                        - { value: 1, descr: mcs1, generic: 1 }
                        - { value: 2, descr: mcs2, generic: 1 }
                        - { value: 3, descr: mcs3, generic: 1 }
                        - { value: 4, descr: mcs4, generic: 2 }
                        - { value: 5, descr: mcs5, generic: 2 }
                        - { value: 6, descr: mcs6, generic: 2 }
                        - { value: 7, descr: mcs7, generic: 2 }
                        - { value: 8, descr: mcs8, generic: 0 }
                        - { value: 9, descr: mcs9, generic: 0 }
                        - { value: 10, descr: mcs10, generic: 0 }
                        - { value: 11, descr: mcs11, generic: 0 }
                        - { value: 12, descr: mcs12, generic: 0 }
                        - { value: 13, descr: mcs13, generic: 0 }

                -
                    oid: TACHYON-MIB::wirelessPeerRxMcs
                    num_oid: '.1.3.6.1.4.1.57344.1.2.6.1.11.{{ $index }}'
                    descr: 'MCS RX ({{ TACHYON-MIB::wirelessPeerMac }})'
                    group: 'MCS {{ TACHYON-MIB::wirelessPeerMac }}'
                    index: wirelessPeerRxMcs.{{ $index }}
                    state_name: wirelessPeerRxMcs
                    states:
                        - { value: 0, descr: mcs0, generic: 1 }
                        - { value: 1, descr: mcs1, generic: 1 }
                        - { value: 2, descr: mcs2, generic: 1 }
                        - { value: 3, descr: mcs3, generic: 1 }
                        - { value: 4, descr: mcs4, generic: 2 }
                        - { value: 5, descr: mcs5, generic: 2 }
                        - { value: 6, descr: mcs6, generic: 2 }
                        - { value: 7, descr: mcs7, generic: 2 }
                        - { value: 8, descr: mcs8, generic: 0 }
                        - { value: 9, descr: mcs9, generic: 0 }
                        - { value: 10, descr: mcs10, generic: 0 }
                        - { value: 11, descr: mcs11, generic: 0 }
                        - { value: 12, descr: mcs12, generic: 0 }
                        - { value: 13, descr: mcs13, generic: 0 }
