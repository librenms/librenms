modules:
    os:
        serial:
            - HWg-WLD-MIB::wldSN.1
    sensors:
        state:
            data:
                -
                    oid: HWg-WLD-MIB::wldTable
                    value: HWg-WLD-MIB::wldState
                    num_oid: '.1.3.6.1.4.1.21796.4.5.4.1.3.{{ $index }}'
                    descr: '"{{ HWg-WLD-MIB::wldName }}" state'
                    index: 'wldState.{{ $index }}'
                    state_name: wldState
                    states:
                    skip_values:
                        -
                            oid: HWg-WLD-MIB::wldValue
                            op: '='
                            value: 2
                -
                    oid: HWg-WLD-MIB::wldTable
                    value: HWg-WLD-MIB::wldValue
                    num_oid: '.1.3.6.1.4.1.21796.4.5.4.1.6.{{ $index }}'
                    descr: '"{{ HWg-WLD-MIB::wldName }}" detailed state'
                    index: 'wldValue.{{ $index }}'
                    state_name: wldValue
                    states:
