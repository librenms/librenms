modules:
    os:
        hardware: EDS-MIB::eProductName.0
        version: EDS-MIB::eFirmwareVersion.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - EDS-MIB::owDeviceName
                        - EDS-MIB::owDS18B20Temperature
                        - EDS-MIB::owDeviceType
                        - EDS-MIB::owDS18B20Resolution

        count:
            data:
                -
                    oid: EDS-MIB::owDeviceNumActive
                    value: EDS-MIB::owDeviceNumActive
                    num_oid: '.1.3.6.1.4.1.31440.10.2.1.{{ $index }}'
                    descr: '1wire devices'
                    index: 'NumActive'
        temperature:
            data:
                -
                    oid: EDS-MIB::owDS18B20Temperature
                    value: EDS-MIB::owDS18B20Temperature
                    num_oid: '.1.3.6.1.4.1.31440.10.5.1.1.{{ $index }}'
                    descr: '#{{ $index }}: {{ EDS-MIB::owDeviceName }}'
                    index: 'owDS18B20Temperature{{ $index }}'
                    skip_values:
                        -
                            oid: EDS-MIB::owDS18B20Resolution
                            op: '='
                            value: 0
        state:
            data:
                -
                    oid: EDS-MIB::owDeviceType
                    value: EDS-MIB::owDeviceType
                    num_oid: '.1.3.6.1.4.1.31440.10.3.1.2.{{ $index }}'
                    descr: '#{{ $index }}: {{ EDS-MIB::owDeviceName }}'
                    state_name: owDeviceType
                    group: 'Device Types'
                    index: 'DeviceType{{ $index }}'
                    skip_values:
                        -
                            oid: EDS-MIB::owDeviceType
                            op: '='
                            value: 0
                    states:
                        - { descr: owNone, value: 0, generic: 3 }
                        - { descr: owUnknown, value: 1, generic: 3 }
                        - { descr: owDS2406, value: 2, generic: 0 }
                        - { descr: owDS18B20, value: 3, generic: 0 }
                        - { descr: owDS18S20, value: 4, generic: 0 }
                        - { descr: owDS2438, value: 5, generic: 0 }
                        - { descr: owDS2423, value: 6, generic: 0 }
                        - { descr: owDS2408, value: 7, generic: 0 }
                        - { descr: owDS2450, value: 8, generic: 0 }
                        - { descr: owEDS0064, value: 9, generic: 0 }
                        - { descr: owEDS0065, value: 10, generic: 0 }
                        - { descr: owEDS0066, value: 11, generic: 0 }
                        - { descr: owEDS0067, value: 12, generic: 0 }
                        - { descr: owEDS0068, value: 13, generic: 0 }
                        - { descr: owEDS0069, value: 14, generic: 0 }
                        - { descr: owEDS0070, value: 15, generic: 0 }
                        - { descr: owEDS0071, value: 16, generic: 0 }
                        - { descr: owEDS0080, value: 17, generic: 0 }
                        - { descr: owEDS0082, value: 18, generic: 0 }
                        - { descr: owEDS0083, value: 19, generic: 0 }
                        - { descr: owEDS0085, value: 20, generic: 0 }
                        - { descr: owEDS0090, value: 21, generic: 0 }
                        - { descr: owEDS0091, value: 22, generic: 0 }
                        - { descr: owEDS0092, value: 23, generic: 0 }
                        - { descr: owDS28EA00, value: 24, generic: 0 }
                        - { descr: owEDS0050, value: 25, generic: 0 }
                        - { descr: chassis, value: 30, generic: 0 }

