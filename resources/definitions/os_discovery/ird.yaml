modules:
    sensors:
        dbm:
            data:
                -
                    oid: PBI-4000P-5000P-MIB::tunerBER
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.1.7.{{ $index }}'
                    descr: 'BER'
                    index: 'tunerBER.{{ $index }}'
                -
                    oid: PBI-4000P-5000P-MIB::tunerCN
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.1.8.{{ $index }}'
                    descr: 'C/N'
                    index: 'tunerCN.{{ $index }}'
                    divisor: 10
                -
                    oid: PBI-4000P-5000P-MIB::tunerEbNo
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.1.9.{{ $index }}'
                    descr: 'Eb/N0'
                    index: 'tunerEbNo.{{ $index }}'
                    divisor: 10
        signal:
            data:
                -
                    oid: PBI-4000P-5000P-MIB::tunerStrength
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.1.6.{{ $index }}'
                    descr: 'Signal Strength'
                    index: 'tunerStrength.{{ $index }}'
                    divisor: -10
        state:
            data:
                -
                    oid: PBI-4000P-5000P-MIB::tunerLock
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.1.1.{{ $index }}'
                    descr: Tuner Lock
                    state_name: tunerLock
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::lnbVoltage
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.3.4.{{ $index }}'
                    descr: LNB Voltage
                    state_name: lnbVoltage
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::lnb22KHz
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.3.5.{{ $index }}'
                    descr: LNB 22KHz
                    state_name: lnb22KHz
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::diseqc
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.3.6.{{ $index }}'
                    descr: DiSEqC
                    state_name: diseq
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::linkStatus
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.1.3.4.{{ $index }}'
                    descr: Eth Link Status
                    state_name: linkStatus
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::ciSource
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.11.1.{{ $index }}'
                    descr: CI Source
                    state_name: ciSource
                    states:
                -
                    oid: PBI-4000P-5000P-MIB::ciLock
                    num_oid: '.1.3.6.1.4.1.1070.3.1.1.104.11.6.{{ $index }}'
                    descr: CI Lock
                    state_name: ciLock
                    states:
