modules:
    sensors:
        state:
            data:
                -
                    oid: LENOVO-ENV-MIB::lenovoEnvMibPowerSupplyEntry
                    value: LENOVO-ENV-MIB::lenovoEnvMibPowerSupplyState
                    num_oid: '.1.3.6.1.4.1.19046.2.3.11.1.1.1.5.{{ $index }}'
                    descr: 'PS{{ LENOVO-ENV-MIB::lenovoEnvMibPowerSupplyID }}'
                    index: 'lenovoEnvMibPowerSupplyState.{{ $index }}'
                    states:
                -
                    oid: LENOVO-ENV-MIB::lenovoEnvMibFanEntry
                    value: LENOVO-ENV-MIB::lenovoEnvMibFanState
                    num_oid: '.1.3.6.1.4.1.19046.2.3.11.1.2.1.1.5.{{ $index }}'
                    descr: LENOVO-ENV-MIB::lenovoEnvMibFanName
                    index: 'lenovoEnvMibFanState.{{ $index }}'
                    states:
                -
                    oid: LENOVO-ENV-MIB::lenovoEnvMibTempSensorEntry
                    value: LENOVO-ENV-MIB::lenovoEnvMibTempSensorState
                    num_oid: '.1.3.6.1.4.1.19046.2.3.11.1.3.1.1.5.{{ $index }}'
                    descr: LENOVO-ENV-MIB::lenovoEnvMibTempSensorDesc
                    index: 'lenovoEnvMibTempSensorState.{{ $index }}'
                    states:
        fanspeed:
            data:
                -
                    oid: LENOVO-ENV-MIB::lenovoEnvMibFanEntry
                    value: LENOVO-ENV-MIB::lenovoEnvMibFanSpeedRPM
                    num_oid: '.1.3.6.1.4.1.19046.2.3.11.1.2.1.8.{{ $index }}'
                    index: 'lenovoEnvMibFanSpeedRPM.{{ $index }}'
                    descr: LENOVO-ENV-MIB::lenovoEnvMibFanName

        temperature:
            data:
                -
                    oid: LENOVO-ENV-MIB::lenovoEnvMibTempSensorEntry
                    value: LENOVO-ENV-MIB::lenovoEnvMibTempSensorTemperature
                    num_oid: '.1.3.6.1.4.1.19046.2.3.11.1.3.1.6.{{ $index }}'
                    index: 'lenovoEnvTempSensorTemperature.{{ $index }}'
                    descr: LENOVO-ENV-MIB::lenovoEnvMibTempSensorName
