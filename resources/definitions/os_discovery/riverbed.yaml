modules:
    os:
        hardware: .1.3.6.1.4.1.17163.1.1.1.1.0
        serial: .1.3.6.1.4.1.17163.1.1.1.2.0
        version: .1.3.6.1.4.1.17163.1.1.1.3.0
    processors:
        data:
            -
                oid: STEELHEAD-MIB::cpuUtil1
                num_oid: '.1.3.6.1.4.1.17163.1.1.5.1.4.{{ $index }}'
                precision: 1
                type: riverbed-cpu

    sensors:
        temperature:
            data:
                -
                    oid: STEELHEAD-MIB::systemTemperature
                    value: STEELHEAD-MIB::systemTemperature
                    num_oid: '.1.3.6.1.4.1.17163.1.1.2.9.{{ $index }}'
                    snmp_flags: '-OQUs'
                    index: 0
                    descr: 'System Temperature'
                    high_limit: 65
        state:
            data:
                -
                    oid: STEELHEAD-MIB::systemHealth
                    value: STEELHEAD-MIB::systemHealth
                    num_oid: '.1.3.6.1.4.1.17163.1.1.2.7.{{ $index }}'
                    descr: 'System Health'
                    index: 0
                    state_name: systemHealth
                    states:
                        - { descr: healthy, value: 10000, generic: 0 }
                        - { descr: degraded, value: 30000, generic: 1 }
                        - { descr: admissionControl, value: 31000, generic: 1 }
                        - { descr: critical, value: 50000, generic: 2 }
                -
                    oid: STEELHEAD-MIB::optServiceStatus
                    value: STEELHEAD-MIB::optServiceStatus
                    num_oid: '.1.3.6.1.4.1.17163.1.1.2.8.{{ $index }}'
                    descr: 'Optimization Service Status'
                    index: 0
                    state_name: optServiceStatus
                    states:
                        - { descr: none, value: 0, generic: 3 }
                        - { descr: unmanaged, value: 1, generic: 3 }
                        - { descr: running, value: 2, generic: 0 }
                        - { descr: sentCom1, value: 3, generic: 1 }
                        - { descr: sentTerm1, value: 4, generic: 1 }
                        - { descr: sentTerm2, value: 5, generic: 1 }
                        - { descr: sentTerm3, value: 6, generic: 1 }
                        - { descr: pending, value: 7, generic: 1 }
                        - { descr: stopped, value: 8, generic: 2 }
