modules:
    sensors:
        state:
            data:
                -
                    oid: SFA-INFO::tempTable
                    value: SFA-INFO::tempStatus
                    num_oid: '.1.3.6.1.4.1.6894.2.2.1.4.{{ $index }}'
                    state_name: tempTable
                    descr: 'Temperature Sensor {{ $index }}'
                    index: '{{ $index }}'
                    states:
                -
                    oid: SFA-INFO::fanTable
                    value: SFA-INFO::fanStatus
                    num_oid: '.1.3.6.1.4.1.6894.2.4.1.4.{{ $index }}'
                    state_name: fanTable
                    descr: 'Fan Sensor {{ $index }}'
                    index: '{{ $index }}'
                    states:
                -
                    oid: SFA-INFO::powerTable
                    value: SFA-INFO::powerStatus
                    state_name: powerTable
                    num_oid: '.1.3.6.1.4.1.6894.2.6.1.4.{{ $index }}'
                    descr: 'Power Supply Sensor {{ $index }}'
                    index: '{{ $index }}'
                    states:
                -
                    oid: SFA-INFO::physicalDiskTable
                    value: SFA-INFO::physDiskState
                    num_oid: '.1.3.6.1.4.1.6894.2.9.1.7.{{ $index }}'
                    state_name: physicalDiskTable
                    descr: 'Disk Sensor {{ $index }}'
                    index: '{{ $index }}'
                    states:
