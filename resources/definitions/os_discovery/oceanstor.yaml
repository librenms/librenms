modules:
    os:
        version: ISM-STORAGE-SVC-MIB::version.0
        serial: ISM-STORAGE-SVC-MIB::deviceId.0
    storage:
        data:
            -
                descr: File System
                type: dsk
                size: ISM-STORAGE-SVC-MIB::totalCapacity.0
                used: ISM-STORAGE-SVC-MIB::usedCapacity.0
                used_num_oid: '.1.3.6.1.4.1.34774.4.1.1.4.{{ $index }}'
                units: 1048576
    sensors:
        temperature:
            data:
                -
                    oid: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskTable
                    value: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskTemperature
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.5.1.1.11.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskLocation }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskManufacturer }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskModel }}'
                    index: '{{ $index }}'
                    group: 'Disks'
        state:
            data:
                -
                    oid: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoControllerTable
                    value: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoControllerHealthStatus
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.5.2.1.2.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoControllerLocation }}'
                    group: 'Controllers'
                    state_name: hwInfoControllerHealthStatus
                    states:
                -
                    oid: HUAWEI-STORAGE-SPACE-MIB::hwInfoStoragePoolTable
                    value: HUAWEI-STORAGE-SPACE-MIB::hwInfoStoragePoolHealthStatus
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.4.2.1.5.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-SPACE-MIB::hwInfoStoragePoolName }}'
                    group: 'Storage Pools'
                    state_name: hwInfoStoragePoolHealthStatus
                    states:
                -
                    oid: HUAWEI-STORAGE-SPACE-MIB::hwInfoLunTable
                    value: HUAWEI-STORAGE-SPACE-MIB::hwInfoLunHealthStatus
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.4.8.1.9.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-SPACE-MIB::hwInfoLunName }}'
                    group: 'LUNs'
                    state_name: hwInfoLunHealthStatus
                    states:
                -
                    oid: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskTable
                    value: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskHealthStatus
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.5.1.1.2.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskLocation }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskManufacturer }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskModel }}'
                    index: '{{ $index }}'
                    group: 'Disks'
                    state_name: hwInfoDiskHealthStatus
                    states:
        percent:
            data:
                -
                    oid: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskTable
                    value: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskHealthMark
                    num_oid: '.1.3.6.1.4.1.34774.4.1.23.5.1.1.25.{{ $index }}'
                    descr: '{{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskLocation }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskManufacturer }} {{ HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskModel }}'
                    index: '{{ $index }}'
                    group: 'Disk Life Cycle'
                    skip_values:
                        -
                                oid: HUAWEI-STORAGE-HARDWARE-MIB::hwInfoDiskHealthMark
                                op: '='
                                value: 255
