modules:
    sensors:
        count:
            data:
                -
                    oid: MEINBERG-OS-MIB::mbgOsReceiverGoodSv
                    value: MEINBERG-OS-MIB::mbgOsReceiverGoodSv
                    num_oid: '.1.3.6.1.4.1.5597.7.2.3.1.1.6.{{ $index }}'
                    descr: 'Current number of good/usable satellites'
                    low_warn_limit: 10
                    low_limit: 5
                    group: GNSS
                    index: 'mbgOsReceiverGoodSv.{{ $index }}'
                -
                    oid: MEINBERG-OS-MIB::mbgOsReceiverSv
                    value: MEINBERG-OS-MIB::mbgOsReceiverSv
                    num_oid: '.1.3.6.1.4.1.5597.7.2.3.1.1.7.{{ $index }}'
                    descr: 'Current number of satellites visible'
                    low_warn_limit: 15
                    low_limit: 10
                    group: GNSS
                    index: 'mbgOsReceiverSv.{{ $index }}'
                -
                    oid: MEINBERG-OS-MIB::mbgOsSysrefGlbStateMasterRefVariance
                    value: MEINBERG-OS-MIB::mbgOsSysrefGlbStateMasterRefVariance
                    num_oid: '.1.3.6.1.4.1.5597.7.2.4.2.1.4.{{ $index }}'
                    group: PRECISION
                    descr: 'Master reference variance'
                    index: 'mbgOsSysrefGlbStateMasterRefVariance.{{ $index }}'
                -
                    oid: MEINBERG-OS-MIB::mbgOsSysrefGlbStateMasterRefAccuracy
                    value: MEINBERG-OS-MIB::mbgOsSysrefGlbStateMasterRefAccuracy
                    num_oid: '.1.3.6.1.4.1.5597.7.2.4.2.1.3.{{ $index }}'
                    group: PRECISION
                    descr: 'Master reference accuracy (ns)'
                    index: 'mbgOsSysrefGlbStateMasterRefAccuracy.{{ $index }}'
                -
                    oid: MEINBERG-OS-MIB::mbgOsPtpMiscTableEntry
                    value: MEINBERG-OS-MIB::mbgOsPtpMiscUnicastSlaves
                    num_oid: '.1.3.6.1.4.1.5597.7.2.5.2.1.1.4.{{ $index }}'
                    descr: "Unicast Slave: {{ MEINBERG-OS-MIB::mbgOsPtpMiscNetworkIntfLabel }}"
                    group: PTP
                    index: 'ptp_{{ $index }}_unicast_slave}'
                -
                    oid: MEINBERG-OS-MIB::mbgOsPtpParentDsTableEntry
                    value: MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockVariance
                    num_oid: '.1.3.6.1.4.1.5597.7.2.5.2.3.1.8.{{ $index }}'
                    group: PTP
                    descr: '{{ MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockId }} master variance'
                    index: 'mbgOsPtpParentDsGmClockVariance.{{ $index }}'
                    skip_values:
                        -
                          oid: MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockAccuracy
                          op: '='
                          value: 0
                -
                    oid: MEINBERG-OS-MIB::mbgOsPtpParentDsTableEntry
                    value: MEINBERG-OS-MIB::mbgOsPtpParentDsGmPrio1
                    num_oid: '.1.3.6.1.4.1.5597.7.2.5.2.3.1.4.{{ $index }}'
                    group: PTP
                    descr: '{{ MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockId }} master Priority'
                    index: 'mbgOsPtpParentDsGmPrio1.{{ $index }}'
                    skip_values:
                        -
                          oid: MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockAccuracy
                          op: '='
                          value: 0
                -
                    oid: MEINBERG-OS-MIB::mbgOsSysrefSrcStateTableEntry
                    value: MEINBERG-OS-MIB::mbgOsSysrefSrcStateOffset
                    num_oid: '.1.3.6.1.4.1.5597.7.2.4.2.2.1.1.5.{{ $index }}'
                    descr: "Priority {{ MEINBERG-OS-MIB::mbgOsSysrefSrcStatePriority }}: {{ MEINBERG-OS-MIB::mbgOsSysrefSrcStateId }} - offset (ns)"
                    group: REFERENCES
                    index: 'ptp_references_{{ $index }}}'
        state:
            data:
                -
                    oid: MEINBERG-OS-MIB::mbgOsSysrefGlbStateSysSync
                    value: MEINBERG-OS-MIB::mbgOsSysrefGlbStateSysSync
                    num_oid: '.1.3.6.1.4.1.5597.7.2.4.2.1.5.{{ $index }}'
                    descr: 'System global sync state'
                    index: 'mbgOsSysrefGlbStateSysSync.{{ $index }}'
                    state_name: mbgOsSysrefGlbStateSysSync
                    states:
                -
                    oid: MEINBERG-OS-MIB::mbgOsReceiverState
                    value: MEINBERG-OS-MIB::mbgOsReceiverState
                    num_oid: '.1.3.6.1.4.1.5597.7.2.3.1.1.3.{{ $index }}'
                    descr: 'Receiver status'
                    index: 'mbgOsReceiverState.{{ $index }}'
                    state_name: mbgOsReceiverState
                    states:
                -
                    oid: MEINBERG-OS-MIB::mbgOsPtpMiscTableEntry
                    value: MEINBERG-OS-MIB::mbgOsPtpMiscRunning
                    num_oid: '.1.3.6.1.4.1.5597.7.2.5.2.1.1.2.{{ $index }}'
                    descr: "Interface: {{ MEINBERG-OS-MIB::mbgOsPtpMiscNetworkIntfLabel }}"
                    index: 'ptp_{{ $index }}}_state'
                    group: PTP
                    state_name: mbgOsPtpMiscTableEntry
                    states:
                -
                    oid: MEINBERG-OS-MIB::mbgOsPtpParentDsTableEntry
                    value: MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockAccuracy
                    num_oid: '.1.3.6.1.4.1.5597.7.2.5.2.3.1.7.{{ $index }}'
                    group: PTP
                    descr: '{{ MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockId }} master accuracy'
                    index: 'mbgOsPtpParentDsGmClockAccuracy.{{ $index }}'
                    skip_values:
                        -
                          oid: MEINBERG-OS-MIB::mbgOsPtpParentDsGmClockAccuracy
                          op: '='
                          value: 0
                    state_name: mbgOsPtpParentDsTableEntry
                    states:
