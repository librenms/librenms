modules:
    os:
        hardware: IB-PLATFORMONE-MIB::ibHardwareType.0
        version: IB-PLATFORMONE-MIB::ibNiosVersion.0
        serial: IB-PLATFORMONE-MIB::ibSerialNumber.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - IB-PLATFORMONE-MIB::ibServiceName
                    snmp_flags: ['-OQUSb']

        state:
            data:
                -
                    oid: IB-PLATFORMONE-MIB::ibGridStatus
                    num_oid: '.1.3.6.1.4.1.7779.3.1.1.2.1.12.{{ $index }}'
                    index: 'ibGridStatus.{{ $index }}'
                    descr: Grid Status
                    state_name: ibGridStatus
                    states:
                -
                    oid: IB-PLATFORMONE-MIB::ibHaStatus
                    num_oid: '.1.3.6.1.4.1.7779.3.1.1.2.1.13.{{ $index }}'
                    index: 'ibHaStatus.{{ $index }}'
                    descr: HA Status
                    state_name: ibHaStatus
                    states:
                -
                    oid: IB-PLATFORMONE-MIB::ibServiceStatus
                    num_oid: '.1.3.6.1.4.1.7779.3.1.1.2.1.9.1.2.{{ $index }}'
                    index: 'ibServiceStatus.{{ $index }}'
                    descr: '{{ IB-PLATFORMONE-MIB::ibServiceName }} Status'
                    state_name: ibServiceStatus
                    states:
