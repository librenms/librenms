modules:
    os:
        sysDescr_regex: '/5\d(?<hardware>.*?)( Wireless|,).*Version\s+(?<version>[\d-]+)/'
        hardware: CAMBIUM-PTP650-MIB::masterSlaveMode.0
        hardware_template: '{{ CAMBIUM-PTP650-MIB::hardware }} {{ CAMBIUM-PTP650-MIB::masterSlaveMode.0 }}'
    sensors:
        state:
            data:
                -
                    oid: CAMBIUM-PTP650-MIB::tDDSynchronizationStatus
                    num_oid: '.1.3.6.1.4.1.17713.7.13.11.{{ $index }}'
                    index: 0
                    descr: Sync Status
                    state_name: tDDSynchronizationStatus
                    states:
