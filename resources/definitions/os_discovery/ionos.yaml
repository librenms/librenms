modules:
    sensors:
        state:
            data:
                -
                    oid: EQUIPMENT-MIB::equipStatusV2
                    num_oid: '.1.3.6.1.4.1.1038.107.11.{{ $index }}'
                    descr: Status of all equipment objects
                    state_name: Severity
                    states:
                        - { value: 1, generic: 0, descr: nonAlarmed }
                        - { value: 2, generic: 0, descr: minor }
                        - { value: 3, generic: 1, descr: major }
                        - { value: 4, generic: 2, descr: critical }
                        - { value: 5, generic: 1, descr: warning }
                        - { value: 6, generic: 0, descr: invNonAlarmed }
                        - { value: 7, generic: 0, descr: invMinor }
                        - { value: 8, generic: 1, descr: invMajor }
                        - { value: 9, generic: 2, descr: invCritical }
                        - { value: 10, generic: 1, descr: invWarning }
