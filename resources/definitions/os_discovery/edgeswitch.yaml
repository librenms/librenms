modules:
    mempools:
        data:
            -
                total: EdgeSwitch-SWITCHING-MIB::agentSwitchCpuProcessMemAvailable
                free: EdgeSwitch-SWITCHING-MIB::agentSwitchCpuProcessMemFree
                precision: 1024
    os:
        sysDescr_regex: '/^(?<hardware>EdgeSwitch[ \d\w\-]*|EdgePoint Switch[ \d\w\-]*|US[ \d\w\-]*)(,)* (firmware )*(?<version>\S*)(, Linux .*)*$/'
        serial: ENTITY-MIB::entPhysicalSerialNum.1
    sensors:
        state:
            data:
                -
                    oid: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempUnitEntry
                    value: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempUnitState
                    num_oid: '.1.3.6.1.4.1.4413.1.1.43.1.15.1.2.{{ $index }}'
                    state_name: boxServicesTempUnitEntry
                    descr: 'Chassis state'
                    index: 'boxServicesTempUnitState.{{ $index }}'
                    states:
                -
                    oid: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempSensorsEntry
                    value: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempSensorState
                    state_name: boxServicesTempSensorsEntry
                    num_oid: '.1.3.6.1.4.1.4413.1.1.43.1.8.1.4.{{ $index }}'
                    descr: 'Temp Sensor {{ $index }}'
                    index: 'boxServicesTempSensorState.{{ $index }}'
                    states:

                -
                    oid: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesFansEntry
                    value: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesFanItemState
                    state_name: boxServicesFansEntry
                    num_oid: '.1.3.6.1.4.1.4413.1.1.43.1.6.1.3.{{ $index }}'
                    descr: 'Fan {{ $index }}'
                    index: 'boxServicesFanItemState.{{ $index }}'
                    states:

        fanspeed:
            data:
                -
                    oid: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesFansEntry
                    value: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesFanSpeed
                    num_oid: '.1.3.6.1.4.1.4413.1.1.43.1.6.1.4.{{ $index }}'
                    index: 'boxServicesFanSpeed.{{ $index }}'
                    descr: 'Fan {{ $index }}'

        temperature:
            data:
                -
                    oid: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempSensorsEntry
                    value: EdgeSwitch-BOXSERVICES-PRIVATE-MIB::boxServicesTempSensorTemperature
                    num_oid: '.1.3.6.1.4.1.4413.1.1.43.1.8.1.5.{{ $index }}'
                    index: 'boxServicesTempSensorTemperature.{{ $index }}'
                    descr: 'Temperature {{ $index }}'
