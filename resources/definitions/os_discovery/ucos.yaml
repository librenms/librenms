modules:
    os:
        hardware_mib: CISCO-PRODUCTS-MIB
        version: SYSAPPL-MIB::sysApplInstallPkgVersion.1
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentChassisDn
                        - CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentFanModuleDn
                        - CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentPsuDn
        state:
            data:
                -
                    oid: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentChassisOperState
                    value: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentChassisOperState
                    num_oid: '.1.3.6.1.4.1.9.9.719.1.15.7.1.27.{{ $index }}'
                    descr: 'Chassis - {{ CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentChassisDn }}'
                    index: '{{ $index }}'
                    group: Chassis
                    state_name: cucsEquipmentChassisOperState
                    states:
                        - { value: 0, descr: unknown, generic: 3 }
                        - { value: 1, descr: operable, generic: 0 }
                        - { value: 2, descr: inoperable, generic: 2 }
                        - { value: 3, descr: degraded, generic: 2 }
                        - { value: 4, descr: powered off, generic: 3 }
                        - { value: 5, descr: power problem, generic: 2 }
                        - { value: 6, descr: removed, generic: 3 }
                        - { value: 7, descr: voltage problem, generic: 2 }
                        - { value: 8, descr: thermal problem, generic: 2 }
                        - { value: 9, descr: performance problem, generic: 2 }
                        - { value: 10, descr: accessibility problem, generic: 2 }
                        - { value: 11, descr: identity unestablishable, generic: 2 }
                        - { value: 12, descr: BIOS POST timeout, generic: 2 }
                        - { value: 13, descr: disabled, generic: 3 }
                        - { value: 14, descr: malformed FRU, generic: 1 }
                        - { value: 51, descr: fabric connectivity problem, generic: 2 }
                        - { value: 52, descr: fabric unsupported connection, generic: 2 }
                        - { value: 81, descr: config, generic: 1 }
                        - { value: 82, descr: equipment problem, generic: 2 }
                        - { value: 83, descr: decomissioning, generic: 1 }
                        - { value: 84, descr: chassis limit exceeded, generic: 1 }
                        - { value: 100, descr: not supported, generic: 1 }
                        - { value: 101, descr: discovery, generic: 3 }
                        - { value: 102, descr: discovery failed, generic: 1 }
                        - { value: 103, descr: identify, generic: 3 }
                        - { value: 104, descr: post failure, generic: 2 }
                        - { value: 105, descr: upgrade problem, generic: 2 }
                        - { value: 106, descr: peer communication problem, generic: 2 }
                        - { value: 107, descr: auto upgrade, generic: 3 }

                -
                    oid: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentFanModuleOperState
                    value: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentFanModuleOperState
                    num_oid: '.1.3.6.1.4.1.9.9.719.1.15.13.1.7.{{ $index }}'
                    descr: 'Fan Module - {{ CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentFanModuleDn }}'
                    index: '{{ $index }}'
                    group: Fans
                    state_name: cucsEquipmentFanModuleOperState
                    states:
                        - { value: 0, descr: unknown, generic: 3 }
                        - { value: 1, descr: ok, generic: 0 }
                        - { value: 2, descr: upper non-recoverable, generic: 2 }
                        - { value: 3, descr: upper critical, generic: 2 }
                        - { value: 4, descr: upper non-critical, generic: 1 }
                        - { value: 5, descr: lower non-critical, generic: 1 }
                        - { value: 6, descr: lower critical, generic: 2 }
                        - { value: 7, descr: lower non-recoverable, generic: 2 }
                        - { value: 100, descr: not supported, generic: 3 }

                -
                    oid: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentPsuPower
                    value: CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentPsuPower
                    num_oid: '.1.3.6.1.4.1.9.9.719.1.15.56.1.10.{{ $index }}'
                    descr: 'PSU - {{ CISCO-UNIFIED-COMPUTING-EQUIPMENT-MIB::cucsEquipmentPsuDn }}'
                    index: '{{ $index }}'
                    group: PSU
                    state_name: cucsEquipmentPsuPower
                    states:
                        - { value: 0, descr: unknown, generic: 3 }
                        - { value: 1, descr: on, generic: 0 }
                        - { value: 2, descr: test, generic: 3 }
                        - { value: 3, descr: off, generic: 0 }
                        - { value: 4, descr: online, generic: 0 }
                        - { value: 5, descr: offline, generic: 3 }
                        - { value: 6, descr: off duty, generic: 3 }
                        - { value: 7, descr: degraded, generic: 2 }
                        - { value: 8, descr: power save, generic: 0 }
                        - { value: 9, descr: error, generic: 2 }
                        - { value: 10, descr: ok, generic: 0 }
                        - { value: 11, descr: failed, generic: 2 }
                        - { value: 100, descr: not supported, generic: 3 }
