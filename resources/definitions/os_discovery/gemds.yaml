modules:
  os:
    hardware: 'MDS-SYSTEM-MIB::mSysProductConfiguration.0'
    serial: 'MDS-SYSTEM-MIB::mSysSerialNumberPlatform.0'
    version: 'MDS-SYSTEM-MIB::mSysVersion.2'

  sensors:
    state:
      data:   
        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellServiceState
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.11.{{ $index }}'
          state_name: mIfCellServiceState
          group: Cellular Information
          descr: 'Service State'
          index: 'mIfCellServiceState.{{ $index }}'
          states:
            - { descr: gprs, value: 1, generic: 0 }
            - { descr: edge, value: 2, generic: 0 }
            - { descr: umts, value: 3, generic: 0 }
            - { descr: hsdpa, value: 4, generic: 0 }
            - { descr: hsupa, value: 5, generic: 0 }
            - { descr: hspaPlus, value: 6, generic: 0 }
            - { descr: is95a, value: 7, generic: 0 }
            - { descr: is95b, value: 8, generic: 0 }
            - { descr: onexRtt, value: 9, generic: 0 }
            - { descr: evdoRev0, value: 10, generic: 0 }
            - { descr: evdoReva, value: 11, generic: 0 }
            - { descr: evdoRevb, value: 12, generic: 0 }
            - { descr: evdoEhrpd, value: 13, generic: 0 }
            - { descr: lte, value: 14, generic: 0 }
            - { descr: not running, value: 0, generic: 3 }
                
        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellSimState
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.8.{{ $index }}'
          state_name: mIfCellSimState
          group: Cellular Information
          descr: 'Sim State'
          index: 'mIfCellSimState.{{ $index }}'
          states:
              - { descr: not inserted, value: 0, generic: 3 }
              - { descr: locked, value: 1, generic: 1 }
              - { descr: ready, value: 2, generic: 0 }
              - { descr: failed, value: 3, generic: 2 }
              - { descr: unknown, value: 4, generic: 1 }

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellModemType
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.17.{{ $index }}'
          state_name: mIfCellModemType
          group: Cellular Information
          descr: 'Modem Type'
          index: 'mIfCellModemType.{{ $index }}'
          states:
              - { descr: unknown, value: 0, generic: 3 }
              - { descr: E4VLteNaVerizon, value: 1, generic: 3 }
              - { descr: 3G1GsmGlobal, value: 2, generic: 3 }
              - { descr: E4xLteEmea, value: 3, generic: 3 }
              - { descr: 4GxLteNa, value: 4, generic: 3 }
              - { descr: 4GPLteNa, value: 5, generic: 3 }
              - { descr: EZ1LteEmea, value: 6, generic: 3 }
              - { descr: 4GyLteNaEu, value: 7, generic: 3 }
              - { descr: 4GzLteApac, value: 8, generic: 3 }
              - { descr: 4GaLteGlobal, value: 9, generic: 3 }
              - { descr: 4GbLteAmericas, value: 10, generic: 3 }
              - { descr: 4GcLteEu, value: 11, generic: 3 }
              - { descr: 4GdLteGlobal, value: 12, generic: 3 }
              - { descr: evdoEhrpd, value: 13, generic: 0 }

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellModemState
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.9.{{ $index }}'
          state_name: mIfCellModemState
          group: Cellular Information
          descr: 'Modem State'
          index: 'mIfCellModemState.{{ $index }}'
          states:
              - { descr: unknown, value: 0, generic: 3 }
              - { descr: notRegistered, value: 1, generic: 3 }
              - { descr: searching, value: 2, generic: 3 }
              - { descr: registrationDenied, value: 3, generic: 2 }
              - { descr: idle, value: 4, generic: 3 }
              - { descr: connected, value: 5, generic: 0 }
              - { descr: fwRequired, value: 6, generic: 1 }

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellBandwidth
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.23.{{ $index }}'
          state_name: mIfCellBandwidth
          group: Cellular Information
          descr: 'Bandwidth'
          index: 'mIfCellBandwidth.{{ $index }}'
          states:
              - { descr: unknown, value: 0, generic: 3 }
              - { descr: 1.4Mhz, value: 1, generic: 0 }
              - { descr: 3Mhz, value: 2, generic: 0 }
              - { descr: 5Mhz, value: 3, generic: 0 }
              - { descr: 10Mhz, value: 4, generic: 0 }
              - { descr: 15Mhz, value: 5, generic: 0 }
              - { descr: 20Mhz, value: 6, generic: 0 }

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          value: MDS-IF-CELL-MIB::mIfCellRoamingState
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.10.{{ $index }}'
          state_name: mIfCellRoamingState
          group: Cellular Information
          descr: 'Roaming State'
          index: 'mIfCellRoamingState.{{ $index }}'
          states:
              - { descr: unknown, value: 0, generic: 3 }
              - { descr: home, value: 1, generic: 0 }
              - { descr: roaming, value: 2, generic: 1 }

    temperature:
      data:
        - oid: MDS-SYSTEM-MIB::mSysTemperature
          num_oid: '.1.3.6.1.4.1.4130.10.1.1.1.2.6.{{ $index }}'
          index: 'mSysTemperature.{{ $index }}'
          descr: 'System Temperature'
          low_warn_limit: -35
          low_limit: -40
          warn_limit: 65
          high_limit: 70
    voltage:
      data:
        - oid: MDS-SYSTEM-MIB::mSysPowerSupplyVoltage
          num_oid: '.1.3.6.1.4.1.4130.10.1.1.1.2.9.{{ $index }}'
          index: 'mSysPowerSupplyVoltage.{{ $index }}'
          descr: 'Input Voltage'
          low_warn_limit: 12
          low_limit: 10
          warn_limit: 58
          high_limit: 61
    signal:
      data:
        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.12.{{ $index }}'
          index: 'mIfCellRssi.{{ $index }}'
          descr: 'Cellular RSSI'
          value: MDS-IF-CELL-MIB::mIfCellRssi
          low_warn_limit: -60
          low_limit: -70
          high_limit: -5

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.13.{{ $index }}'
          index: 'mIfCellRsrp.{{ $index }}'
          descr: 'Cellular RSRP'
          value: MDS-IF-CELL-MIB::mIfCellRsrp
          low_warn_limit: -106
          low_limit: -120
          high_limit: -20

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.14.{{ $index }}'
          index: 'mIfCellRsrq.{{ $index }}'
          descr: 'Cellular RSRQ'
          value: MDS-IF-CELL-MIB::mIfCellRsrq
          low_warn_limit: -10
          low_limit: -13
          high_limit: -1

        - oid: MDS-IF-CELL-MIB::mIfCellStatusTable
          num_oid: '.1.3.6.1.4.1.4130.10.2.1.1.2.1.1.15.{{ $index }}'
          index: 'mIfCellSnr.{{ $index }}'
          descr: 'Cellular SNR'
          value: MDS-IF-CELL-MIB::mIfCellSnr
          high_limit: 100
