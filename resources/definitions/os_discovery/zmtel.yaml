modules:
    os:
        features:
            - ZMTEL-ODU-MIB::eNBID.0
            - ZMTEL-ODU-MIB::pCID.0
            - ZMTEL-ODU-MIB::dlMCS.0
            - ZMTEL-ODU-MIB::ulMCS.0
            - ZMTEL-ODU-MIB::bootROM.0
            - ZMTEL-ODU-MIB::lteBand.0
        features_template: 'eNodeB: {{ ZMTEL-ODU-MIB::eNBID.0 }} Physical Cell: {{ ZMTEL-ODU-MIB::pCID.0 }} DL Modulation: {{ ZMTEL-ODU-MIB::dlMCS.0 }} UL Modulation: {{ ZMTEL-ODU-MIB::ulMCS.0 }} bootROM: {{ ZMTEL-ODU-MIB::bootROM.0 }} LTE Band: {{ ZMTEL-ODU-MIB::lteBand.0 }}'
        hardware:
            - ZMTEL-ODU-MIB::modelName.0
            - ZMTEL-ODU-MIB::hardwareVersion.0
        hardware_template: '{{ ZMTEL-ODU-MIB::modelName.0 }} {{ ZMTEL-ODU-MIB::hardwareVersion.0 }}'
        serial: ZMTEL-ODU-MIB::SN.0
        version: ZMTEL-ODU-MIB::softwareVersion.0
    sensors:
        count:
            data:
                -
                    oid: ZMTEL-ODU-MIB::pCID
                    value: ZMTEL-ODU-MIB::pCID
                    num_oid: '.1.3.6.1.4.1.38595.10.3.19.{{ $index }}'
                    descr: Physical Cell ID
                    index: 'pCID.{{ $index }}'
        snr:
            data:
                -
                    oid: ZMTEL-ODU-MIB::sinr
                    value: ZMTEL-ODU-MIB::sinr
                    num_oid: '.1.3.6.1.4.1.38595.10.3.15.{{ $index }}'
                    descr: Signal to Interference
                    index: 'sinr.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::cinr0
                    value: ZMTEL-ODU-MIB::cinr0
                    num_oid: '.1.3.6.1.4.1.38595.10.3.16.{{ $index }}'
                    descr: Carrier to Interference 0
                    index: 'cinr0.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::cinr1
                    value: ZMTEL-ODU-MIB::cinr1
                    num_oid: '.1.3.6.1.4.1.38595.10.3.17.{{ $index }}'
                    descr: Carrier to Interference 1
                    index: 'cinr1.{{ $index }}'
        frequency:
            data:
                -
                    oid: ZMTEL-ODU-MIB::dlFrequency
                    value: ZMTEL-ODU-MIB::dlFrequency
                    num_oid: '.1.3.6.1.4.1.38595.10.3.8.{{ $index }}'
                    descr: Download
                    index: 'dlFrequency.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::ulFrequency
                    value: ZMTEL-ODU-MIB::ulFrequency
                    num_oid: '.1.3.6.1.4.1.38595.10.3.9.{{ $index }}'
                    descr: Upload
                    index: 'ulFrequency.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::bandwidth
                    value: ZMTEL-ODU-MIB::bandwidth
                    num_oid: '.1.3.6.1.4.1.38595.10.3.10.{{ $index }}'
                    descr: Bandwidth
                    index: 'bandwidth.{{ $index }}'
        dbm:
            data:
                -
                    oid: ZMTEL-ODU-MIB::rsrp0
                    value: ZMTEL-ODU-MIB::rsrp0
                    num_oid: '.1.3.6.1.4.1.38595.10.3.11.{{ $index }}'
                    descr: RSRP0
                    index: 'rsrp0.{{ $index }}'
                    group: Reference Signal Received Power
                -
                    oid: ZMTEL-ODU-MIB::rsrp1
                    value: ZMTEL-ODU-MIB::rsrp1
                    num_oid: '.1.3.6.1.4.1.38595.10.3.12.{{ $index }}'
                    descr: RSRP1
                    index: 'rsrp1.{{ $index }}'
                    group: Reference Signal Received Power
                -
                    oid: ZMTEL-ODU-MIB::rsrq
                    value: ZMTEL-ODU-MIB::rsrq
                    num_oid: '.1.3.6.1.4.1.38595.10.3.13.{{ $index }}'
                    descr: Reference Signal Received Quality
                    index: 'rsrq.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::rssi
                    value: ZMTEL-ODU-MIB::rssi
                    num_oid: '.1.3.6.1.4.1.38595.10.3.14.{{ $index }}'
                    descr: Received Signal Strength Indicator
                    index: 'rssi.{{ $index }}'
                -
                    oid: ZMTEL-ODU-MIB::txPower
                    value: ZMTEL-ODU-MIB::txPower
                    num_oid: '.1.3.6.1.4.1.38595.10.3.18.{{ $index }}'
                    descr: Tx Power
                    index: 'txPower.{{ $index }}'
        state:
            data:
                -
                    oid: ZMTEL-ODU-MIB::wanMode
                    value: ZMTEL-ODU-MIB::wanMode
                    num_oid: '.1.3.6.1.4.1.38595.10.4.1.{{ $index }}'
                    index: 'wanMode.{{ $index }}'
                    descr: WAN Mode
                    state_name: wanMode
                    states:
                        - { value: 0, descr: NAT, generic: 0 }
                        - { value: 1, descr: Router, generic: 0 }
                        - { value: 2, descr: Router, generic: 0 }
                -
                    oid: ZMTEL-ODU-MIB::wanType
                    value: ZMTEL-ODU-MIB::wanType
                    num_oid: '.1.3.6.1.4.1.38595.10.4.2.{{ $index }}'
                    index: 'wanType.{{ $index }}'
                    descr: WAN type
                    state_name: wanType
                    states:
                        - { value: 0, descr: DHCP, generic: 0 }
                        - { value: 1, descr: Static, generic: 0 }
                -
                    oid: ZMTEL-ODU-MIB::firewall
                    value: ZMTEL-ODU-MIB::firewall
                    num_oid: '.1.3.6.1.4.1.38595.10.2.9.{{ $index }}'
                    index: 'firewall.{{ $index }}'
                    descr: Firewall Status
                    state_name: firewall
                    states:
                        - { value: 0, descr: disabled, generic: 2 }
                        - { value: 1, descr: enabled, generic: 0 }
                -
                    oid: ZMTEL-ODU-MIB::dlMCS
                    value: ZMTEL-ODU-MIB::dlMCS
                    num_oid: '.1.3.6.1.4.1.38595.10.3.6.{{ $index }}'
                    index: 'dlMCS.{{ $index }}'
