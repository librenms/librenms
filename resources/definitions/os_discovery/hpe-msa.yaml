modules:
    os:
        hardware: CPQSINFO-MIB::cpqSiProductName.0
        serial: CPQSINFO-MIB::cpqSiSysSerialNum.0
    sensors:
        state:
            data:
                -
                    oid: FCMGMT-MIB::connUnitSensorTable
                    value: FCMGMT-MIB::connUnitSensorStatus
                    num_oid: '.1.3.6.1.3.94.1.8.1.4.{{ $index }}'
                    descr: FCMGMT-MIB::connUnitSensorName
                    index: 'connUnitSensorStatus.{{ $index }}'
                    state_name: connUnitSensorStatus
                    states:
                        - { value: 1, generic: 3, descr: unknown }
                        - { value: 2, generic: 1, descr: other }
                        - { value: 3, generic: 0, descr: ok }
                        - { value: 4, generic: 1, descr: warning }
                        - { value: 5, generic: 2, descr: failed }
                -
                    oid: FCMGMT-MIB::connUnitTable
                    value: FCMGMT-MIB::connUnitState
                    num_oid: '.1.3.6.1.3.94.1.6.1.5.{{ $index }}'
                    descr: FCMGMT-MIB::connUnitName
                    index: 'connUnitState.{{ $index }}'
                    state_name: connUnitState
                    states:
                        - { value: 1, generic: 3, descr: unknown }
                        - { value: 2, generic: 0, descr: online }
                        - { value: 3, generic: 2, descr: offline }
                -
                    oid: FCMGMT-MIB::connUnitTable
                    value: FCMGMT-MIB::connUnitStatus
                    num_oid: '.1.3.6.1.3.94.1.6.1.6.{{ $index }}'
                    descr: FCMGMT-MIB::connUnitName
                    index: 'connUnitStatus.{{ $index }}'
                    state_name: connUnitStatus
                    states:
                        - { value: 1, generic: 3, descr: unknown }
                        - { value: 2, generic: 3, descr: unused }
                        - { value: 3, generic: 0, descr: ok }
                        - { value: 4, generic: 1, descr: warning }
                        - { value: 5, generic: 2, descr: failed }
