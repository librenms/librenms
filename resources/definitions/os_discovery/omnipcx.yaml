modules:
    sensors:
        state:
            data:
                -
                    oid: A4400-CPU-MIB::pbxState
                    value: A4400-CPU-MIB::pbxState
                    num_oid: '.1.3.6.1.4.1.637.64.4400.1.2{{ $noindex }}'
                    descr: 'Pbx State'
                    state_name: pbxState
                    index: 'pbxState'
                    states:
                -
                    oid: A4400-RTM-MIB::pbxRole
                    value: A4400-RTM-MIB::pbxRole
                    num_oid: '.1.3.6.1.4.1.637.64.4400.1.4.{{ $index }}'
                    descr: 'Pbx Role'
                    index: 'pbxRole{{ $index }}'
                    state_name: pbxRole
                    states:
        count:
            data:
                -
                    oid: A4400-RTM-MIB::setsInService
                    value: A4400-RTM-MIB::setsInService
                    num_oid: '.1.3.6.1.4.1.637.64.4400.1.7.{{ $index }}'
                    descr: 'Pbx Sets in service'
                    index: 'setsInService{{ $index }}'
                    low_limit: 0
                    high_limit: 100000
                    group: 'Sets'
                -
                    oid: A4400-RTM-MIB::setsOutOfService
                    value: A4400-RTM-MIB::setsOutOfService
                    num_oid: '.1.3.6.1.4.1.637.64.4400.1.8.{{ $index }}'
                    descr: 'Pbx Sets out of service'
                    index: 'setsOutOfService{{ $index }}'
                    low_limit: 0
                    high_limit: 100000
                    group: 'Sets'

