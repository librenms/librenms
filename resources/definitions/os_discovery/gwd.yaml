modules:
    os:
        # Chassis-level info (deviceTable .1.1.1.1.1.X.1)
        # .4 = deviceDescription "EasyPath Ethernet-PON" (generic for all GFA models;
        # operators can override with the exact model name in the UI device settings)
        # .16 = boardHardwareVersion fallback for chassis without populated .9
        hardware:
            - .1.3.6.1.4.1.10072.2.20.1.1.1.1.1.4.1
            - .1.3.6.1.4.1.10072.2.20.1.1.2.1.1.16.1.1
        version: .1.3.6.1.4.1.10072.2.20.1.1.2.1.1.13.1.1
        serial:  .1.3.6.1.4.1.10072.2.20.1.1.2.1.1.18.1.1

    mempools:
        data:
            -
                total: .1.3.6.1.4.1.10072.2.20.1.1.2.1.1.28.1.1
                used: .1.3.6.1.4.1.10072.2.20.1.1.2.1.1.20.1.1
                descr: 'Memory'
                index: 0
                precision: 1048576

    processors:
        data:
            -
                oid: GW-EPON-MIB::boardCpuUsage
                num_oid: '.1.3.6.1.4.1.10072.2.20.1.1.2.1.1.19.{{ $index }}'
                descr: 'CPU'
                index: '1.1'

    sensors:
        temperature:
            data:
                -
                    oid: GW-EPON-DEV-MIB::devTemperature
                    num_oid: '.1.3.6.1.4.1.10072.2.15.1.6.1.1.2.{{ $index }}'
                    descr: 'Temperature board {{ $index }}'
                -
                    oid: GW-EPON-DEV-MIB::powerTemperature
                    num_oid: '.1.3.6.1.4.1.10072.2.15.1.5.1.1.3.{{ $index }}'
                    descr: 'Temperature power supply {{ $index }}'
        state:
            data:
                # powerRunStatus: INTEGER { empty(1), powerOff(2), powerOn(3) } per GW-EPON-DEV-MIB
                -
                    oid: GW-EPON-DEV-MIB::powerRunStatus
                    state_name: powerRunStatus
                    group: 'Power Supply'
                    num_oid: '.1.3.6.1.4.1.10072.2.15.1.5.1.1.2.{{ $index }}'
                    descr: 'Power Run Status {{ $index }}'
                    states:
                        - { descr: 'Empty',     value: 1, generic: 1 }
                        - { descr: 'Power Off', value: 2, generic: 2 }
                        - { descr: 'Power On',  value: 3, generic: 0 }
                # devFanAlarmStatus: TruthValue { ALARM(1), CLEAR(5) } per GW-EPON-DEV-MIB
                -
                    oid: GW-EPON-DEV-MIB::devFanAlarmStatus
                    state_name: devFanAlarmStatus
                    group: 'Fans'
                    num_oid: '.1.3.6.1.4.1.10072.2.15.1.4.1.1.3.{{ $index }}'
                    descr: 'Fan status {{ $index }}'
                    states:
                        - { descr: 'Alarm',  value: 1, generic: 2 }
                        - { descr: 'Normal', value: 5, generic: 0 }
