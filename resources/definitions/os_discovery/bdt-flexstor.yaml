modules:
    os:
        hardware:
            - BDTMIB::bDTDescription.0
        version:
            - BDTMIB::bDTAgentVersion.0
            - '.1.3.6.1.4.1.20884.10893.2.101.4.4.0'
            - '.1.3.6.1.4.1.20884.10893.2.101.4.5.0'
        version_template: '{{ BDTMIB::bDTAgentVersion.0 }} {{ .1.3.6.1.4.1.20884.10893.2.101.4.4.0 }} / {{ .1.3.6.1.4.1.20884.10893.2.101.4.5.0 }}'
        serial:
            - '.1.3.6.1.4.1.20884.10893.2.101.4.1.0'
    sensors:
        state:
            data:
                -
                    oid: BDTMIB::bDTGlobalStatus
                    value: BDTMIB::bDTGlobalStatus
                    num_oid: '.1.3.6.1.4.1.20884.10893.2.101.2.1.{{ $index }}'
                    descr: 'Global Status'
                    index: 'bDTGlobalStatus.{{ $index }}'
                    state_name: bDTGlobalStatus
                    states:
                        - { value: 1, descr: other, generic: 3 }
                        - { value: 2, descr: unknown, generic: 3 }
                        - { value: 3, descr: ok, generic: 0 }
                        - { value: 4, descr: non-critical, generic: 1 }
                        - { value: 5, descr: critical, generic: 2 }
                        - { value: 6, descr: non-recoverable, generic: 2 }
