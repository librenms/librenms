modules:
  os:
    sysDescr_regex: '/^Cambium cnWave (?<hardware>.*) (?:Client|Distribution) Node, Version (?<version>.*)$/'
  sensors:
    additional_oids:
      data:
        -
          oid:
            - IF-MIB::ifName
    dbm:
      data:
        -
          oid: TERRAGRAPH-RADIO-MIB::tgRadioInterfacesTable
          value: TERRAGRAPH-RADIO-MIB::rssi
          num_oid: '.1.3.6.1.4.1.17713.60.1.1.1.7.{{ $index }}'
          descr: '{{ IF-MIB::ifName }} RSSI'
          group: '{{ IF-MIB::ifName }} [{{ TERRAGRAPH-RADIO-MIB::remoteMacAddr }}]'
          index: 'rssi.{{ $index }}'
        -
          oid: TERRAGRAPH-RADIO-MIB::tgRadioInterfacesTable
          value: TERRAGRAPH-RADIO-MIB::snr
          num_oid: '.1.3.6.1.4.1.17713.60.1.1.1.6.{{ $index }}'
          descr: '{{ IF-MIB::ifName }} SNR'
          group: '{{ IF-MIB::ifName }} [{{ TERRAGRAPH-RADIO-MIB::remoteMacAddr }}]'
          index: 'snr.{{ $index }}'
    state:
      data:
        - 
          oid: TERRAGRAPH-RADIO-MIB::tgRadioInterfacesTable
          value: TERRAGRAPH-RADIO-MIB::mcs
          num_oid: '.1.3.6.1.4.1.17713.60.1.1.1.5.{{ $index }}'
          state_name: 'tgRadioInterfacesTable'
          descr: '{{ IF-MIB::ifName }} MCS'
          group: '{{ IF-MIB::ifName }} [{{ TERRAGRAPH-RADIO-MIB::remoteMacAddr }}]'
          index: 'mcs.{{ $index }}'
          states:
