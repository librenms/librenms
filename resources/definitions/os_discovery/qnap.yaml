modules:
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - NAS-MIB::diskEnclosureID
                        - NAS-MIB::volumeName
        temperature:
            options:
                skip_values: -1
            data:
                -
                    oid: NAS-MIB::enclosureTable
                    value: NAS-MIB::enclosureSystemTemp
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.7.{{ $index }}'
                    descr: 'Enclosure {{ NAS-MIB::enclosureID }}'
                    index: 'enclosureSystemTemp.{{ $index }}'
                    group: 'System'
                -
                    oid: NAS-MIB::cpuTemp
                    value: NAS-MIB::cpuTemp
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.4.2.{{ $index }}'
                    descr: 'CPU'
                    index: 'cpuTemp.{{ $index }}'
                    group: 'System'
                -
                    oid: NAS-MIB::systemPowerTable
                    value: NAS-MIB::systemPowerTemp
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.3.2.1.6.{{ $index }}'
                    descr: 'Enclosure {{ NAS-MIB::systemPowerEnclosureID }} PSU {{ NAS-MIB::systemPowerID}}'
                    index: 'systemPowerTemp.{{ $index }}'
                    group: 'System'
                -
                    oid: NAS-MIB::diskTable
                    value: NAS-MIB::diskTemperture
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.6.{{ $index }}'
                    descr: 'Disk {{ $index }} {{ NAS-MIB::diskModel }}'
                    index: 'diskTemperture.{{ $index }}'
                    group: 'Disks enclosure {{ NAS-MIB::diskEnclosureID }}'
        fanspeed:
            options:
                skip_values: -1
            data:
                -
                    oid: NAS-MIB::systemFan2Table
                    value: NAS-MIB::systemFanSpeed
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.5.{{ $index }}'
                    descr: 'FAN {{ $index }}'
                    index: 'systemFanSpeed.{{ $index }}'
                    group: 'System enclosure {{ NAS-MIB::systemFanEnclosureID }}'
                -
                    oid: NAS-MIB::systemPowerTable
                    value: NAS-MIB::systemPowerFanSpeed
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.3.2.1.5.{{ $index }}'
                    descr: 'PSU {{ NAS-MIB::systemPowerID }}'
                    index: 'systemPowerFanSpeed.{{ $index }}'
                    group: 'Power enclosure {{ NAS-MIB::systemPowerEnclosureID }}'
        state:
            data:
                -
                    oid: NAS-MIB::systemHdTable
                    value: NAS-MIB::hdStatus
                    num_oid: '.1.3.6.1.4.1.24681.1.2.11.1.4.{{ $index }}'
                    descr: 'Disk {{ $index }}'
                    index: 'hdStatus.{{ $index }}'
                    group: 'Disk Status'
                    state_name: hdStatus
                    states:
                -
                    oid: NAS-MIB::diskTable
                    value: NAS-MIB::diskSmartInfo
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.5.{{ $index }}'
                    descr: 'Disk {{ $index }}'
                    index: 'diskSmartInfo.{{ $index }}'
                    group: 'Disk S.M.A.R.T. enclosure {{ NAS-MIB::diskEnclosureID }}'
                    state_name: diskSmartInfo
                    states:
                -
                    oid: NAS-MIB::systemFan2Table
                    value: NAS-MIB::systemFanStatus
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.5.{{ $index }}'
                    descr: 'FAN {{ $index }}'
                    index: 'systemFanStatus.{{ $index }}'
                    group: 'FANs enclosure {{ NAS-MIB::systemFanEnclosureID }}'
                    state_name: systemFanStatus
                    states:
                -
                    oid: NAS-MIB::systemPowerTable
                    value: NAS-MIB::systemPowerStatus
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.1.5.2.1.5.{{ $index }}'
                    descr: 'PSU {{ $index }}'
                    index: 'systemPowerStatus.{{ $index }}'
                    group: 'PSUs enclosure {{ NAS-MIB::systemPowerEnclosureID }}'
                    state_name: systemPowerStatus
                    states:
                -
                    oid: NAS-MIB::raidGroupTable
                    value: NAS-MIB::raidStatus
                    num_oid: '.1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.5.{{ $index }}'
                    descr: '{{ NAS-MIB::volumeName }} Raid {{ NAS-MIB::raidLevel }}'
                    index: 'raidStatus.{{ $index }}'
                    group: 'Volumes'
                    state_name: raidStatus
                    states:
