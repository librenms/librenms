modules:
    os:
        hardware: LCOS-MIB::lcsFirmwareVersionTableEntryModule.eIfc
        serial: LCOS-MIB::lcsFirmwareVersionTableEntrySerialNumber.eIfc
        version: LCOS-MIB::lcsFirmwareVersionTableEntryVersion.eIfc
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryInterpointPeerName
        temperature:
            data:
                -
                    oid: LCOS-MIB::lcsStatusHardwareInfoTemperatureDegrees
                    num_oid: '.1.3.6.1.4.1.2356.11.1.47.20.{{ $index }}'
                    descr: Temperature
                    low_limit: -33
                    high_limit: 70
        state:
            data:
                -
                    oid: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListTable
                    value: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryKeyingState
                    num_oid: '.1.3.6.1.4.1.2356.11.1.3.36.1.1.12.{{ $index }}'
                    descr: 'Keying {{ LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryInterpointPeerName }}'
                    state_name: KeyingState
                    states:
                -
                    oid: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListTable
                    value: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryWpaVersion
                    num_oid: '.1.3.6.1.4.1.2356.11.1.3.36.1.1.21.{{ $index }}'
                    descr: 'WPA Version {{ LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryInterpointPeerName }}'
                    state_name: WpaVersion
                    states:
                -
                    oid: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListTable
                    value: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryLinkActive
                    num_oid: '.1.3.6.1.4.1.2356.11.1.3.36.1.1.40.{{ $index }}'
                    descr: 'Link Active {{ LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryInterpointPeerName }}'
                    state_name: LinkActive
                    states:
                -
                    oid: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListTable
                    value: LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryRemoteStatus
                    num_oid: '.1.3.6.1.4.1.2356.11.1.3.36.1.1.43.{{ $index }}'
                    descr: 'Remote Status {{ LCOS-MIB::lcsStatusWlanInterpointsAccesspointListEntryInterpointPeerName }}'
                    state_name: RemoteStatus
                    states:
