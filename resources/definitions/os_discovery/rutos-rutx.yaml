modules:
    os:
        hardware: TELTONIKA-RUTX-MIB::routerName.0
        serial: TELTONIKA-RUTX-MIB::serial.0
        version: TELTONIKA-RUTX-MIB::fwVersion.0
        lat: TELTONIKA-RUTX-MIB::latitude.0
        long: TELTONIKA-RUTX-MIB::longtitude.0
    sensors:
        additional_oids:
            data:
                -
                    oid:
                        - TELTONIKA-RUTX-MIB::mOperator
                        - TELTONIKA-RUTX-MIB::ioSystemName
        temperature:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::mTemperature
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.17.{{ $index }}"
                    descr: Modem Module Temp
                    group: Modem
                    index: "mTemperature.{{ $index }}"
                    divisor: 10
                    low_limit: -40
                    high_limit: 75
        state:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::ioInput
                    num_oid: ".1.3.6.1.4.1.48690.6.2.1.7.{{ $index }}"
                    descr:  I/O {{ $index }} Type
                    group: Inputs/Outputs
                    state_name: TELTONIKA-RUTX-MIB::ioInput
                    states:
                        - { descr: Digital Output, value: 0, generic: 0 }
                        - { descr: Digital Input, value: 1, generic: 0 }
                -
                    oid: TELTONIKA-RUTX-MIB::ioState
                    num_oid: ".1.3.6.1.4.1.48690.6.2.1.6.{{ $index }}"
                    descr:  I/O {{ $index }} State ({{ TELTONIKA-RUTX-MIB::ioSystemName }})
                    group: Inputs/Outputs
                    state_name: TELTONIKA-RUTX-MIB::ioState
                    states:
                        - { descr: Low, value: 0, generic: 0 }
                        - { descr: High, value: 1, generic: 2 }
                -
                    oid: TELTONIKA-RUTX-MIB::mSimState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.9.{{ $index }}"
                    descr: SIM State
                    group: Mobile
                    state_name: TELTONIKA-RUTX-MIB::SimState
                    states:
                        - { descr: inserted, value: 0, generic: 0 }
                        - { descr: not inserted, value: 1, generic: 2 }
                        - { descr: unknown, value: 2, generic: 3 }
                -
                    oid: TELTONIKA-RUTX-MIB::mPinState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.10.{{ $index }}"
                    descr: SIM PIN State
                    group: Mobile
                    state_name: TELTONIKA-RUTX-MIB::PinState
                    states:
                        - { descr: PIN REQUIRED, value: 0, generic: 2 }
                        - { descr: NOT READY, value: 1, generic: 1 }
                        - { descr: READY, value: 2, generic: 0 }
                        - { descr: unknown, value: 3, generic: 3 }
                        - { descr: SIM not inserted, value: 4, generic: 2 }
                        - { descr: OK, value: 5, generic: 0 }
                        - { descr: Required PIN, value: 6, generic: 1 }
                        - { descr: Required PUK, value: 7, generic: 1 }
                        - { descr: Required network personalization password, value: 8, generic: 1 }
                        - { descr: Required network personalization unlocking password, value: 9, generic: 1 }
                        - { descr: Required network subset personalization password, value: 10, generic: 1 }
                        - { descr: Required network subset personalization unlocking password, value: 11, generic: 1 }
                        - { descr: SIM failure, value: 12, generic: 2 }
                        - { descr: SIM busy, value: 13, generic: 1 }
                        - { descr: PUK, value: 14, generic: 1 }
                -
                    oid: TELTONIKA-RUTX-MIB::mNetState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.11.{{ $index }}"
                    descr: Mobile Net State
                    group: Mobile
                    state_name: TELTONIKA-RUTX-MIB::NetState
                    states:
                        - { descr: searching, value: 0, generic: 1 }
                        - { descr: registered (home), value: 1, generic: 0 }
                        - { descr: registered (roaming), value: 2, generic: 1 }
                        - { descr: unknown, value: 3, generic: 3 }
                        - { descr: unregistered, value: 4, generic: 2 }
                        - { descr: 'Registered, home', value: 5, generic: 0 }
                        - { descr: Denied, value: 6, generic: 2 }
                        - { descr: 'Registered, roaming', value: 7, generic: 2 }
                        - { descr: Not supported, value: 8, generic: 2 }
                        - { descr: 'Registered, emergency services only', value: 9, generic: 2 }
                -
                    oid:  TELTONIKA-RUTX-MIB::mConnectionState
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.15.{{ $index }}"
                    descr: "Connection State ({{ TELTONIKA-RUTX-MIB::mOperator }})"
                    group: Mobile
                    index: "mConnectionState.{{ $index }}"
                    state_name: TELTONIKA-RUTX-MIB::ConnectionState
                    states:
                        - { descr: Connected, value: 0, generic: 0 }
                        - { descr: Not connected, value: 1, generic: 2 }
                        - { descr: Disconnected, value: 2, generic: 2 }
                -
                    oid: TELTONIKA-RUTX-MIB::mConnectionType
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.16.{{ $index }}"
                    descr: "Connection Type"
                    group: Mobile
                    index: "mConnectionType.{{ $index }}"
                    state_name: TELTONIKA-RUTX-MIB::ConnectionType
                    states:
                        - { descr: LTE, value: 0, generic: 0 }
                        - { descr: 4G, value: 1, generic: 0 }
                        - { descr: 3G, value: 2, generic: 1 }
                        - { descr: 2G, value: 3, generic: 1 }
                        - { descr: WCDMA, value: 4, generic: 0 }
                        - { descr: unknown, value: 5, generic: 3 }
                        - { descr: Auto, value: 6, generic: 0 }
                        - { descr: No service, value: 7, generic: 1 }
                        - { descr: GSM, value: 8, generic: 0 }
                        - { descr: GPRS, value: 9, generic: 0 }
                        - { descr: EDGE, value: 10, generic: 0 }
                        - { descr: TDSCDMA, value: 11, generic: 0 }
                        - { descr: CDMA, value: 12, generic: 0 }
                        - { descr: EVDO, value: 13, generic: 0 }
                        - { descr: CDMA-EVDO, value: 14, generic: 0 }
                        - { descr: HSDPA, value: 15, generic: 0 }
                        - { descr: HSUPA, value: 16, generic: 0 }
                        - { descr: HSPA+, value: 17, generic: 0 }
                        - { descr: EHRPD, value: 18, generic: 0 }
                        - { descr: HDR, value: 19, generic: 0 }
                        - { descr: UMTS, value: 20, generic: 0 }
                        - { descr: HSDPA+HSUPA, value: 21, generic: 0 }
                        - { descr: 5G, value: 22, generic: 0 }
                        - { descr: NR5G, value: 23, generic: 0 }
                        - { descr: 5G-NSA, value: 24, generic: 0 }
                        - { descr: 5G-SA, value: 25, generic: 0 }
                        - { descr: CAT-M1, value: 26, generic: 0 }
                        - { descr: CAT-NB, value: 27, generic: 0 }
                        - { descr: 2G_3G, value: 28, generic: 0 }
                        - { descr: GSM_WCDMA, value: 29, generic: 0 }
                        - { descr: 2G_4G, value: 30, generic: 0 }
                        - { descr: GSM_LTE, value: 31, generic: 0 }
                        - { descr: 3G_4G, value: 32, generic: 0 }
                        - { descr: WCDMA_LTE, value: 33, generic: 0 }
                        - { descr: 3G_5G, value: 34, generic: 0 }
                        - { descr: WCDMA_NR5G, value: 35, generic: 0 }
                        - { descr: 4G_5G, value: 36, generic: 0 }
                        - { descr: LTE_NR5G, value: 37, generic: 0 }
        count:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::mReceivedToday
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.26.{{ $index }}"
                    descr: "Mobile bytes received today"
                    group: Mobile
                    index: "mReceivedToday.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mSentToday
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.25.{{ $index }}"
                    descr: "Mobile bytes sent today"
                    group: Mobile
                    index: "mSentToday.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mReceived
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.23.{{ $index }}"
                    descr: "Mobile total bytes received"
                    group: Mobile
                    index: "mReceived.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mSent
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.22.{{ $index }}"
                    descr: "Mobile total bytes sent"
                    group: Mobile
                    index: "mSent.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::numSatellites
                    num_oid: ".1.3.6.1.4.1.48690.3.5.{{ $index }}"
                    descr: "Number of GPS Satellites"
                    group: GPS
                    index: "numSatellites.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::latitude
                    num_oid: ".1.3.6.1.4.1.48690.3.1.{{ $index }}"
                    descr: "GPS Latitude"
                    group: GPS
                    index: "latitude.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::longtitude
                    num_oid: ".1.3.6.1.4.1.48690.3.2.{{ $index }}"
                    descr: "GPS Longitude"
                    group: GPS
                    index: "longtitude.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mCellID
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.18.{{ $index }}"
                    descr: "Cell ID"
                    group: Mobile
                    index: "mCellID.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mImei
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.3.{{ $index }}"
                    descr: "IMEI"
                    group: Mobile
                    index: "mImei.{{ $index }}"
                -
                    oid: TELTONIKA-RUTX-MIB::mIMSI
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.8.{{ $index }}"
                    descr: "IMSI"
                    group: Mobile
                    index: "mIMSI.{{ $index }}"
        signal:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::mSignal
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.12.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSSI"
                    group: Mobile
                    index: "mSignal.{{ $index }}"
                    low_warn_limit: -75
                    low_limit: -85
                    high_limit: 0
                -
                    oid: TELTONIKA-RUTX-MIB::mRSRP
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.20.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSRP"
                    group: Mobile
                    index: "mRSRP.{{ $index }}"
                    low_warn_limit: -90
                    low_limit: -100
                    high_limit: 0
                -
                    oid: TELTONIKA-RUTX-MIB::mRSRQ
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.21.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - RSRQ"
                    group: Mobile
                    index: "mRSRQ.{{ $index }}"
                    low_warn_limit: -15
                    low_limit: -20
                    high_limit: 0
        snr:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::mSINR
                    num_oid: ".1.3.6.1.4.1.48690.2.2.1.19.{{ $index }}"
                    entPhysicalIndex: "{{ $index }}"
                    descr: "Signal Level - SINR"
                    group: Mobile
                    index: "mSINR.{{ $index }}"
                    low_warn_limit: 13
                    low_limit: 6
                    high_limit: 30
        runtime:
            data:
                -
                    oid: TELTONIKA-RUTX-MIB::connectionUptime
                    num_oid: ".1.3.6.1.4.1.48690.2.3.{{ $index }}"
                    descr: "Connection Uptime "
                    group: Mobile
                    index: "ConnectionUptime.{{ $index }}"
                    divisor: 60
