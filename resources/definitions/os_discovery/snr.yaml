modules:
    os:
        hardware:
            - NAG-MIB::sysHardwareVersion.0
            - NAG-MIB::sysHardwareVersion.1
        version:
            - NAG-MIB::sysSoftwareVersion.0
            - NAG-MIB::sysSoftwareVersion.1
    processors:
        data:
            -
                oid: NAG-MIB::switchCpuUsage
                num_oid: '.1.3.6.1.4.1.40418.7.100.1.11.10.{{ $index }}'
                descr: 'CPU'
    additional_oids:
        data:
            -
                oid:
                    - NAG-MIB::portName
    sensors:
        temperature:
            data:
                -
                    oid: NAG-MIB::switchTemperature
                    num_oid: '.1.3.6.1.4.1.40418.7.100.1.11.8.{{ $index }}'
                    descr: 'Temperature'
                    skip_values:
                        - 268435356
        state:
            data:
                -
                    oid: NAG-MIB::sysFanStatus
                    num_oid: '.1.3.6.1.4.1.40418.7.100.1.12.1.1.3.{{ $index }}'
                    descr: 'Fan {{ $index }} status'
                    state_name: sysFanStatus
                    states:
                        - { descr: Normal, value: 0, generic: 0 }
                        - { descr: Abnormal, value: 1, generic: 2 }
                -
                    oid: NAG-MIB::sysFanSpeed
                    num_oid: '.1.3.6.1.4.1.40418.7.100.1.12.1.4.{{ $index }}'
                    descr: 'Fan {{ $index }} speed'
                    state_name: sysFanSpeed
                    states:
                        - { value: 0, generic: 3, descr: none }
                        - { value: 1, generic: 0, descr: low }
                        - { value: 2, generic: 0, descr: medium-low }
                        - { value: 3, generic: 1, descr: medium }
                        - { value: 4, generic: 2, descr: medium-high }
                        - { value: 5, generic: 2, descr: high }
                -
                    oid: NAG-MIB::showSwitchStartUpStatus
                    num_oid: '.1.3.6.1.4.1.40418.7.100.1.16.{{ $index }}'
                    descr: 'Switch {{ $index }} Startup status'
                    state_name: showSwitchStartUpStatus
                    states:
                        - { descr: idle, value: 1, generic: 3 }
                        - { descr: success, value: 2, generic: 0 }
                        - { descr: fail, value: 3, generic: 2 }
                        - { descr: inProgress, value: 4, generic: 3 }
        voltage:
            data:
                -
                    oid: NAG-MIB::ddmTranscDiagnosisTable
                    value: NAG-MIB::ddmDiagnosisVoltage
                    num_oid: '.1.3.6.1.4.1.40418.7.100.30.1.1.7.{{ $index }}'
                    descr: "{{ NAG-MIB::portName }}"
                    index: "ddmDiagnosisVoltage.{{ $index }}"
        current:
            data:
                -
                    oid: NAG-MIB::ddmTranscDiagnosisTable
                    value: NAG-MIB::ddmDiagnosisBias
                    num_oid: '.1.3.6.1.4.1.40418.7.100.30.1.1.12.{{ $index }}'
                    descr: "{{ NAG-MIB::portName }}"
                    index: "ddmDiagnosisBias.{{ $index }}"
        dbm:
            data:
                -
                    oid: NAG-MIB::ddmTranscDiagnosisTable
                    value: NAG-MIB::ddmDiagnosisRXPower
                    num_oid: '.1.3.6.1.4.1.40418.7.100.30.1.1.17.{{ $index }}'
                    descr: "{{ NAG-MIB::portName }}"
                    index: "ddmDiagnosisRXPower.{{ $index }}"
                    group: "Optical RX"
                -
                    oid: NAG-MIB::ddmTranscDiagnosisTable
                    value: NAG-MIB::ddmDiagnosisTXPower
                    num_oid: '.1.3.6.1.4.1.40418.7.100.30.1.1.22.{{ $index }}'
                    descr: "{{ NAG-MIB::portName }}"
                    index: "ddmDiagnosisTXPower.{{ $index }}"
                    group: "Optical TX"
