modules:
    os:
        serial: MBG-SNMP-LTNG-MIB::mbgLtNgSerialNumber.0
        version: MBG-SNMP-LTNG-MIB::mbgLtNgFirmwareVersion.0
    sensors:
        count:
            data:
                -
                    oid: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockStatusA
                    value: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockStatusA
                    num_oid: '.1.3.6.1.4.1.5597.30.0.1.2.1.6.{{ $index }}'
                    descr: 'Antenna A{{ $index }} Satellites'
                    low_warn_limit: 0
                    low_limit: 0
                    index: 'mbgLtNgRefclockStatusA.{{ $index }}'
                -
                    oid: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockStatusB
                    value: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockStatusB
                    num_oid: '.1.3.6.1.4.1.5597.30.0.1.2.1.8.{{ $index }}'
                    descr: 'Antenna B{{ $index }} Satellites'
                    low_warn_limit: 0
                    low_limit: 0
                    index: 'mbgLtNgRefclockStatusB.{{ $index }}'
        state:
            data:
                -
                    oid: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockType
                    value: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockType
                    num_oid: '.1.3.6.1.4.1.5597.30.0.1.2.1.2.{{ $index }}'
                    descr: 'Reference Clock Type'
                    index: 'mbgLtNgRefclockType.{{ $index }}'
                    state_name: mbgLtNgRefclockType
                    states:
                -
                    oid: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockUsage
                    value: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockUsage
                    num_oid: '.1.3.6.1.4.1.5597.30.0.1.2.1.3.{{ $index }}'
                    descr: 'Reference Clock Usage'
                    index: 'mbgLtNgRefclockUsage.{{ $index }}'
                    state_name: mbgLtNgRefclockUsage
                    states:
                -
                    oid: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockState
                    value: MBG-SNMP-LTNG-MIB::mbgLtNgRefclockState
                    num_oid: '.1.3.6.1.4.1.5597.30.0.1.2.1.5.{{ $index }}'
                    descr: 'Reference Clock State'
                    index: 'mbgLtNgRefclockState.{{ $index }}'
                    state_name: mbgLtNgRefclockState
                    states:
