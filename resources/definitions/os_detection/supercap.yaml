os: supercap
text: 'SuperCap Energy'
type: power
icon: supercap
mib_dir: supercap
over:
    - { graph: device_current, text: Current }
    - { graph: device_voltage, text: Voltage }
    - { graph: device_temperature, text: Temperature }
discovery:
    -
        sysObjectID_regex:
            - '/^$/'
        snmpget:
            oid: SUPERCAPBATTERY-MIB::BMS01-AmbientTemperature
            op: 'regex'
            value: '/^\d+$/'
