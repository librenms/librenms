os: panduit
text: 'Panduit PDU'
type: power
mib_dir: panduit
icon: panduit
over:
    - { graph: device_current, text: Current }
    - { graph: device_voltage, text: Voltage }
    - { graph: device_power, text: Power }
discovery:
    -
        sysDescr:
            - 'SN:PDU Metered PN:Device Model:P24D40M Rating:100-240V, 16A, 3.7kVA, 50/60Hz'
        sysDescr_except:
            - 'SN:PDU Metered, Outlet Switched PN:Device Model:P24E03G Rating:346-415V, 32A, 22.0kVA, 50/60Hz'
    -
        sysObjectID: 
            - .1.3.6.1.4.1.19536
        snmpget:
            oid: PANDUIT-MIB::pdug5PartNumber.1
            op: 'contains'
            value: 'P24D40M'
