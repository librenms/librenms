os: avtech
text: 'Avtech Environment Sensor'
type: environment
icon: avtech
over:
    - { graph: device_temperature, text: Temperature }
# The RoomAlert MAX uses string-based SNMP table indexes (MAC addresses encoded
# as OID components) resulting in a very large number of OIDs. snmpbulkwalk
# truncates the response before reaching the channel table, so we disable bulk
# walk for all avtech devices.
snmp_bulk: false
discovery:
    -
        sysObjectID:
            - .1.3.6.1.4.1.20916.1.11  # RoomAlert 32S
            - .1.3.6.1.4.1.20916.1.12  # RoomAlert 12S
            - .1.3.6.1.4.1.20916.1.14  # RoomAlert MAX
            - .1.3.6.1.4.1.20916       # RoomAlert fallback (devices reporting enterprise root only)
