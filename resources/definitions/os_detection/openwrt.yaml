os: openwrt
text: OpenWrt
type: network
icon: openwrt
over:
    - { graph: device_bits, text: 'Device Traffic' }
    - { graph: device_processor, text: 'CPU Usage' }
    - { graph: device_mempool, text: 'Memory Usage' }
discovery:
    -
        sysObjectID: .1.3.6.1.4.1.8072.3.2.10
        snmpget:
            oid: 'NET-SNMP-EXTEND-MIB::nsExtendOutput1Line."distro"'
            # 'contains' not 'starts': older GL.iNet firmware (e.g. Flint 3) prefixed the distro
            # string with non-printable/semigraphic chars before "OpenWrt", breaking an anchored
            # match. Fixed in recent GL.iNet releases; kept as 'contains' for robustness.
            op: contains
            value: OpenWrt
