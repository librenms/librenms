os: openwrt
text: OpenWrt
type: network
icon: openwrt
over:
    - { graph: device_bits, text: 'Device Traffic' }
    - { graph: device_processor, text: 'CPU Usage' }
    - { graph: device_mempool, text: 'Memory Usage' }
discovery:
    -
        sysObjectID: .1.3.6.1.4.1.8072.3.2.10
        snmpget:
            oid: 'NET-SNMP-EXTEND-MIB::nsExtendOutput1Line."distro"'
            # 'contains' not 'starts': GL.iNet firmware's distro extend wraps the value in
            # decorative characters - a BE9300 returns \\---OpenWrt---// - so it does not
            # begin with "OpenWrt" and an anchored match misses it. 'contains' handles both
            # the decorated form and a plain "OpenWrt ..." string. See openwrt_glinet fixture.
            op: contains
            value: OpenWrt
