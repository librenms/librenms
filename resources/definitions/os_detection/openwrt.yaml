os: openwrt
text: OpenWrt
type: network
icon: openwrt
over:
    - { graph: device_bits, text: 'Device Traffic' }
    - { graph: device_processor, text: 'CPU Usage' }
    - { graph: device_mempool, text: 'Memory Usage' }
discovery:
    -
        sysObjectID: .1.3.6.1.4.1.8072.3.2.10
        snmpget:
            oid: 'NET-SNMP-EXTEND-MIB::nsExtendOutput1Line."distro"'
            # 'contains' rather than 'starts': some OpenWrt-based firmware (e.g. GL.iNet Flint 3)
            # prefixes the distro string with non-printable/semigraphic chars before "OpenWrt".
            op: contains
            value: OpenWrt
