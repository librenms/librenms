mib: NET-SNMP-EXTEND-MIB
modules:
  sensors:
    temperature:
      data:
        - oid: nsExtendOutput1Line
          value: nsExtendOutput1Line
          num_oid: '.1.3.6.1.4.1.8072.1.3.2.1.2."cerbo_batt_temp"'
          descr: Cerbo Battery Temp
    voltage:
      data:
        - oid: nsExtendOutput1Line
          value: nsExtendOutput1Line
          num_oid: '.1.3.6.1.4.1.8072.1.3.2.1.2."cerbo_max_cell_v"'
          descr: Cerbo Max Cell Voltage
