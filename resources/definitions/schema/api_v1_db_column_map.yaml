# LibreNMS v1 API — database column → JSON field name (snake_case).
# Curated for humans: names read well in API responses; context comes from the endpoint
# (e.g. /devices, /ports), so fields are not prefixed with the table name.
#
# Conventions used here:
# - Primary key column → id
# - Foreign keys → *_id unchanged where already clear
# - 0/1 flags → is_* / has_* where it aids readability
# - Timestamps → *_at where the column is a moment in time
# - IF-MIB / SNMP counters → direction + quantity + total|previous|delta|rate_per_second
